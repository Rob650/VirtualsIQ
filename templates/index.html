<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VirtualsIQ — AI Agent Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFFFFF; --bg-2: #F7F7F8; --bg-3: #EDEDF0; --bg-4: #E4E4E8;
  --border: #E2E2E6; --border-2: #CBCBD0;
  --text: #0E0E2C; --text-muted: #4A4A6A; --text-dim: #8E8EA0;
  --green: #22C55E; --green-bg: rgba(34,197,94,0.10); --green-dark: #16A34A;
  --red: #EF4444; --red-bg: rgba(239,68,68,0.10);
  --amber: #F59E0B; --teal: #0891B2; --purple: #7C3AED;
  --accent: #7C3AED; --accent-bg: rgba(124,58,237,0.08); --accent-dark: #6D28D9;
  --radius: 8px; --radius-sm: 6px; --radius-pill: 100px;
  --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-data: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-ui); background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input { font-family: inherit; }

/* Header */
.header { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 16px; }
.header-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; height: 56px; gap: 16px; }
.logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 18px; white-space: nowrap; cursor: pointer; }
.logo-mark { background: var(--accent); color: #fff; padding: 4px 8px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
.logo-text { color: var(--text); }
.search-wrap { flex: 1; max-width: 420px; position: relative; }
.search-wrap input { width: 100%; height: 36px; padding: 0 12px 0 36px; border: 1px solid var(--border); border-radius: var(--radius-pill); font-size: 14px; background: var(--bg-2); color: var(--text); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
.search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
.search-wrap input::placeholder { color: var(--text-dim); }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; }
.header-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.header-updated { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

/* Enrichment Banner */
.enrichment-banner { background: var(--accent-bg); border-bottom: 1px solid rgba(124,58,237,0.15); padding: 8px 16px; text-align: center; font-size: 13px; color: var(--accent-dark); display: none; }
.enrichment-banner.active { display: block; }
.enrichment-progress { height: 3px; background: var(--bg-3); border-radius: 2px; margin-top: 6px; max-width: 400px; margin-left: auto; margin-right: auto; overflow: hidden; }
.enrichment-progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }

/* Main container */
.main { max-width: 1280px; margin: 0 auto; padding: 0 16px 80px; }

/* Trending Strip */
.trending { padding: 16px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.trending-section { margin-bottom: 12px; }
.trending-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 6px; }
.trending-row { display: flex; gap: 8px; }
.trending-card { flex-shrink: 0; display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: border-color 0.15s; min-width: 180px; }
.trending-card:hover { border-color: var(--accent); }
.trending-card .tc-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--bg-3); object-fit: cover; }
.trending-card .tc-info { min-width: 0; }
.trending-card .tc-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.trending-card .tc-ticker { font-size: 11px; color: var(--text-dim); }
.trending-card .tc-metric { font-family: var(--font-data); font-size: 13px; font-weight: 600; margin-left: auto; white-space: nowrap; }
.tc-metric.positive { color: var(--green); }
.tc-metric.negative { color: var(--red); }
.tc-metric.score { color: var(--accent); }
.tc-metric.new-tag { color: var(--teal); font-size: 11px; font-weight: 500; }

/* Category Tabs */
.cat-bar { display: flex; align-items: center; gap: 6px; padding: 12px 0; flex-wrap: wrap; }
.cat-tab { padding: 6px 14px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 500; color: var(--text-muted); background: transparent; border: 1px solid transparent; transition: all 0.15s; white-space: nowrap; }
.cat-tab:hover { background: var(--bg-2); }
.cat-tab.active { background: var(--accent-bg); color: var(--accent-dark); border-color: rgba(124,58,237,0.2); font-weight: 600; }

/* Category popup (mobile) */
.cat-popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; }
.cat-popup-overlay.open { display: flex; align-items: flex-end; justify-content: center; }
.cat-popup { background: var(--bg); border-radius: 16px 16px 0 0; padding: 20px 16px 32px; width: 100%; max-width: 480px; }
.cat-popup h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; text-align: center; }
.cat-popup-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.cat-popup-btn { padding: 12px 8px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 13px; font-weight: 500; text-align: center; transition: all 0.15s; }
.cat-popup-btn:hover, .cat-popup-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-dark); }

/* Stats Bar */
.stats-bar { display: flex; gap: 16px; padding: 10px 0; flex-wrap: wrap; }
.stat-item { font-size: 13px; color: var(--text-muted); }
.stat-item strong { color: var(--text); font-weight: 600; }

/* Agent Table */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table.agents { width: 100%; border-collapse: collapse; min-width: 640px; }
table.agents th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; position: sticky; top: 56px; background: var(--bg); z-index: 10; cursor: pointer; user-select: none; }
table.agents th:hover { color: var(--text-muted); }
table.agents th.sorted { color: var(--accent); }
table.agents th .sort-arrow { display: inline-block; margin-left: 2px; font-size: 10px; }
table.agents td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
table.agents tr { cursor: pointer; transition: background 0.1s; }
table.agents tbody tr:hover { background: var(--bg-2); }
.agent-cell { display: flex; align-items: center; gap: 10px; min-width: 200px; }
.agent-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-3); object-fit: cover; flex-shrink: 0; }
.agent-info { min-width: 0; }
.agent-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; display: block; }
.agent-meta { display: flex; align-items: center; gap: 6px; margin-top: 1px; }
.agent-ticker { font-size: 12px; color: var(--text-dim); font-family: var(--font-data); }
.agent-cat-badge { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: var(--radius-pill); background: var(--bg-3); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }
.agent-links { display: flex; gap: 4px; margin-top: 2px; }
.agent-links a { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--bg-3); color: var(--text-muted); font-weight: 500; transition: all 0.15s; }
.agent-links a:hover { background: var(--accent-bg); color: var(--accent); }
td.num { font-family: var(--font-data); font-size: 13px; white-space: nowrap; }
td.rank-cell { font-size: 13px; color: var(--text-dim); width: 40px; text-align: center; }
.change-pos { color: var(--green); }
.change-neg { color: var(--red); }
.viq-cell { position: relative; }
.viq-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: var(--radius-pill); font-family: var(--font-data); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.viq-badge.tier-s { background: rgba(124,58,237,0.12); color: var(--accent-dark); }
.viq-badge.tier-a { background: var(--green-bg); color: var(--green-dark); }
.viq-badge.tier-b { background: rgba(8,145,178,0.10); color: var(--teal); }
.viq-badge.tier-c { background: rgba(245,158,11,0.10); color: var(--amber); }
.viq-badge.tier-d { background: var(--red-bg); color: var(--red); }
.viq-badge:hover { filter: brightness(0.95); }
.viq-badge .tier-letter { font-size: 10px; font-weight: 700; }

/* Star / Watchlist */
.star-btn { font-size: 18px; color: var(--border-2); cursor: pointer; transition: color 0.15s; padding: 4px; line-height: 1; }
.star-btn:hover { color: var(--amber); }
.star-btn.starred { color: var(--amber); }

/* VIQ Popup */
.viq-popup { display: none; position: absolute; right: 0; top: 100%; z-index: 50; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 8px 24px rgba(0,0,0,0.12); padding: 16px; width: 320px; cursor: default; }
.viq-popup.open { display: block; }
.viq-popup h4 { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.viq-tier-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 13px; }
.viq-tier-row .tier-name { color: var(--text-muted); }
.viq-tier-row .tier-val { font-family: var(--font-data); font-weight: 600; }
.viq-factors { margin-top: 10px; }
.viq-factors h5 { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
.viq-factor-item { font-size: 12px; padding: 2px 0; display: flex; justify-content: space-between; }
.viq-factor-item .fname { color: var(--text-muted); }
.viq-factor-item .fval { font-family: var(--font-data); font-weight: 500; }
.viq-helped .fval { color: var(--green); }
.viq-hurt .fval { color: var(--red); }
.viq-doxx { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 12px; }
.viq-oneliner { margin-top: 8px; font-size: 12px; color: var(--text-muted); font-style: italic; }
.viq-popup-close { position: absolute; top: 8px; right: 10px; font-size: 16px; color: var(--text-dim); cursor: pointer; }

/* Loading Skeleton */
.skeleton { background: linear-gradient(90deg, var(--bg-2) 25%, var(--bg-3) 50%, var(--bg-2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm); }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skel-row { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid var(--border); }
.skel-circle { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; }
.skel-line { height: 14px; border-radius: 4px; }
.skel-line.w60 { width: 60%; }
.skel-line.w30 { width: 30%; }
.skel-line.w20 { width: 20%; }

/* Error state */
.error-state { text-align: center; padding: 48px 16px; }
.error-state h3 { font-size: 18px; margin-bottom: 8px; }
.error-state p { color: var(--text-muted); margin-bottom: 16px; font-size: 14px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: var(--radius); font-size: 14px; font-weight: 500; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dark); }
.btn-outline { border: 1px solid var(--border); color: var(--text-muted); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }

/* Pagination */
.pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 20px 0; }
.pagination button { width: 36px; height: 36px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 13px; font-weight: 500; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.pagination button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.pagination button:disabled { opacity: 0.4; cursor: default; }
.pagination button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.pagination .page-info { font-size: 13px; color: var(--text-dim); }

/* ========= DETAIL PAGE ========= */
.detail-page { padding: 20px 0; }
.detail-back { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-muted); margin-bottom: 16px; cursor: pointer; padding: 4px 0; }
.detail-back:hover { color: var(--accent); }
.detail-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.detail-avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--bg-3); object-fit: cover; flex-shrink: 0; }
.detail-title { flex: 1; min-width: 0; }
.detail-title h1 { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.detail-title .dticker { font-size: 16px; color: var(--text-dim); font-weight: 500; }
.status-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: var(--radius-pill); text-transform: uppercase; }
.status-available { background: var(--green-bg); color: var(--green-dark); }
.status-unavailable { background: var(--red-bg); color: var(--red); }
.doxx-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: var(--radius-pill); }
.doxx-high { background: var(--green-bg); color: var(--green-dark); }
.doxx-medium { background: rgba(245,158,11,0.10); color: var(--amber); }
.doxx-low { background: var(--red-bg); color: var(--red); }
.doxx-none { background: var(--bg-3); color: var(--text-dim); }
.detail-viq { text-align: center; flex-shrink: 0; }
.detail-viq-score { font-size: 32px; font-weight: 700; font-family: var(--font-data); }
.detail-viq-label { font-size: 12px; color: var(--text-dim); }
.detail-links { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.detail-links a { font-size: 12px; padding: 4px 10px; border-radius: var(--radius-pill); border: 1px solid var(--border); color: var(--text-muted); transition: all 0.15s; }
.detail-links a:hover { border-color: var(--accent); color: var(--accent); }

/* Detail Stats */
.detail-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
.dstat { padding: 14px; background: var(--bg-2); border-radius: var(--radius); }
.dstat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 2px; }
.dstat-val { font-size: 18px; font-weight: 700; font-family: var(--font-data); }

/* Overview Sections */
.overview-section { margin-bottom: 20px; }
.overview-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.overview-section p { font-size: 14px; color: var(--text-muted); line-height: 1.65; }
.overview-empty { text-align: center; padding: 32px; background: var(--bg-2); border-radius: var(--radius); margin-bottom: 24px; }
.overview-empty p { color: var(--text-dim); margin-bottom: 12px; font-size: 14px; }
.analyze-status { margin-top: 8px; font-size: 13px; color: var(--text-muted); }

/* Score Breakdown */
.score-breakdown { margin-bottom: 24px; }
.score-breakdown > h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.score-tier-group { margin-bottom: 16px; }
.score-tier-heading { font-size: 13px; font-weight: 600; color: var(--accent-dark); padding: 6px 0; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.score-factor { display: flex; align-items: center; gap: 10px; padding: 5px 0; font-size: 13px; }
.score-factor .sf-name { flex: 1; color: var(--text-muted); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.score-factor .sf-bar-wrap { width: 100px; height: 6px; background: var(--bg-3); border-radius: 3px; flex-shrink: 0; }
.score-factor .sf-bar { height: 100%; border-radius: 3px; transition: width 0.5s; }
.score-factor .sf-val { font-family: var(--font-data); font-weight: 600; width: 32px; text-align: right; flex-shrink: 0; }

/* DexScreener Embed */
.dex-chart { margin-bottom: 24px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.dex-chart iframe { width: 100%; height: 400px; border: none; }

/* ========= CATEGORY PAGE ========= */
.category-page { padding: 20px 0; }
.category-header { margin-bottom: 24px; }
.category-header h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.cat-stats { display: flex; gap: 16px; flex-wrap: wrap; }
.cat-stat { font-size: 13px; color: var(--text-muted); }
.cat-stat strong { color: var(--text); }
.cat-section { margin-bottom: 28px; }
.cat-section h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
.cat-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
.cat-card { padding: 12px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all 0.15s; }
.cat-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(124,58,237,0.08); }
.cat-card .cc-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.cat-card .cc-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--bg-3); object-fit: cover; }
.cat-card .cc-name { font-size: 14px; font-weight: 600; }
.cat-card .cc-ticker { font-size: 12px; color: var(--text-dim); }
.cat-card .cc-bottom { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); }
.cat-card .cc-bottom strong { color: var(--text); }

/* Bottom Nav (mobile) */
.bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0); }
.bottom-nav-inner { display: flex; justify-content: space-around; padding: 6px 0; }
.bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; color: var(--text-dim); padding: 4px 12px; cursor: pointer; transition: color 0.15s; }
.bottom-nav-item.active { color: var(--accent); }
.bottom-nav-item svg { width: 20px; height: 20px; }

/* Sort popup (mobile) */
.sort-popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; }
.sort-popup-overlay.open { display: flex; align-items: flex-end; justify-content: center; }
.sort-popup { background: var(--bg); border-radius: 16px 16px 0 0; padding: 20px 16px 32px; width: 100%; max-width: 480px; }
.sort-popup h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; text-align: center; }
.sort-option { padding: 12px; border-radius: var(--radius); font-size: 14px; text-align: center; cursor: pointer; transition: background 0.1s; }
.sort-option:hover, .sort-option.active { background: var(--accent-bg); color: var(--accent-dark); }

/* Responsive */
@media (max-width: 768px) {
  .header-inner { gap: 8px; }
  .logo-text { display: none; }
  .search-wrap { max-width: 100%; }
  .header-updated { display: none; }
  .cat-bar { display: none; }
  .bottom-nav { display: block; }
  .trending-card { min-width: 160px; }
  .detail-header { flex-direction: column; }
  .detail-viq { margin-left: 0; }
  .main { padding-bottom: 100px; }
  table.agents { min-width: 560px; }
  .detail-stats { grid-template-columns: repeat(2, 1fr); }
}
@media (min-width: 769px) {
  .cat-popup-trigger { display: none; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo" id="logoBtn">
      <span class="logo-mark">VIQ</span>
      <span class="logo-text">VirtualsIQ</span>
    </div>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search agents..." autocomplete="off">
    </div>
    <div class="header-right">
      <span class="header-updated" id="headerUpdated"></span>
    </div>
  </div>
</header>

<!-- Enrichment Banner -->
<div class="enrichment-banner" id="enrichmentBanner">
  <span id="enrichmentText">Enriching agent data...</span>
  <div class="enrichment-progress"><div class="enrichment-progress-bar" id="enrichmentBar" style="width:0%"></div></div>
</div>

<!-- Main Content -->
<div class="main" id="app"></div>

<!-- Category Popup (mobile) -->
<div class="cat-popup-overlay" id="catPopup">
  <div class="cat-popup">
    <h3>Categories</h3>
    <div class="cat-popup-grid" id="catPopupGrid"></div>
  </div>
</div>

<!-- Sort Popup (mobile) -->
<div class="sort-popup-overlay" id="sortPopup">
  <div class="sort-popup">
    <h3>Sort By</h3>
    <div id="sortOptions"></div>

{% raw %}
<script>
(function() {
"use strict";

/* ====== CONSTANTS ====== */
const CATEGORIES = ['All','DeFi','Gaming','Social','Trading','Infra','Info','Entertainment','NFT','Watchlist'];
const SORT_OPTIONS = [
  { key: 'market_cap', label: 'Market Cap' },
  { key: 'price_change_24h', label: '24h Change' },
  { key: 'composite_score', label: 'VIQ Score' },
  { key: 'volume_24h', label: 'Volume 24h' },
  { key: 'holder_count', label: 'Holders' },
  { key: 'created_at', label: 'Newest' },
];
const TIER_ORDER = ['Foundation','Traction','On-chain','Narrative'];
const TIER_PREFIX = { F: 'Foundation', T: 'Traction', O: 'On-chain', N: 'Narrative' };
const DOXX_LABELS = { 1: 'Full Doxx', 2: 'Social Presence', 3: 'Anonymous' };

/* ====== STATE ====== */
let S = {
  agents: [], total: 0, page: 1, pageSize: 100, totalPages: 1,
  sort: 'market_cap', sortDir: 'desc', category: 'All', search: '',
  watchlist: loadWatchlist(),
  trending: null, stats: null,
  loading: true, error: null,
  view: 'home',
  detailAgent: null, detailLoading: false,
  categoryData: null, catLoading: false,
  openViq: null, enriching: false,
};

function loadWatchlist() {
  try { return JSON.parse(localStorage.getItem('viq_watchlist') || '[]'); } catch(e) { return []; }
}
function saveWatchlist() {
  localStorage.setItem('viq_watchlist', JSON.stringify(S.watchlist));
}

/* ====== FORMAT HELPERS ====== */
function fmt(n, dec) {
  if (n == null || isNaN(n)) return '-';
  dec = dec != null ? dec : 2;
  const abs = Math.abs(n);
  if (abs >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (abs >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (abs >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return Number(n).toFixed(dec);
}
function fmtUsd(n) {
  if (n == null || isNaN(n)) return '-';
  const abs = Math.abs(n);
  if (abs >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
  if (abs >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (abs >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + Number(n).toFixed(2);
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '-';
  return (n >= 0 ? '+' : '') + Number(n).toFixed(1) + '%';
}
function fmtPrice(n) {
  if (n == null || isNaN(n)) return '-';
  if (n < 0.0001) return '$' + Number(n).toExponential(2);
  if (n < 1) return '$' + Number(n).toFixed(6);
  return '$' + Number(n).toFixed(4);
}
function timeAgo(ts) {
  if (!ts) return '';
  const diff = (Date.now() - new Date(ts).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}
function esc(s) {
  if (s == null) return '';
  const el = document.createElement('span');
  el.textContent = String(s);
  return el.innerHTML;
}
function tierClass(t) {
  if (!t) return 'tier-c';
  const c = String(t).toUpperCase().charAt(0);
  return { S: 'tier-s', A: 'tier-a', B: 'tier-b', C: 'tier-c', D: 'tier-d', F: 'tier-d' }[c] || 'tier-c';
}
function doxxClass(t) {
  if (!t) return 'doxx-none';
  const s = String(t).toLowerCase();
  if (s === '1' || s.includes('full') || s.includes('high')) return 'doxx-high';
  if (s === '2' || s.includes('social') || s.includes('med')) return 'doxx-medium';
  if (s === '3' || s.includes('anon') || s.includes('low')) return 'doxx-low';
  return 'doxx-none';
}
function scoreColor(v) {
  if (v >= 75) return 'var(--green)';
  if (v >= 55) return 'var(--teal)';
  if (v >= 35) return 'var(--amber)';
  return 'var(--red)';
}

/* ====== SCORE ANALYSIS ====== */
function parseFriendlyName(key) {
  return key.replace(/^[A-Z]\d+_/, '').replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
}

function parseScoresJson(raw) {
  if (!raw) return null;
  try { return typeof raw === 'string' ? JSON.parse(raw) : raw; } catch(e) { return null; }
}

function computeTopFactors(raw) {
  const scores = parseScoresJson(raw);
  if (!scores) return { helped: [], hurt: [] };
  const entries = [];
  for (const k in scores) {
    if (/^[A-Z]\d+_/.test(k)) {
      const v = Number(scores[k]);
      entries.push({ key: k, name: parseFriendlyName(k), value: v, deviation: v - 50 });
    }
  }
  entries.sort(function(a, b) { return b.deviation - a.deviation; });
  const helped = entries.filter(function(e) { return e.deviation > 0; }).slice(0, 3);
  const hurtSorted = entries.filter(function(e) { return e.deviation < 0; });
  hurtSorted.sort(function(a, b) { return a.deviation - b.deviation; });
  return { helped: helped, hurt: hurtSorted.slice(0, 3) };
}

function groupFactorsByTier(raw) {
  const scores = parseScoresJson(raw);
  if (!scores) return {};
  const groups = {};
  for (const k in scores) {
    if (/^[A-Z]\d+_/.test(k)) {
      const prefix = k.charAt(0);
      const tierName = TIER_PREFIX[prefix] || prefix;
      if (!groups[tierName]) groups[tierName] = [];
      groups[tierName].push({ key: k, name: parseFriendlyName(k), value: Number(scores[k]) });
    }
  }
  return groups;
}

function tierAverage(items) {
  if (!items || !items.length) return 0;
  return items.reduce(function(s, x) { return s + x.value; }, 0) / items.length;
}

/* ====== API ====== */
async function apiFetch(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error('API error: ' + res.status + ' ' + res.statusText);
  return res.json();
}

async function loadAgents() {
  S.loading = true;
  S.error = null;
  render();
  try {
    const params = new URLSearchParams();
    params.set('page', String(S.page));
    params.set('page_size', String(S.pageSize));
    params.set('sort', S.sort);
    if (S.category && S.category !== 'All' && S.category !== 'Watchlist') {
      params.set('category', S.category);
    }
    if (S.search) params.set('search', S.search);
    const data = await apiFetch('/api/agents?' + params.toString());
    S.agents = data.agents || [];
    S.total = data.total || 0;
    S.totalPages = data.total_pages || 1;
    S.page = data.page || 1;
    S.loading = false;
    updateTimestamp();
  } catch(e) {
    S.loading = false;
    S.error = e.message;
  }
  render();
}

async function loadTrending() {
  try { S.trending = await apiFetch('/api/trending-strip'); } catch(e) { /* silent */ }
  render();
}

async function loadStats() {
  try { S.stats = await apiFetch('/api/stats'); } catch(e) { /* silent */ }
  render();
}

async function loadDetail(id) {
  S.view = 'detail';
  S.detailAgent = null;
  S.detailLoading = true;
  render();
  try {
    S.detailAgent = await apiFetch('/api/agent/' + encodeURIComponent(id));
  } catch(e) {
    S.detailAgent = { _error: e.message };
  }
  S.detailLoading = false;
  render();
}

async function loadCategoryPage(cat) {
  S.view = 'category';
  S.categoryData = null;
  S.catLoading = true;
  render();
  try {
    S.categoryData = await apiFetch('/api/category-summary/' + encodeURIComponent(cat));
  } catch(e) {
    S.categoryData = { _error: e.message };
  }
  S.catLoading = false;
  render();
}

async function triggerAnalysis(id) {
  const el = document.getElementById('analyzeStatus');
  if (!el) return;
  el.textContent = 'Starting analysis...';
  try {
    const resp = await fetch('/api/analyze/' + encodeURIComponent(id), { method: 'POST' });
    const data = await resp.json();
    const jobId = data.job_id;
    if (!jobId) { el.textContent = 'Analysis queued. Refresh in a few minutes.'; return; }
    let attempts = 0;
    const poll = setInterval(async function() {
      attempts++;
      try {
        const job = await apiFetch('/api/job/' + jobId);
        if (job.status === 'completed' || job.status === 'done') {
          clearInterval(poll);
          el.textContent = 'Done! Reloading...';
          loadDetail(id);
        } else if (job.status === 'failed' || job.status === 'error') {
          clearInterval(poll);
          el.textContent = 'Analysis failed. Try again later.';
        } else {
          el.textContent = 'Analyzing... (' + (attempts * 3) + 's)';
        }
      } catch(e2) {
        if (attempts > 40) { clearInterval(poll); el.textContent = 'Timed out. Refresh later.'; }
      }
    }, 3000);
  } catch(e) {
    el.textContent = 'Could not start analysis: ' + e.message;
  }
}

function updateTimestamp() {
  const el = document.getElementById('headerUpdated');
  if (!el) return;
  let latest = null;
  S.agents.forEach(function(a) {
    if (a.updated_at) {
      const d = new Date(a.updated_at);
      if (!latest || d > latest) latest = d;
    }
  });
  if (latest) el.textContent = 'Updated ' + timeAgo(latest);
}

/* ====== ENRICHMENT POLLING ====== */
async function checkEnrichment() {
  try {
    const data = await apiFetch('/api/status');
    const banner = document.getElementById('enrichmentBanner');
    const bar = document.getElementById('enrichmentBar');
    const txt = document.getElementById('enrichmentText');
    if (data.running || data.enriching) {
      banner.classList.add('active');
      S.enriching = true;
      const pct = data.progress || 0;
      bar.style.width = pct + '%';
      txt.textContent = data.message || ('Enriching agent data... ' + pct + '%');
    } else {
      banner.classList.remove('active');
      if (S.enriching) { S.enriching = false; loadAgents(); }
    }
  } catch(e) { /* silent */ }
}
setInterval(checkEnrichment, 5000);
checkEnrichment();

/* ====== NAVIGATION ====== */
function navigateTo(path, push) {
  if (push !== false) history.pushState(null, '', path);
  closeMobilePopups();
  routeFromPath(path);
}

function routeFromPath(path) {
  const agentMatch = path.match(/^\/agent\/(.+)/);
  const catMatch = path.match(/^\/category\/(.+)/);
  if (agentMatch) {
    loadDetail(decodeURIComponent(agentMatch[1]));
  } else if (catMatch) {
    const cat = decodeURIComponent(catMatch[1]);
    S.category = cat;
    loadCategoryPage(cat);
  } else {
    S.view = 'home';
    S.page = 1;
    loadAgents();
    loadTrending();
    loadStats();
  }
  updateBottomNav();
}

window.addEventListener('popstate', function() { routeFromPath(location.pathname); });

/* ====== MOBILE POPUP HELPERS ====== */
function toggleCatPopup() {
  document.getElementById('catPopup').classList.toggle('open');
  document.getElementById('sortPopup').classList.remove('open');
}
function toggleSortPopup() {
  document.getElementById('sortPopup').classList.toggle('open');
  document.getElementById('catPopup').classList.remove('open');
}
function closeMobilePopups() {
  document.getElementById('catPopup').classList.remove('open');
  document.getElementById('sortPopup').classList.remove('open');
}

document.getElementById('catPopup').addEventListener('click', function(e) {
  if (e.target === this) closeMobilePopups();
});
document.getElementById('sortPopup').addEventListener('click', function(e) {
  if (e.target === this) closeMobilePopups();
});

function buildCatPopup() {
  const grid = document.getElementById('catPopupGrid');
  grid.innerHTML = CATEGORIES.map(function(c) {
    return '<button class="cat-popup-btn' + (S.category === c ? ' active' : '') + '" data-cat="' + esc(c) + '">' + esc(c) + '</button>';
  }).join('');
}

function buildSortPopup() {
  const container = document.getElementById('sortOptions');
  container.innerHTML = SORT_OPTIONS.map(function(s) {
    return '<div class="sort-option' + (S.sort === s.key ? ' active' : '') + '" data-sort="' + s.key + '">' + esc(s.label) + '</div>';
  }).join('');
}

function updateBottomNav() {
  document.querySelectorAll('.bottom-nav-item').forEach(function(el) { el.classList.remove('active'); });
  if (S.view === 'home' && S.category !== 'Watchlist') document.getElementById('bnHome').classList.add('active');
  if (S.category === 'Watchlist') document.getElementById('bnWatch').classList.add('active');
}

/* ====== EVENT DELEGATION ====== */
document.getElementById('logoBtn').addEventListener('click', function() { navigateTo('/'); });
document.getElementById('bnHome').addEventListener('click', function() { S.category = 'All'; navigateTo('/'); });
document.getElementById('bnWatch').addEventListener('click', function() {
  closeMobilePopups();
  S.category = 'Watchlist';
  S.view = 'home';
  S.page = 1;
  loadAgents();
  updateBottomNav();
});
document.getElementById('bnCat').addEventListener('click', toggleCatPopup);
document.getElementById('bnSort').addEventListener('click', toggleSortPopup);

document.getElementById('catPopupGrid').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-cat]');
  if (!btn) return;
  selectCategory(btn.dataset.cat);
});
document.getElementById('sortOptions').addEventListener('click', function(e) {
  const opt = e.target.closest('[data-sort]');
  if (!opt) return;
  selectSort(opt.dataset.sort);
});

function selectCategory(c) {
  closeMobilePopups();
  S.category = c;
  S.page = 1;
  if (c === 'Watchlist') {
    S.view = 'home';
    loadAgents();
  } else if (c !== 'All') {
    navigateTo('/category/' + encodeURIComponent(c));
  } else {
    navigateTo('/');
  }
  updateBottomNav();
}

function selectSort(key) {
  closeMobilePopups();
  if (S.sort === key) {
    S.sortDir = S.sortDir === 'desc' ? 'asc' : 'desc';
  } else {
    S.sort = key;
    S.sortDir = 'desc';
  }
  loadAgents();
}

/* Search with debounce */
let searchTimer;
document.getElementById('searchInput').addEventListener('input', function() {
  const val = this.value.trim();
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() {
    S.search = val;
    S.page = 1;
    if (S.view !== 'home') { S.view = 'home'; history.pushState(null, '', '/'); }
    loadAgents();
  }, 300);
});

/* Close VIQ popup on outside click */
document.addEventListener('click', function(e) {
  if (S.openViq && !e.target.closest('.viq-cell')) {
    S.openViq = null;
    render();
  }
});

/* Delegate clicks within #app */
document.getElementById('app').addEventListener('click', function(e) {
  /* Star button */
  const starBtn = e.target.closest('.star-btn');
  if (starBtn) {
    e.stopPropagation();
    const id = starBtn.dataset.id;
    const idx = S.watchlist.indexOf(id);
    if (idx > -1) S.watchlist.splice(idx, 1);
    else S.watchlist.push(id);
    saveWatchlist();
    render();
    return;
  }
  /* VIQ badge */
  const viqBadge = e.target.closest('.viq-badge');
  if (viqBadge) {
    e.stopPropagation();
    const id = viqBadge.dataset.id;
    S.openViq = S.openViq === id ? null : id;
    render();
    return;
  }
  /* VIQ popup close */
  if (e.target.closest('.viq-popup-close')) {
    S.openViq = null;
    render();
    return;
  }
  /* Don't navigate if clicking inside viq popup */
  if (e.target.closest('.viq-popup')) return;
  /* Don't navigate if clicking a link */
  if (e.target.closest('a[target]')) return;
  /* Agent row */
  const row = e.target.closest('tr[data-agent-id]');
  if (row) { navigateTo('/agent/' + row.dataset.agentId); return; }
  /* Cat card */
  const catCard = e.target.closest('.cat-card[data-agent-id]');
  if (catCard) { navigateTo('/agent/' + catCard.dataset.agentId); return; }
  /* Trending card */
  const tCard = e.target.closest('.trending-card[data-agent-id]');
  if (tCard) { navigateTo('/agent/' + tCard.dataset.agentId); return; }
  /* Cat tab */
  const catTab = e.target.closest('.cat-tab');
  if (catTab) { selectCategory(catTab.dataset.cat); return; }
  /* Sort header */
  const sortTh = e.target.closest('th[data-sort]');
  if (sortTh) { selectSort(sortTh.dataset.sort); return; }
  /* Pagination */
  const pageBtn = e.target.closest('.page-btn');
  if (pageBtn) {
    S.page = parseInt(pageBtn.dataset.page, 10);
    loadAgents();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  /* Detail back */
  if (e.target.closest('.detail-back')) { history.back(); return; }
  /* Analyze button */
  const analyzeBtn = e.target.closest('.analyze-btn');
  if (analyzeBtn) { triggerAnalysis(analyzeBtn.dataset.id); return; }
  /* Category view-all button */
  const viewAllBtn = e.target.closest('.view-all-btn');
  if (viewAllBtn) {
    S.category = viewAllBtn.dataset.cat;
    S.view = 'home';
    S.page = 1;
    loadAgents();
    render();
    return;
  }
});

/* ====== RENDER ====== */
function render() {
  const app = document.getElementById('app');
  buildCatPopup();
  buildSortPopup();

  if (S.view === 'detail') {
    app.innerHTML = renderDetail();
  } else if (S.view === 'category') {
    app.innerHTML = renderCategory();
  } else {
    app.innerHTML = renderHome();
  }
}

/* ====== HOME RENDER ====== */
function renderHome() {
  let h = '';

  /* Trending strip */
  if (S.trending) {
    h += '<div class="trending">';
    const t = S.trending;
    if (t.movers && t.movers.length) {
      h += '<div class="trending-section"><div class="trending-label">Top Movers</div><div class="trending-row">';
      t.movers.slice(0, 3).forEach(function(a) {
        const cls = (a.price_change_24h || 0) >= 0 ? 'positive' : 'negative';
        h += '<div class="trending-card" data-agent-id="' + esc(a.virtuals_id) + '">' +
          '<img class="tc-avatar" src="' + esc(a.image_url) + '" onerror="this.style.display=\'none\'" alt="">' +
          '<div class="tc-info"><div class="tc-name">' + esc(a.name) + '</div><div class="tc-ticker">$' + esc(a.ticker) + '</div></div>' +
          '<div class="tc-metric ' + cls + '">' + fmtPct(a.price_change_24h) + '</div></div>';
      });
      h += '</div></div>';
    }
    if (t.new_launches && t.new_launches.length) {
      h += '<div class="trending-section"><div class="trending-label">New Launches</div><div class="trending-row">';
      t.new_launches.slice(0, 3).forEach(function(a) {
        h += '<div class="trending-card" data-agent-id="' + esc(a.virtuals_id) + '">' +
          '<img class="tc-avatar" src="' + esc(a.image_url) + '" onerror="this.style.display=\'none\'" alt="">' +
          '<div class="tc-info"><div class="tc-name">' + esc(a.name) + '</div><div class="tc-ticker">$' + esc(a.ticker) + '</div></div>' +
          '<div class="tc-metric new-tag">NEW</div></div>';
      });
      h += '</div></div>';
    }
    if (t.score_changes && t.score_changes.length) {
      h += '<div class="trending-section"><div class="trending-label">Score Changes</div><div class="trending-row">';
      t.score_changes.slice(0, 3).forEach(function(a) {
        h += '<div class="trending-card" data-agent-id="' + esc(a.virtuals_id) + '">' +
          '<img class="tc-avatar" src="' + esc(a.image_url) + '" onerror="this.style.display=\'none\'" alt="">' +
          '<div class="tc-info"><div class="tc-name">' + esc(a.name) + '</div><div class="tc-ticker">$' + esc(a.ticker) + '</div></div>' +
          '<div class="tc-metric score">' + (a.composite_score != null ? Number(a.composite_score).toFixed(0) : '-') + '</div></div>';
      });
      h += '</div></div>';
    }
    h += '</div>';
  }

  /* Category tabs (desktop) */
  h += '<div class="cat-bar">';
  CATEGORIES.forEach(function(c) {
    h += '<button class="cat-tab' + (S.category === c ? ' active' : '') + '" data-cat="' + esc(c) + '">' + esc(c) + '</button>';
  });
  h += '</div>';

  /* Stats bar */
  if (S.stats) {
    h += '<div class="stats-bar">';
    if (S.stats.total_agents != null) h += '<div class="stat-item"><strong>' + fmt(S.stats.total_agents, 0) + '</strong> agents</div>';
    if (S.stats.total_market_cap != null) h += '<div class="stat-item">Total MCap <strong>' + fmtUsd(S.stats.total_market_cap) + '</strong></div>';
    if (S.stats.average_score != null) h += '<div class="stat-item">Avg VIQ <strong>' + Number(S.stats.average_score).toFixed(1) + '</strong></div>';
    if (S.stats.analyzed_count != null) h += '<div class="stat-item"><strong>' + S.stats.analyzed_count + '</strong> analyzed</div>';
    h += '</div>';
  }

  /* Loading skeleton */
  if (S.loading) {
    h += '<div class="table-wrap">';
    for (var si = 0; si < 10; si++) {
      h += '<div class="skel-row"><div class="skeleton skel-circle"></div>' +
        '<div style="flex:1"><div class="skeleton skel-line w60" style="margin-bottom:4px"></div><div class="skeleton skel-line w30"></div></div>' +
        '<div class="skeleton skel-line" style="width:60px"></div>' +
        '<div class="skeleton skel-line" style="width:50px"></div>' +
        '<div class="skeleton skel-line" style="width:50px"></div></div>';
    }
    h += '</div>';
    return h;
  }

  /* Error state */
  if (S.error) {
    return h + '<div class="error-state"><h3>Failed to load agents</h3><p>' + esc(S.error) +
      '</p><button class="btn btn-primary" onclick="location.reload()">Retry</button></div>';
  }

  /* Filter for watchlist */
  var agents = S.agents;
  if (S.category === 'Watchlist') {
    agents = agents.filter(function(a) { return S.watchlist.indexOf(a.virtuals_id) > -1; });
    if (!agents.length) {
      return h + '<div class="error-state"><h3>No watchlisted agents</h3><p>Tap the star icon on any agent to add them to your watchlist.</p></div>';
    }
  }

  /* Sort arrow */
  var sortArrow = S.sortDir === 'desc' ? '\u25BC' : '\u25B2';

  function thAttrs(key) {
    var cls = S.sort === key ? ' class="sorted"' : '';
    var arrow = S.sort === key ? ' <span class="sort-arrow">' + sortArrow + '</span>' : '';
    return cls + ' data-sort="' + key + '"';
  }

  h += '<div class="table-wrap"><table class="agents"><thead><tr>' +
    '<th style="width:30px">#</th>' +
    '<th>Agent</th>' +
    '<th' + thAttrs('market_cap') + '>MCap' + (S.sort === 'market_cap' ? ' <span class="sort-arrow">' + sortArrow + '</span>' : '') + '</th>' +
    '<th' + thAttrs('price_change_24h') + '>24h%' + (S.sort === 'price_change_24h' ? ' <span class="sort-arrow">' + sortArrow + '</span>' : '') + '</th>' +
    '<th' + thAttrs('composite_score') + '>VIQ' + (S.sort === 'composite_score' ? ' <span class="sort-arrow">' + sortArrow + '</span>' : '') + '</th>' +
    '<th style="width:30px"></th>' +
    '</tr></thead><tbody>';

  agents.forEach(function(a, i) {
    var rank = (S.page - 1) * S.pageSize + i + 1;
    var chgCls = (a.price_change_24h || 0) >= 0 ? 'change-pos' : 'change-neg';
    var tc = tierClass(a.tier_classification);
    var starred = S.watchlist.indexOf(a.virtuals_id) > -1;

    var links = '';
    if (a.virtuals_id) links += '<a href="https://app.virtuals.io/virtuals/' + esc(a.virtuals_id) + '" target="_blank" rel="noopener">VRT</a>';
    if (a.contract_address) links += '<a href="https://dexscreener.com/base/' + esc(a.contract_address) + '" target="_blank" rel="noopener">DEX</a>';
    if (a.linked_twitter) links += '<a href="' + esc(a.linked_twitter) + '" target="_blank" rel="noopener">X</a>';

    /* VIQ popup */
    var popupHtml = '';
    if (S.openViq === a.virtuals_id) {
      var factors = computeTopFactors(a.scores_json);
      var grouped = groupFactorsByTier(a.scores_json);
      popupHtml = '<div class="viq-popup open"><span class="viq-popup-close">&times;</span><h4>VIQ Breakdown</h4>';
      TIER_ORDER.forEach(function(tier) {
        var items = grouped[tier];
        if (items && items.length) {
          var avg = tierAverage(items);
          popupHtml += '<div class="viq-tier-row"><span class="tier-name">' + tier + '</span><span class="tier-val" style="color:' + scoreColor(avg) + '">' + avg.toFixed(0) + '</span></div>';
        }
      });
      if (factors.helped.length) {
        popupHtml += '<div class="viq-factors"><h5>Top Strengths</h5>';
        factors.helped.forEach(function(f) {
          popupHtml += '<div class="viq-factor-item viq-helped"><span class="fname">' + esc(f.name) + '</span><span class="fval">' + f.value + '</span></div>';
        });
        popupHtml += '</div>';
      }
      if (factors.hurt.length) {
        popupHtml += '<div class="viq-factors"><h5>Top Weaknesses</h5>';
        factors.hurt.forEach(function(f) {
          popupHtml += '<div class="viq-factor-item viq-hurt"><span class="fname">' + esc(f.name) + '</span><span class="fval">' + f.value + '</span></div>';
        });
        popupHtml += '</div>';
      }
      if (a.doxx_tier) {
        var doxxLabel = DOXX_LABELS[a.doxx_tier] || ('Tier ' + a.doxx_tier);
        popupHtml += '<div class="viq-doxx">Doxx: <strong>' + esc(doxxLabel) + '</strong> (Tier ' + esc(a.doxx_tier) + ')</div>';
      }
      /* One-liner summary from scores_json */
      var scoresData = parseScoresJson(a.scores_json);
      if (scoresData && scoresData._one_liner) {
        popupHtml += '<div class="viq-oneliner">' + esc(scoresData._one_liner) + '</div>';
      }
      popupHtml += '</div>';
    }

    h += '<tr data-agent-id="' + esc(a.virtuals_id) + '">' +
      '<td class="rank-cell">' + rank + '</td>' +
      '<td><div class="agent-cell">' +
        '<img class="agent-avatar" src="' + esc(a.image_url) + '" onerror="this.style.display=\'none\'" alt="">' +
        '<div class="agent-info">' +
          '<span class="agent-name">' + esc(a.name) + '</span>' +
          '<div class="agent-meta"><span class="agent-ticker">$' + esc(a.ticker) + '</span>' +
            (a.agent_type ? '<span class="agent-cat-badge">' + esc(a.agent_type) + '</span>' : '') +
          '</div>' +
          (links ? '<div class="agent-links">' + links + '</div>' : '') +
        '</div></div></td>' +
      '<td class="num">' + fmtUsd(a.market_cap) + '</td>' +
      '<td class="num ' + chgCls + '">' + fmtPct(a.price_change_24h) + '</td>' +
      '<td class="viq-cell">' +
        '<span class="viq-badge ' + tc + '" data-id="' + esc(a.virtuals_id) + '">' +
          (a.composite_score != null ? Number(a.composite_score).toFixed(0) : '-') +
          (a.tier_classification ? ' <span class="tier-letter">' + esc(a.tier_classification) + '</span>' : '') +
        '</span>' + popupHtml +
      '</td>' +
      '<td><span class="star-btn' + (starred ? ' starred' : '') + '" data-id="' + esc(a.virtuals_id) + '">' + (starred ? '\u2605' : '\u2606') + '</span></td>' +
      '</tr>';
  });

  h += '</tbody></table></div>';

  /* Pagination */
  if (S.totalPages > 1 && S.category !== 'Watchlist') {
    h += '<div class="pagination">';
    h += '<button class="page-btn" data-page="' + (S.page - 1) + '"' + (S.page <= 1 ? ' disabled' : '') + '>&laquo;</button>';
    var maxP = 5;
    var startP = Math.max(1, S.page - 2);
    var endP = Math.min(S.totalPages, startP + maxP - 1);
    if (endP - startP < maxP - 1) startP = Math.max(1, endP - maxP + 1);
    for (var p = startP; p <= endP; p++) {
      h += '<button class="page-btn' + (p === S.page ? ' active' : '') + '" data-page="' + p + '">' + p + '</button>';
    }
    h += '<button class="page-btn" data-page="' + (S.page + 1) + '"' + (S.page >= S.totalPages ? ' disabled' : '') + '>&raquo;</button>';
    h += '<span class="page-info">' + S.page + ' / ' + S.totalPages + '</span>';
    h += '</div>';
  }

  return h;
}

/* ====== DETAIL RENDER ====== */
function renderDetail() {
  var h = '<div class="detail-page">';
  h += '<div class="detail-back">&larr; Back</div>';

  if (S.detailLoading || !S.detailAgent) {
    h += renderSkeleton(8);
    h += '</div>';
    return h;
  }
  if (S.detailAgent._error) {
    h += '<div class="error-state"><h3>Failed to load agent</h3><p>' + esc(S.detailAgent._error) +
      '</p><button class="btn btn-primary detail-back">Go Back</button></div></div>';
    return h;
  }

  var a = S.detailAgent;
  var tc = tierClass(a.tier_classification);
  var dc = doxxClass(a.doxx_tier);

  /* Header */
  h += '<div class="detail-header">';
  h += '<img class="detail-avatar" src="' + esc(a.image_url) + '" onerror="this.style.display=\'none\'" alt="">';
  h += '<div class="detail-title"><h1>' + esc(a.name) + ' <span class="dticker">$' + esc(a.ticker) + '</span>';
  if (a.status) {
    var sc = (a.status === 'Available' || a.status === 'available') ? 'status-available' : 'status-unavailable';
    h += ' <span class="status-badge ' + sc + '">' + esc(a.status) + '</span>';
  }
  if (a.doxx_tier) h += ' <span class="doxx-badge ' + dc + '">' + esc(DOXX_LABELS[a.doxx_tier] || ('Doxx Tier ' + a.doxx_tier)) + '</span>';
  h += '</h1>';
  h += '<div class="detail-links">';
  if (a.virtuals_id) h += '<a href="https://app.virtuals.io/virtuals/' + esc(a.virtuals_id) + '" target="_blank">Virtuals</a>';
  if (a.contract_address) {
    h += '<a href="https://basescan.org/address/' + esc(a.contract_address) + '" target="_blank">Basescan</a>';
    h += '<a href="https://dexscreener.com/base/' + esc(a.contract_address) + '" target="_blank">DexScreener</a>';
  }
  if (a.linked_twitter) h += '<a href="' + esc(a.linked_twitter) + '" target="_blank">Twitter</a>';
  if (a.linked_website) h += '<a href="' + esc(a.linked_website) + '" target="_blank">Website</a>';
  if (a.linked_telegram) h += '<a href="' + esc(a.linked_telegram) + '" target="_blank">Telegram</a>';
  h += '</div></div>';

  /* VIQ box */
  var viqColor = a.composite_score >= 60 ? 'var(--green-dark)' : (a.composite_score >= 40 ? 'var(--teal)' : 'var(--red)');
  h += '<div class="detail-viq"><div class="detail-viq-score" style="color:' + viqColor + '">' +
    (a.composite_score != null ? Number(a.composite_score).toFixed(0) : '-') + '</div>' +
    '<div class="detail-viq-label">VIQ Score' + (a.tier_classification ? ' (' + esc(a.tier_classification) + ')' : '') + '</div></div>';
  h += '</div>';

  /* Stats grid */
  h += '<div class="detail-stats">';
  h += '<div class="dstat"><div class="dstat-label">Market Cap</div><div class="dstat-val">' + fmtUsd(a.market_cap) + '</div></div>';
  h += '<div class="dstat"><div class="dstat-label">Price</div><div class="dstat-val">' + fmtPrice(a.price_usd) + '</div></div>';
  var chgC = (a.price_change_24h || 0) >= 0 ? 'var(--green)' : 'var(--red)';
  h += '<div class="dstat"><div class="dstat-label">24h Change</div><div class="dstat-val" style="color:' + chgC + '">' + fmtPct(a.price_change_24h) + '</div></div>';
  h += '<div class="dstat"><div class="dstat-label">Volume 24h</div><div class="dstat-val">' + fmtUsd(a.volume_24h) + '</div></div>';
  h += '<div class="dstat"><div class="dstat-label">Holders</div><div class="dstat-val">' + (a.holder_count != null ? fmt(a.holder_count, 0) : '-') + '</div></div>';
  if (a.created_at) h += '<div class="dstat"><div class="dstat-label">Age</div><div class="dstat-val">' + timeAgo(a.created_at) + '</div></div>';
  if (a.updated_at) h += '<div class="dstat"><div class="dstat-label">Updated</div><div class="dstat-val">' + timeAgo(a.updated_at) + '</div></div>';
  h += '</div>';

  /* DexScreener chart embed */
  if (a.contract_address) {
    h += '<div class="dex-chart"><iframe src="https://dexscreener.com/base/' + esc(a.contract_address) + '?embed=1&theme=light&trades=0&info=0" loading="lazy" title="Chart"></iframe></div>';
  }

  /* AI Overview */
  var overview = null;
  try {
    overview = a.overview_json ? (typeof a.overview_json === 'string' ? JSON.parse(a.overview_json) : a.overview_json) : null;
  } catch(e) {}

  if (overview) {
    var sections = [
      { key: 'what_it_does', title: 'What It Does' },
      { key: 'who_is_behind_it', title: 'Who Is Behind It' },
      { key: 'what_is_notable', title: 'What Is Notable' },
      { key: 'what_is_concerning', title: 'What Is Concerning' },
      { key: 'recent_activity', title: 'Recent Activity' },
    ];
    if (a.last_analyzed) {
      h += '<div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">Last analyzed: ' + timeAgo(a.last_analyzed) + '</div>';
    }
    sections.forEach(function(sec) {
      var content = overview[sec.key] || '';
      if (content) {
        h += '<div class="overview-section"><h3>' + sec.title + '</h3><p>' + esc(content) + '</p></div>';
      }
    });
  } else {
    h += '<div class="overview-empty"><p>No AI analysis available for this agent yet.</p>' +
      '<button class="btn btn-primary analyze-btn" data-id="' + esc(a.virtuals_id) + '">Generate Analysis</button>' +
      '<div class="analyze-status" id="analyzeStatus"></div></div>';
  }

  /* Score Breakdown */
  var groups = groupFactorsByTier(a.scores_json);
  if (Object.keys(groups).length) {
    h += '<div class="score-breakdown"><h3>Score Breakdown</h3>';
    TIER_ORDER.forEach(function(tier) {
      var items = groups[tier];
      if (!items || !items.length) return;
      h += '<div class="score-tier-group"><div class="score-tier-heading">' + tier + '</div>';
      items.forEach(function(f) {
        var val = Math.max(0, Math.min(100, f.value));
        h += '<div class="score-factor">' +
          '<span class="sf-name">' + esc(f.name) + '</span>' +
          '<div class="sf-bar-wrap"><div class="sf-bar" style="width:' + val + '%;background:' + scoreColor(val) + '"></div></div>' +
          '<span class="sf-val" style="color:' + scoreColor(val) + '">' + f.value + '</span></div>';
      });
      h += '</div>';
    });
    h += '</div>';
  }

  h += '</div>';
  return h;
}

/* ====== CATEGORY RENDER ====== */
function renderCategory() {
  var h = '<div class="category-page">';
  h += '<div class="detail-back">&larr; All Agents</div>';

  if (S.catLoading || !S.categoryData) {
    h += renderSkeleton(6);
    h += '</div>';
    return h;
  }
  if (S.categoryData._error) {
    h += '<div class="error-state"><h3>Failed to load category</h3><p>' + esc(S.categoryData._error) +
      '</p><button class="btn btn-primary detail-back">Go Back</button></div></div>';
    return h;
  }

  var d = S.categoryData;
  h += '<div class="category-header"><h2>' + esc(d.category || S.category) + '</h2>';
  if (d.stats) {
    h += '<div class="cat-stats">';
    if (d.stats.total != null) h += '<div class="cat-stat"><strong>' + d.stats.total + '</strong> agents</div>';
    if (d.stats.total_mcap != null) h += '<div class="cat-stat">MCap <strong>' + fmtUsd(d.stats.total_mcap) + '</strong></div>';
    if (d.stats.avg_score != null) h += '<div class="cat-stat">Avg VIQ <strong>' + Number(d.stats.avg_score).toFixed(1) + '</strong></div>';
    if (d.stats.total_volume != null) h += '<div class="cat-stat">24h Vol <strong>' + fmtUsd(d.stats.total_volume) + '</strong></div>';
    h += '</div>';
  }
  /* AI-written category summary */
  if (d.ai_summary) {
    h += '<p style="font-size:14px;color:var(--text-muted);margin-top:10px;line-height:1.65">' + esc(d.ai_summary) + '</p>';
  } else if (d.stats) {
    var catName = esc(d.category || S.category);
    var total = d.stats.total || 0;
    var avgScore = d.stats.avg_score ? Number(d.stats.avg_score).toFixed(1) : 'N/A';
    var topAgent = (d.top_by_viq && d.top_by_viq.length) ? d.top_by_viq[0].name : null;
    var summary = catName + ' has ' + total + ' agents with an average VIQ score of ' + avgScore + '.';
    if (topAgent) summary += ' The top-rated agent is ' + topAgent + '.';
    if (d.stats.total_mcap > 0) summary += ' Combined market cap is ' + fmtUsd(d.stats.total_mcap) + '.';
    h += '<p style="font-size:14px;color:var(--text-muted);margin-top:10px;line-height:1.65">' + summary + '</p>';
  }
  h += '</div>';

  h += renderCardGrid(d.top_by_viq, 'Top by VIQ Score');
  h += renderCardGrid(d.biggest_movers, 'Biggest Movers (24h)');
  h += renderCardGrid(d.new_launches, 'New Launches');

  var catName = esc(d.category || S.category);
  h += '<div style="padding:16px 0"><button class="btn btn-outline view-all-btn" data-cat="' + catName + '">View All ' + catName + ' Agents</button></div>';

  h += '</div>';
  return h;
}

function renderCardGrid(items, label) {
  if (!items || !items.length) return '';
  var h = '<div class="cat-section"><h3>' + esc(label) + '</h3><div class="cat-cards">';
  items.forEach(function(a) {
    var chgCls = (a.price_change_24h || 0) >= 0 ? 'change-pos' : 'change-neg';
    h += '<div class="cat-card" data-agent-id="' + esc(a.virtuals_id) + '">' +
      '<div class="cc-top">' +
        '<img class="cc-avatar" src="' + esc(a.image_url) + '" onerror="this.style.display=\'none\'" alt="">' +
        '<div><div class="cc-name">' + esc(a.name) + '</div><div class="cc-ticker">$' + esc(a.ticker) + '</div></div></div>' +
      '<div class="cc-bottom">' +
        '<span>MCap <strong>' + fmtUsd(a.market_cap) + '</strong></span>' +
        '<span class="' + chgCls + '">' + fmtPct(a.price_change_24h) + '</span>' +
        '<span>VIQ <strong>' + (a.composite_score != null ? Number(a.composite_score).toFixed(0) : '-') + '</strong></span>' +
      '</div></div>';
  });
  h += '</div></div>';
  return h;
}

function renderSkeleton(count) {
  var h = '';
  for (var i = 0; i < count; i++) {
    h += '<div class="skel-row"><div class="skeleton skel-circle"></div>' +
      '<div style="flex:1"><div class="skeleton skel-line w60" style="margin-bottom:4px"></div><div class="skeleton skel-line w30"></div></div></div>';
  }
  return h;
}

/* ====== INIT ====== */
function init() {
  /* Use server-injected vars for direct page loads (defined outside {% raw %}) */
  if (typeof SERVER_DETAIL_ID !== 'undefined' && SERVER_DETAIL_ID) {
    loadDetail(SERVER_DETAIL_ID);
    return;
  }
  if (typeof SERVER_CATEGORY !== 'undefined' && SERVER_CATEGORY) {
    S.category = SERVER_CATEGORY;
    loadCategoryPage(SERVER_CATEGORY);
    return;
  }
  var path = location.pathname;
  routeFromPath(path);
}

init();

})();
</script>
{% endraw %}

</body>
</html>
