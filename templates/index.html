<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VirtualsIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #FFFFFF;
      --bg-2:       #F7F7F8;
      --bg-3:       #EDEDF0;
      --bg-4:       #E4E4E8;
      --border:     #E2E2E6;
      --border-2:   #CBCBD0;
      --text:       #0E0E2C;
      --text-muted: #4A4A6A;
      --text-dim:   #8E8EA0;

      --green:      #22C55E;
      --green-bg:   rgba(34,197,94,0.10);
      --green-dark: #16A34A;
      --red:        #EF4444;
      --red-bg:     rgba(239,68,68,0.10);
      --amber:      #F59E0B;
      --teal:       #0891B2;
      --purple:     #7C3AED;

      --accent:     #7C3AED;
      --accent-bg:  rgba(124,58,237,0.08);
      --accent-dark:#6D28D9;
      --accent-light:#A78BFA;

      --radius:     8px;
      --radius-sm:  6px;
      --radius-pill:100px;
      --font-ui:    'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-data:  'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: 116px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-2); }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }

    /* ===== HEADER ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #7C3AED, #06B6D4);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-data);
      font-weight: 500;
      font-size: 11px;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo-text {
      font-weight: 700;
      font-size: 17px;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      padding: 8px 12px 8px 34px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus { border-color: var(--accent); background: #fff; }
    .search-input::placeholder { color: var(--text-dim); }

    /* ===== CATEGORY TABS ===== */
    .category-tabs-wrap {
      padding: 0 16px;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }

    .category-tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }

    .category-tab {
      flex-shrink: 0;
      padding: 8px 14px;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      margin-bottom: -1px;
      font-family: var(--font-ui);
    }

    .category-tab:hover { color: var(--text); }
    .category-tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }

    /* ===== STATS BAR ===== */
    .stats-bar {
      display: flex;
      align-items: center;
      padding: 7px 16px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .stats-bar::-webkit-scrollbar { display: none; }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
      padding: 0 12px;
    }
    .stat-item:first-child { padding-left: 0; }
    .stat-item + .stat-item { border-left: 1px solid var(--border); }

    .stat-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-dim);
    }

    .stat-value {
      font-family: var(--font-data);
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    /* ===== ENRICHMENT BANNER ===== */
    .enrich-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: rgba(245,158,11,0.08);
      border-bottom: 1px solid rgba(245,158,11,0.2);
      font-size: 12px;
      color: var(--amber);
      font-family: var(--font-data);
    }
    .enrich-banner.visible { display: flex; }

    .enrich-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--amber);
      flex-shrink: 0;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ===== TABLE HEADER ===== */
    .table-header {
      display: grid;
      grid-template-columns: 36px 1fr 120px 80px 72px;
      align-items: center;
      padding: 6px 16px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
    }

    .th {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      white-space: nowrap;
      font-family: var(--font-ui);
    }
    .th.sortable { cursor: pointer; user-select: none; }
    .th.sortable:hover { color: var(--text-muted); }
    .th.right { text-align: right; }

    /* ===== AGENT ROWS ===== */
    .agent-row {
      display: grid;
      grid-template-columns: 36px 1fr 120px 80px 72px;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }

    .agent-row:hover { background: var(--bg-2); }
    .agent-row:last-child { border-bottom: none; }

    .rank {
      font-family: var(--font-data);
      font-size: 12px;
      color: var(--text-dim);
    }

    .agent-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--bg-3);
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-data);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .agent-info { min-width: 0; }

    .agent-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-ticker {
      font-family: var(--font-data);
      font-size: 11px;
      color: var(--text-dim);
      display: inline;
    }

    .agent-category {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-metrics {
      font-size: 10px;
      color: var(--text-dim);
      font-family: var(--font-data);
      white-space: nowrap;
    }

    .agent-links {
      display: flex;
      flex-direction: row;
      gap: 4px;
      margin-top: 2px;
      flex-wrap: wrap;
    }

    .agent-ext-link {
      display: inline-flex;
      align-items: center;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      font-family: var(--font-data);
      font-weight: 500;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      background: var(--bg-2);
      transition: all 0.12s;
    }
    .agent-ext-link:hover { border-color: var(--accent); color: var(--accent-dark); background: var(--accent-bg); }

    .price-col { text-align: right; }

    .price-val {
      font-family: var(--font-data);
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    .mcap-val {
      font-family: var(--font-data);
      font-size: 11px;
      color: var(--text-muted);
    }

    .change-col { text-align: right; }

    .change-val {
      font-family: var(--font-data);
      font-size: 12px;
      font-weight: 500;
    }
    .change-val.positive { color: var(--green-dark); }
    .change-val.negative { color: var(--red); }
    .change-val.neutral  { color: var(--text-muted); }

    .viq-col { text-align: right; }

    .viq-val {
      font-family: var(--font-data);
      font-size: 13px;
      font-weight: 700;
    }

    /* ===== LOADING ===== */
    .loading-row {
      padding: 48px 16px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }

    .loading-spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== PAGINATION ===== */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: #fff;
    }

    .pagination-info {
      font-size: 12px;
      color: var(--text-dim);
      font-family: var(--font-data);
    }

    .pagination-controls { display: flex; gap: 4px; }

    .page-btn {
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-family: var(--font-data);
    }

    .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent-dark); }
    .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-dim);
    }
    .empty-state-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
    .empty-state-title { font-size: 15px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: #fff;
      border-top: 1px solid var(--border);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }

    .bottom-filters {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }
    .bottom-filters::-webkit-scrollbar { display: none; }

    .bottom-filter-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--bg-2);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: var(--font-ui);
    }

    .bottom-filter-btn:hover { border-color: var(--accent); }
    .bottom-filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .bottom-tabs { display: flex; }

    .bottom-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      gap: 3px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s;
      font-family: var(--font-ui);
    }

    .bottom-tab.active { color: var(--accent); }
    .bottom-tab svg { width: 20px; height: 20px; }

    /* ===== CATEGORY POPUP ===== */
    .cat-popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(2px);
      z-index: 300;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .cat-popup-overlay.active { display: flex; }

    .cat-popup {
      background: #fff;
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 500px;
      padding: 16px;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .cat-popup-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      text-align: center;
    }

    .cat-popup-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .cat-popup-item {
      padding: 10px 8px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-2);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-ui);
    }
    .cat-popup-item:hover { border-color: var(--accent); color: var(--text); }
    .cat-popup-item.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 24px 16px;
    }
    .modal-overlay.active { display: flex; }

    .modal-sheet {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 860px;
      position: relative;
      margin: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.10);
    }

    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border-2);
      border-radius: 2px;
      margin: 10px auto 0;
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .modal-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--bg-3);
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-data);
      font-size: 16px;
      color: var(--text-muted);
    }
    .modal-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .modal-title-wrap { flex: 1; }

    .modal-agent-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .modal-agent-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .modal-score-ring {
      position: relative;
      width: 64px;
      height: 64px;
      flex-shrink: 0;
    }
    .modal-score-ring svg { transform: rotate(-90deg); }

    .modal-score-value {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .modal-score-num {
      font-family: var(--font-data);
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
    }

    .modal-score-label {
      font-size: 8px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.15s;
      font-family: var(--font-ui);
    }
    .modal-close:hover { background: var(--red-bg); border-color: var(--red); color: var(--red); }

    .modal-body {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .report-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .report-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .report-narrative {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.7;
    }

    /* Research report rendered from markdown */
    .research-report h2 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin: 20px 0 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .research-report h2:first-child { margin-top: 0; }
    .research-report p {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-muted);
      margin: 6px 0;
    }
    .research-report ul, .research-report ol {
      margin: 6px 0 6px 20px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .research-report li { margin-bottom: 3px; }
    .research-report strong { color: var(--text); font-weight: 600; }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    @media (max-width: 600px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }

    .metric-tile {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .metric-tile-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
      font-family: var(--font-ui);
    }
    .metric-tile-value {
      font-family: var(--font-data);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .metric-tile-value.teal   { color: var(--teal); }
    .metric-tile-value.purple { color: var(--purple); }
    .metric-tile-value.amber  { color: var(--amber); }
    .metric-tile-value.green  { color: var(--green-dark); }
    .metric-tile-value.red    { color: var(--red); }

    .score-breakdown-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }
    @media (max-width: 600px) { .score-breakdown-grid { grid-template-columns: 1fr; } }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .forecast-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
    }
    .forecast-horizon { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; font-family: var(--font-data); }
    .forecast-probability { font-family: var(--font-data); font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .forecast-range { font-family: var(--font-data); font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
    .forecast-catalyst { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .status-badge.sentient  { background: rgba(8,145,178,0.10); color: var(--teal); border: 1px solid rgba(8,145,178,0.25); }
    .status-badge.prototype { background: rgba(245,158,11,0.10); color: var(--amber); border: 1px solid rgba(245,158,11,0.25); }

    .category-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-3);
      border: 1px solid var(--border);
    }

    .doxx-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 500;
    }
    .doxx-badge.tier-1 { background: var(--green-bg); color: var(--green-dark); border: 1px solid rgba(34,197,94,0.25); }
    .doxx-badge.tier-2 { background: rgba(168,85,247,0.10); color: var(--purple); border: 1px solid rgba(168,85,247,0.25); }
    .doxx-badge.tier-3 { background: var(--bg-3); color: var(--text-muted); border: 1px solid var(--border); }

    .risk-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
    }
    .risk-badge.low     { background: var(--green-bg); color: var(--green-dark); border: 1px solid rgba(34,197,94,0.2); }
    .risk-badge.medium  { background: rgba(245,158,11,0.10); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
    .risk-badge.high    { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .risk-badge.extreme { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

    .dex-chart-wrap {
      width: 100%;
      height: 380px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-3);
    }
    .dex-chart-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    .tier-header {
      grid-column: 1 / -1;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      padding-top: 8px;
    }

    .tier-factor-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .tier-factor-row:last-child { border-bottom: none; }
    .tier-factor-left { display: flex; flex-direction: column; gap: 2px; }
    .tier-factor-name { font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .tier-factor-why { font-size: 11px; color: var(--text-dim); line-height: 1.4; }
    .tier-factor-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 48px; }
    .tier-factor-score { font-family: var(--font-data); font-size: 13px; font-weight: 600; }
    .tier-factor-bar { width: 44px; height: 3px; background: var(--bg-4); border-radius: 2px; overflow: hidden; }
    .tier-factor-bar-fill { height: 100%; border-radius: 2px; }

    .score-ring { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring-value {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-data);
      font-size: 10px;
      font-weight: 600;
    }

    .first-mover-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      background: rgba(168,85,247,0.10);
      border: 1px solid rgba(168,85,247,0.3);
      color: var(--purple);
      font-size: 8px; font-weight: 700;
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    }

    .toast {
      position: fixed;
      bottom: 130px;
      right: 16px;
      background: var(--text);
      color: #fff;
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      z-index: 2000;
      animation: fadeIn 0.2s ease;
      max-width: 280px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .viq-reasoning {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 8px;
    }
    .viq-reasoning-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .viq-reasoning-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 12px;
    }
    .viq-reasoning-item + .viq-reasoning-item { border-top: 1px solid var(--border); }
    .viq-reasoning-label { color: var(--text-muted); }
    .viq-reasoning-score { font-family: var(--font-data); font-weight: 600; }
    .viq-reasoning-summary {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    /* Generate Analysis button */
    .generate-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #7C3AED, #06B6D4);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: var(--font-ui);
    }
    .generate-btn:hover { opacity: 0.9; }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .analysis-loading {
      text-align: center;
      padding: 32px;
      color: var(--text-dim);
    }
    .analysis-loading .loading-spinner { margin: 0 auto 12px; }

    /* ===== DESKTOP ===== */
    @media (min-width: 768px) {
      body { padding-bottom: 0; }
      .bottom-nav { display: none; }
      .header { padding: 12px 24px; }
      .category-tabs-wrap { padding: 0 24px; }
      .stats-bar { padding: 7px 24px; }
      .enrich-banner { padding: 6px 24px; }
      .table-header { padding: 7px 24px; grid-template-columns: 44px 1fr 150px 96px 84px; }
      .agent-row { padding: 12px 24px; grid-template-columns: 44px 1fr 150px 96px 84px; }
      .pagination { padding: 12px 24px; }
      .cat-popup-overlay { align-items: center; }
      .cat-popup { border-radius: 16px; max-width: 400px; }
    }

    @media (min-width: 1024px) {
      .table-header, .agent-row { grid-template-columns: 44px 1fr 170px 110px 96px; }
    }
  </style>
</head>

{% raw %}
<script>
// ===== STATE =====
const state = {
  page: 1,
  pageSize: 100,
  sort: 'market_cap',
  category: '',
  status: '',
  doxxTier: '',
  search: '',
  searchTimeout: null,
  currentAgent: null,
  jobPollInterval: null,
  totalAgents: 0,
  totalPages: 1,
};

// ===== CATEGORY INFERENCE =====
const GENERIC_CATS = new Set(['IP', 'Unknown', '', null, undefined]);
const CAT_KEYWORDS = {
  DeFi: ['defi','swap','lend','yield','liquidity','amm','vault','stake','borrow','finance','dex','pool','bridge'],
  Gaming: ['game','play','quest','battle','arena','nft game','rpg','metaverse','world','land'],
  Social: ['social','chat','community','dao','governance','vote','forum','message','friend','connect'],
  Trading: ['trade','signal','bot','alpha','snipe','copy','arbitrage','hedge','leverage','margin'],
  Infra: ['infra','protocol','sdk','api','oracle','node','chain','layer','bridge','index','data','analytics'],
  Info: ['info','news','research','learn','education','wiki','guide','report','insight','intelligence'],
  Entertainment: ['entertainment','music','art','meme','fun','comedy','video','stream','creator','content'],
  NFT: ['nft','collectible','pfp','mint','collection','generative'],
};

function inferCategory(a) {
  const t = a.agent_type;
  if (t && !GENERIC_CATS.has(t)) return t;
  const text = ((a.name || '') + ' ' + (a.biography || '') + ' ' + (a.ticker || '')).toLowerCase();
  for (const cat in CAT_KEYWORDS) {
    for (const kw of CAT_KEYWORDS[cat]) {
      if (text.includes(kw)) return cat;
    }
  }
  return t || 'Other';
}

// ===== FORMATTERS =====
function fmtMcap(v) {
  if (v === null || v === undefined || v === '') return '\u2014';
  const n = parseFloat(v);
  if (isNaN(n)) return '\u2014';
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(2);
}

function fmtChange(v) {
  if (v === null || v === undefined) return '\u2014';
  const p = parseFloat(v);
  if (isNaN(p)) return '\u2014';
  return (p >= 0 ? '+' : '') + p.toFixed(2) + '%';
}

function fmtVol(v) {
  if (v === null || v === undefined || v === '') return '\u2014';
  const n = parseFloat(v);
  if (isNaN(n)) return '\u2014';
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}

function fmtNumber(v) {
  if (v === null || v === undefined || v === '') return '\u2014';
  return Number(v).toLocaleString();
}

function fmtCompact(v) {
  if (!v && v !== 0) return '\u2014';
  if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
  return Number(v).toLocaleString();
}

function scoreColor(s) {
  if (!s && s !== 0) return '#8E8EA0';
  if (s >= 80) return '#16A34A';
  if (s >= 60) return '#7C3AED';
  if (s >= 40) return '#F59E0B';
  if (s >= 20) return '#fb923c';
  return '#EF4444';
}

function initials(n) {
  if (!n) return '?';
  return n.split(/[\s_-]+/).slice(0, 2).map(w => w[0]).join('').toUpperCase();
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function cleanFactorLabel(key) {
  return key
    .replace(/^F\d+_/, '')
    .replace(/_/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

// Simple markdown-to-HTML for research reports
function mdToHtml(md) {
  if (!md) return '';
  return md
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br/>')
    .replace(/^(?!<[hulo])/gm, function(match, offset, str) {
      // Wrap plain text blocks in <p>
      return match;
    });
}

// ===== LOAD STATS =====
let cachedStats = null;
async function loadStats() {
  try {
    const r = await fetch('/api/stats');
    cachedStats = await r.json();
  } catch(e) { console.error('Stats error:', e); }
}

// ===== LOAD AGENTS =====
async function loadAgents() {
  const list = document.getElementById('agent-list');
  list.innerHTML = '<div class="loading-row"><div class="loading-spinner"></div>Loading agents...</div>';

  try {
    const effectivePageSize = state.category ? 500 : state.pageSize;

    const params = new URLSearchParams({
      page: state.page,
      page_size: effectivePageSize,
      sort: state.sort,
    });
    if (state.category) params.set('category', state.category);
    if (state.status)   params.set('status', state.status);
    if (state.doxxTier) params.set('doxx_tier', state.doxxTier);
    if (state.search)   params.set('search', state.search);

    const res = await fetch('/api/agents?' + params.toString());
    const data = await res.json();
    const agents = data.agents || [];
    state.totalAgents = data.total || agents.length;
    state.totalPages = Math.ceil(state.totalAgents / effectivePageSize) || 1;

    if (!agents.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#x1F50D;</div><div class="empty-state-title">No agents found</div></div>';
      document.getElementById('pagination').innerHTML = '';
      updateTabCounts();
      return;
    }

    // Client-side category filter (handles "IP" and generic categories)
    let filtered = agents;
    if (state.category) {
      filtered = agents.filter(a => {
        const cat = inferCategory(a);
        return cat.toLowerCase() === state.category.toLowerCase();
      });
    }

    if (state.sort === 'market_cap') {
      filtered.sort((a, b) => (parseFloat(b.market_cap) || 0) - (parseFloat(a.market_cap) || 0));
    } else if (state.sort === 'composite_score') {
      filtered.sort((a, b) => (parseFloat(b.composite_score) || 0) - (parseFloat(a.composite_score) || 0));
    } else if (state.sort === 'price_change_24h') {
      filtered.sort((a, b) => (parseFloat(b.price_change_24h) || 0) - (parseFloat(a.price_change_24h) || 0));
    }

    const offset = (state.page - 1) * effectivePageSize;

    list.innerHTML = filtered.map((a, i) => {
      const rank = offset + i + 1;
      const mcap = parseFloat(a.market_cap) || 0;
      const change = parseFloat(a.price_change_24h || 0);
      const changeClass = change >= 0 ? 'positive' : 'negative';
      const scoreNum = Math.round(a.composite_score || 0);
      const scoreClr = scoreColor(scoreNum);
      const categoryLabel = inferCategory(a);
      const statusLabel = a.status || '';
      const vol  = a.volume_24h   ? 'VOL '  + fmtVol(a.volume_24h)      : '';
      const hl   = a.holder_count ? 'HL '   + fmtCompact(a.holder_count) : '';
      const metricLine = [vol, hl].filter(Boolean).join('  ');
      const priceStr = a.price_usd ? '$' + parseFloat(a.price_usd).toPrecision(4) : '\u2014';

      const virtualsLink = a.virtuals_id
        ? `<a class="agent-ext-link" href="https://app.virtuals.io/virtuals/${a.virtuals_id}" target="_blank" rel="noopener" onclick="event.stopPropagation()">VRT</a>`
        : '';
      const dexLink = a.contract_address
        ? `<a class="agent-ext-link" href="https://dexscreener.com/base/${a.contract_address}" target="_blank" rel="noopener" onclick="event.stopPropagation()">DEX</a>`
        : '';
      const twitterLink = a.linked_twitter
        ? `<a class="agent-ext-link" href="${a.linked_twitter}" target="_blank" rel="noopener" onclick="event.stopPropagation()">&#x1D54F;</a>`
        : '';
      const webLink = a.linked_website
        ? `<a class="agent-ext-link" href="${a.linked_website}" target="_blank" rel="noopener" onclick="event.stopPropagation()">WEB</a>`
        : '';
      const tgLink = a.linked_telegram
        ? `<a class="agent-ext-link" href="${a.linked_telegram}" target="_blank" rel="noopener" onclick="event.stopPropagation()">TG</a>`
        : '';

      const allLinks = [virtualsLink, dexLink, twitterLink, webLink, tgLink].filter(Boolean).join('');

      return `<div class="agent-row" onclick="openModal('${a.virtuals_id}')">
        <div class="rank">${rank}</div>
        <div class="agent-cell">
          <div class="avatar">
            ${a.image_url
              ? `<img src="${a.image_url}" alt="${escHtml(a.name||'')}" onerror="this.parentElement.textContent='${initials(a.name)}'"/>`
              : initials(a.name)}
          </div>
          <div class="agent-info">
            <div class="agent-name">${escHtml(a.name || '')}</div>
            <div class="agent-ticker">${escHtml(a.ticker || '')}</div>
            ${categoryLabel || statusLabel ? `<div class="agent-category">${escHtml(categoryLabel)}${categoryLabel && statusLabel ? ' \u00b7 ' : ''}${escHtml(statusLabel)}</div>` : ''}
            ${metricLine ? `<div class="agent-metrics">${metricLine}</div>` : ''}
            ${allLinks ? `<div class="agent-links">${allLinks}</div>` : ''}
          </div>
        </div>
        <div class="price-col">
          <div class="price-val">${priceStr}</div>
          <div class="mcap-val">${fmtMcap(mcap)}</div>
        </div>
        <div class="change-col">
          <div class="change-val ${changeClass}">${fmtChange(a.price_change_24h)}</div>
        </div>
        <div class="viq-col">
          <div class="viq-val" style="color:${scoreClr}">${scoreNum}</div>
        </div>
      </div>`;
    }).join('');

    renderPagination(effectivePageSize);
    updateTabCounts();
  } catch(e) {
    list.innerHTML = `<div class="loading-row" style="color:var(--red)">Error loading agents. Please refresh.</div>`;
    console.error(e);
  }
}

function updateTabCounts() {
  const tabs = document.querySelectorAll('.category-tab');
  tabs.forEach(tab => {
    const cat = tab.dataset.category;
    const baseLabel = cat || 'All';
    if (!cat && state.totalAgents > 0) {
      const start = ((state.page - 1) * state.pageSize) + 1;
      const end = Math.min(state.page * state.pageSize, state.totalAgents);
      tab.textContent = `${baseLabel} (${start}-${end} of ${state.totalAgents.toLocaleString()})`;
    } else {
      tab.textContent = baseLabel;
    }
  });
}

// ===== PAGINATION =====
function renderPagination(pageSize) {
  const c = document.getElementById('pagination');
  if (state.totalPages <= 1) { c.innerHTML = ''; return; }
  const start = ((state.page - 1) * pageSize) + 1;
  const end = Math.min(state.page * pageSize, state.totalAgents);
  let h = `<div class="pagination-info">${start}-${end} of ${state.totalAgents.toLocaleString()}</div>`;
  h += '<div class="pagination-controls">';
  h += `<button class="page-btn" onclick="gotoPage(${state.page - 1})" ${state.page <= 1 ? 'disabled' : ''}>&laquo;</button>`;
  const s = Math.max(1, state.page - 2);
  const e = Math.min(state.totalPages, state.page + 2);
  for (let p = s; p <= e; p++) {
    h += `<button class="page-btn ${p === state.page ? 'active' : ''}" onclick="gotoPage(${p})">${p}</button>`;
  }
  h += `<button class="page-btn" onclick="gotoPage(${state.page + 1})" ${state.page >= state.totalPages ? 'disabled' : ''}>&raquo;</button>`;
  h += '</div>';
  c.innerHTML = h;
}

function gotoPage(p) {
  if (p < 1 || p > state.totalPages) return;
  state.page = p;
  loadAgents();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== TRIGGER ANALYSIS =====
async function triggerAnalysis(virtualsId) {
  const btn = document.getElementById('generate-analysis-btn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<div class="loading-spinner" style="width:16px;height:16px;margin:0;border-width:2px;display:inline-block;vertical-align:middle"></div> Analyzing...';
  }

  const statusEl = document.getElementById('analysis-status');
  if (statusEl) statusEl.style.display = 'block';

  try {
    const res = await fetch(`/api/analyze/${virtualsId}`, { method: 'POST' });
    if (!res.ok) throw new Error('Analysis request failed');
    const data = await res.json();
    const jobId = data.job_id;

    // Poll for completion
    if (state.jobPollInterval) clearInterval(state.jobPollInterval);
    state.jobPollInterval = setInterval(async () => {
      try {
        const jobRes = await fetch(`/api/job/${jobId}`);
        const job = await jobRes.json();

        if (statusEl) {
          if (job.status === 'running') {
            statusEl.innerHTML = '<div class="loading-spinner" style="width:20px;height:20px;margin:0 auto 8px"></div><div>AI is researching this project... This takes 30-60 seconds.</div>';
          }
        }

        if (job.status === 'completed') {
          clearInterval(state.jobPollInterval);
          state.jobPollInterval = null;
          showToast('Analysis complete!');
          // Reload the modal with fresh data
          openModal(virtualsId);
        } else if (job.status === 'failed') {
          clearInterval(state.jobPollInterval);
          state.jobPollInterval = null;
          showToast('Analysis failed: ' + (job.error || 'Unknown error'), true);
          if (btn) { btn.disabled = false; btn.textContent = 'Retry Analysis'; }
          if (statusEl) statusEl.style.display = 'none';
        }
      } catch(e) {
        console.error('Job poll error:', e);
      }
    }, 3000);

  } catch(e) {
    showToast('Failed to start analysis', true);
    if (btn) { btn.disabled = false; btn.textContent = 'Generate Analysis'; }
    if (statusEl) statusEl.style.display = 'none';
  }
}

function renderVIQReasoning(scores, totalScore, name, cat) {
  if (!scores || !Object.keys(scores).length) return '';

  const entries = Object.entries(scores)
    .map(([k, v]) => ({ key: k, label: cleanFactorLabel(k), score: typeof v === 'object' ? (v.score || v.value || 0) : (v || 0) }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 5);

  const rating = totalScore >= 80 ? 'exceptional' : totalScore >= 60 ? 'strong' : totalScore >= 40 ? 'moderate' : totalScore >= 20 ? 'below average' : 'low';
  const strongest = entries[0];
  const weakest = [...Object.entries(scores)]
    .map(([k, v]) => ({ label: cleanFactorLabel(k), score: typeof v === 'object' ? (v.score || v.value || 0) : (v || 0) }))
    .sort((a, b) => a.score - b.score)[0];

  let summary = `${name} scores ${totalScore}/100 (${rating}). `;
  summary += `Strongest area: ${strongest.label} (${Math.round(strongest.score)}). `;
  if (weakest && weakest.label !== strongest.label) {
    summary += `Needs improvement: ${weakest.label} (${Math.round(weakest.score)}). `;
  }
  summary += `Score is calculated across 24 factors weighted by: First Mover (30%), Team & Execution (28%), Value Pool/TAM (24%), Community & Social (18%).`;

  return `<div class="viq-reasoning">
    <div class="viq-reasoning-title">Why this VIQ Score?</div>
    ${entries.map(e => `<div class="viq-reasoning-item">
      <span class="viq-reasoning-label">${e.label}</span>
      <span class="viq-reasoning-score" style="color:${scoreColor(e.score)}">${Math.round(e.score)}</span>
    </div>`).join('')}
    <div class="viq-reasoning-summary">${summary}</div>
  </div>`;
}

// ===== FACTOR WHY =====
function _factorWhy(key, scores, analysis, agent) {
  const fm = analysis.first_mover || {};
  const team = analysis.team || {};
  const product = analysis.product || {};
  const market = analysis.market || {};
  const community = analysis.community || {};
  const v = scores[key] !== undefined ? Math.round(scores[key]) : 50;

  const map = {
    F1_category_uniqueness: () => fm.category_unique === true
      ? `Novel category \u2014 no direct on-chain comparables identified`
      : fm.category_unique === false
        ? `Operates in a crowded vertical with established on-chain rivals`
        : `Uniqueness score ${v}/100`,
    F2_approach_novelty: () => fm.approach_novel === true
      ? `Approach is architecturally distinct from existing protocol designs`
      : fm.approach_novel === false
        ? `Methodology closely mirrors existing live agents`
        : `Novelty score ${v}/100`,
    F3_cross_chain_originality: () => fm.cross_chain_original === true
      ? `No equivalent exists across Base, Ethereum, or Solana ecosystems`
      : fm.cross_chain_original === false
        ? `Cross-chain equivalents already live on competing networks`
        : `Cross-chain originality ${v}/100`,
    F4_timing_advantage: () => fm.days_ahead_of_competitor
      ? `~${fm.days_ahead_of_competitor}d ahead of nearest competitor`
      : `Timing advantage score ${v}/100`,
    F5_defensibility: () => fm.analysis
      ? `${fm.analysis.slice(0, 120)}${fm.analysis.length > 120 ? '\u2026' : ''}`
      : `Defensibility / moat score ${v}/100`,
    F6_doxx_tier: () => {
      const t = team.doxx_tier || agent.doxx_tier || 3;
      const desc = team.doxx_description || ({1:'Full doxx \u2014 identity publicly verified',2:'Social presence \u2014 pseudonymous with active socials',3:'Anonymous \u2014 no verifiable identity'}[t] || 'Unknown');
      return `${desc}${team.red_flags && team.red_flags.length ? ' \u26A0 ' + team.red_flags[0] : ''}`;
    },
    F7_track_record: () => team.team_summary
      ? `${team.team_summary.slice(0, 130)}${team.team_summary.length > 130 ? '\u2026' : ''}`
      : `Track record score ${v}/100`,
    F8_code_activity: () => {
      const commits = agent.github_commits_30d;
      const stars = agent.github_stars;
      if (commits || stars) return `${commits ? commits + ' commits in last 30d' : ''}${stars ? ' \u00b7 ' + stars + ' GitHub stars' : ''}`;
      return `Code activity score ${v}/100`;
    },
    F9_shipping_cadence: () => product.status
      ? `Product status: ${product.status}${product.description ? ' \u2014 ' + product.description.slice(0, 100) : ''}`
      : `Shipping cadence score ${v}/100`,
    F10_product_status: () => product.description
      ? product.description.slice(0, 140)
      : `Product status score ${v}/100`,
    F11_partnerships: () => product.technical_moat
      ? `${product.technical_moat.slice(0, 130)}${product.technical_moat.length > 130 ? '\u2026' : ''}`
      : `Partnership score ${v}/100`,
    F12_wallet_behavior: () => team.wallet_behavior_score !== undefined
      ? `Wallet behavior score ${Math.round(team.wallet_behavior_score)}/100${v < 40 ? ' \u2014 unusual activity' : v >= 70 ? ' \u2014 healthy distribution' : ''}`
      : `Wallet behavior score ${v}/100`,
    F13_tam: () => market.tam_description
      ? market.tam_description.slice(0, 140)
      : `TAM score ${v}/100`,
    F14_real_world_comparables: () => market.real_world_comparable
      ? `Comparable to ${market.real_world_comparable}`
      : `Real-world comparables score ${v}/100`,
    F15_revenue_model: () => `Revenue model score ${Math.round(market.revenue_model_score || v)}/100${market.saturation_description ? ' \u2014 ' + market.saturation_description.slice(0, 80) : ''}`,
    F16_current_revenue: () => `Current revenue score ${Math.round(market.current_revenue_score || v)}/100${v < 35 ? ' \u2014 no confirmed revenue' : v >= 65 ? ' \u2014 active revenue confirmed' : ''}`,
    F17_mcap_to_tam: () => market.mcap_tam_ratio !== undefined
      ? `MCap/TAM ratio ${market.mcap_tam_ratio.toFixed(4)}`
      : `MCap/TAM score ${v}/100`,
    F18_saturation: () => market.saturation_description
      ? market.saturation_description.slice(0, 130)
      : `Market saturation score ${v}/100`,
    F19_holder_distribution: () => {
      const holders = agent.holder_count;
      return holders
        ? `${fmtNumber(holders)} holders \u2014 distribution score ${v}/100`
        : `Holder distribution score ${v}/100`;
    },
    F20_twitter_engagement: () => {
      const followers = agent.twitter_followers;
      return followers
        ? `${fmtNumber(followers)} Twitter followers \u2014 engagement score ${v}/100`
        : `Twitter engagement score ${v}/100`;
    },
    F21_follower_growth: () => community.follower_growth_score !== undefined
      ? `Follower growth score ${Math.round(community.follower_growth_score)}/100${v >= 65 ? ' \u2014 accelerating' : v < 40 ? ' \u2014 stagnant' : ' \u2014 steady'}`
      : `Follower growth score ${v}/100`,
    F22_community_depth: () => community.community_analysis
      ? community.community_analysis.slice(0, 140)
      : `Community depth score ${v}/100`,
    F23_organic_signals: () => community.organic_score !== undefined
      ? `Organic signal score ${Math.round(community.organic_score)}/100${v >= 65 ? ' \u2014 genuine engagement' : v < 40 ? ' \u2014 bot signals detected' : ''}`
      : `Organic vs paid score ${v}/100`,
    F24_smart_money: () => community.smart_money_score !== undefined
      ? `Smart money score ${Math.round(community.smart_money_score)}/100${v >= 65 ? ' \u2014 notable wallets accumulating' : ''}`
      : `Smart money score ${v}/100`,
  };

  const fn = map[key];
  return fn ? fn() : `Score ${v}/100`;
}

function renderTierBreakdown(scores, analysis, agent) {
  const tiers = [
    { label: 'First Mover (30%)', keys: [
      ['F1_category_uniqueness', 'Category Uniqueness'],
      ['F2_approach_novelty', 'Approach Novelty'],
      ['F3_cross_chain_originality', 'Cross-Chain Original'],
      ['F4_timing_advantage', 'Timing Advantage'],
      ['F5_defensibility', 'Defensibility / Moat'],
    ]},
    { label: 'Team & Execution (28%)', keys: [
      ['F6_doxx_tier', 'Team Visibility'],
      ['F7_track_record', 'Track Record'],
      ['F8_code_activity', 'Code Activity'],
      ['F9_shipping_cadence', 'Shipping Cadence'],
      ['F10_product_status', 'Product Status'],
      ['F11_partnerships', 'Partnerships'],
      ['F12_wallet_behavior', 'Wallet Behavior'],
    ]},
    { label: 'Value Pool / TAM (24%)', keys: [
      ['F13_tam', 'Total Addressable Market'],
      ['F14_real_world_comparables', 'Real-World Comparables'],
      ['F15_revenue_model', 'Revenue Model Clarity'],
      ['F16_current_revenue', 'Current Revenue'],
      ['F17_mcap_to_tam', 'MCap / TAM Ratio'],
      ['F18_saturation', 'Market Saturation'],
    ]},
    { label: 'Community & Social (18%)', keys: [
      ['F19_holder_distribution', 'Holder Distribution'],
      ['F20_twitter_engagement', 'Twitter Engagement'],
      ['F21_follower_growth', 'Follower Growth'],
      ['F22_community_depth', 'Community Depth'],
      ['F23_organic_signals', 'Organic vs Paid'],
      ['F24_smart_money', 'Smart Money'],
    ]},
  ];

  return tiers.map(tier => `
    <div class="tier-header">${tier.label}</div>
    ${tier.keys.map(([key, label]) => {
      const v = scores[key] !== undefined ? Math.round(scores[key]) : 50;
      const color = scoreColor(v);
      const why = _factorWhy(key, scores, analysis, agent);
      return `<div class="tier-factor-row">
        <div class="tier-factor-left">
          <div class="tier-factor-name">${label}</div>
          <div class="tier-factor-why">${why}</div>
        </div>
        <div class="tier-factor-right">
          <div class="tier-factor-score" style="color:${color}">${v}</div>
          <div class="tier-factor-bar">
            <div class="tier-factor-bar-fill" style="width:${v}%;background:${color}"></div>
          </div>
        </div>
      </div>`;
    }).join('')}
  `).join('');
}

function renderForecast(horizon, data, agent) {
  const name = (agent || {}).name || 'This agent';
  if (!data) {
    return `<div class="forecast-card">
      <div class="forecast-horizon">${horizon.toUpperCase()} Horizon</div>
      <div class="forecast-probability" style="color:var(--text-dim)">\u2014</div>
      <div class="forecast-catalyst" style="color:var(--text-dim)">No forecast available for ${escHtml(name)}</div>
    </div>`;
  }
  const prob = data.probability_up || 50;
  const color = prob >= 60 ? '#16A34A' : prob >= 45 ? '#F59E0B' : '#EF4444';
  const rangeLow = data.range_low || 0;
  const rangeHigh = data.range_high || 0;
  const signLow = rangeLow >= 0 ? '+' : '';
  const signHigh = rangeHigh >= 0 ? '+' : '';

  return `<div class="forecast-card">
    <div class="forecast-horizon">${horizon.toUpperCase()} Horizon</div>
    <div class="forecast-probability" style="color:${color}">${prob}%</div>
    <div style="font-size:10px;color:var(--text-dim);margin-bottom:4px">probability bullish</div>
    <div class="forecast-range">${signLow}${rangeLow}% / ${signHigh}${rangeHigh}%</div>
    <div class="forecast-catalyst">${data.catalyst || ''}</div>
  </div>`;
}

// ===== MODAL CLOSE =====
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  document.body.style.overflow = '';
  if (state.jobPollInterval) clearInterval(state.jobPollInterval);
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ===== TOAST =====
let toastTimeout;
function showToast(msg, isError = false) {
  let el = document.querySelector('.toast');
  if (el) el.remove();
  el = document.createElement('div');
  el.className = 'toast';
  if (isError) el.style.background = '#EF4444';
  el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.remove(), 5000);
}

// ===== CATEGORY TAB EVENTS =====
document.querySelectorAll('.category-tab').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    state.category = this.dataset.category;
    if (!state.category) state.sort = 'market_cap';
    state.page = 1;
    loadAgents();
    // Update bottom nav button label
    document.getElementById('btn-category').textContent = 'Category: ' + (state.category || 'All');
    document.getElementById('btn-category').classList.toggle('active', state.category !== '');
  });
});

// ===== TABLE HEADER SORT =====
document.querySelectorAll('.th.sortable').forEach(th => {
  th.addEventListener('click', function() {
    state.sort = this.dataset.sort;
    state.page = 1;
    loadAgents();
  });
});

// ===== SEARCH =====
document.getElementById('search-input').addEventListener('input', function() {
  clearTimeout(state.searchTimeout);
  state.searchTimeout = setTimeout(() => {
    state.search = this.value.trim();
    state.page = 1;
    loadAgents();
  }, 350);
});

// ===== CATEGORY POPUP =====
const ALL_CATEGORIES = ['', 'DeFi', 'Gaming', 'Social', 'Trading', 'Infra', 'Info', 'Entertainment', 'NFT'];

function openCategoryPopup() {
  const overlay = document.getElementById('cat-popup-overlay');
  const grid = document.getElementById('cat-popup-grid');
  grid.innerHTML = ALL_CATEGORIES.map(cat => {
    const label = cat || 'All';
    const isActive = state.category === cat;
    return `<div class="cat-popup-item ${isActive ? 'active' : ''}" data-cat="${cat}">${label}</div>`;
  }).join('');
  overlay.classList.add('active');

  grid.querySelectorAll('.cat-popup-item').forEach(item => {
    item.addEventListener('click', function() {
      state.category = this.dataset.cat;
      state.page = 1;
      // Update top tabs
      document.querySelectorAll('.category-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.category === state.category);
      });
      document.getElementById('btn-category').textContent = 'Category: ' + (state.category || 'All');
      document.getElementById('btn-category').classList.toggle('active', state.category !== '');
      overlay.classList.remove('active');
      loadAgents();
    });
  });
}

document.getElementById('cat-popup-overlay').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('active');
});

// ===== BOTTOM FILTER BUTTONS =====
document.getElementById('btn-category').addEventListener('click', openCategoryPopup);

document.getElementById('btn-status').addEventListener('click', function() {
  const sel = document.getElementById('filter-status');
  const options = Array.from(sel.options);
  const currentIdx = options.findIndex(o => o.value === state.status);
  const nextIdx = (currentIdx + 1) % options.length;
  state.status = options[nextIdx].value;
  this.textContent = options[nextIdx].text;
  this.classList.toggle('active', state.status !== '');
  state.page = 1;
  loadAgents();
});

document.getElementById('btn-doxx').addEventListener('click', function() {
  const sel = document.getElementById('filter-doxx');
  const options = Array.from(sel.options);
  const currentIdx = options.findIndex(o => o.value === state.doxxTier);
  const nextIdx = (currentIdx + 1) % options.length;
  state.doxxTier = options[nextIdx].value;
  this.textContent = options[nextIdx].text;
  this.classList.toggle('active', state.doxxTier !== '');
  state.page = 1;
  loadAgents();
});

document.getElementById('btn-sort').addEventListener('click', function() {
  const sorts = [
    {value: 'market_cap',       label: 'Sort: MCap'},
    {value: 'composite_score',  label: 'Sort: VIQ'},
    {value: 'price_change_24h', label: 'Sort: 24h %'},
    {value: 'newest',           label: 'Sort: New'},
    {value: 'holders',          label: 'Sort: Holders'},
  ];
  const currentIdx = sorts.findIndex(s => s.value === state.sort);
  const nextIdx = (currentIdx + 1) % sorts.length;
  state.sort = sorts[nextIdx].value;
  this.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M11 18h2"/></svg> ${sorts[nextIdx].label}`;
  state.page = 1;
  loadAgents();
});

// ===== ENRICHMENT POLLING =====
let _enrichPollInterval = null;
let _lastAgentCount = 0;

async function checkEnrichmentStatus() {
  try {
    const res = await fetch('/api/status');
    if (!res.ok) return true;
    const data = await res.json();
    const banner = document.getElementById('enrich-banner');
    const msg = document.getElementById('enrich-msg');

    const done = data.status === 'complete' || data.status === 'idle';
    if (!done) {
      const labels = {
        preloading: 'Loading agents from Virtuals Protocol',
        enriching:  'Enriching market data via DexScreener',
        scoring:    'Calculating VIQ scores',
      };
      const label = labels[data.status] || 'Updating data';
      const count = data.total_agents_in_db || 0;
      msg.textContent = `${label}... ${count.toLocaleString()} agents loaded`;
      banner.classList.add('visible');

      if (count !== _lastAgentCount) {
        _lastAgentCount = count;
        loadStats();
        if (state.page === 1) loadAgents();
      }
    } else {
      banner.classList.remove('visible');
    }
    return done;
  } catch(e) {
    return true;
  }
}

async function startEnrichmentPolling() {
  const done = await checkEnrichmentStatus();
  if (done) return;

  _enrichPollInterval = setInterval(async () => {
    const done = await checkEnrichmentStatus();
    if (done) {
      clearInterval(_enrichPollInterval);
      _enrichPollInterval = null;
      loadStats();
    }
  }, 5000);
}

// ===== BOOT =====
(async function init() {
  await loadStats();
  await loadAgents();
  startEnrichmentPolling();
  setInterval(loadStats, 5 * 60 * 1000);
})();
</script>
