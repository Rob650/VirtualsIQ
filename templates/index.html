<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VirtualsIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #FFFFFF;
      --bg-2:       #F8F9FA;
      --bg-3:       #F1F3F5;
      --bg-4:       #E9ECEF;
      --border:     #E5E7EB;
      --border-2:   #D1D5DB;
      --text:       #111827;
      --text-muted: #6B7280;
      --text-dim:   #9CA3AF;

      --green:      #168389;
      --green-bg:   rgba(22,131,137,0.10);
      --green-dark: #168389;
      --red:        #EF4444;
      --red-bg:     rgba(239,68,68,0.10);
      --amber:      #F59E0B;
      --teal:       #0891B2;
      --purple:     #A855F7;

      --radius:     8px;
      --radius-sm:  6px;
      --radius-pill:100px;
      --font-ui:    'Inter', sans-serif;
      --font-data:  'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: 116px;
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-2); }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }

    /* ===== HEADER ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #2DD4BF, #168389);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-data);
      font-weight: 500;
      font-size: 11px;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo-text {
      font-weight: 700;
      font-size: 17px;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      padding: 8px 12px 8px 34px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus { border-color: var(--green); background: #fff; }
    .search-input::placeholder { color: var(--text-dim); }

    /* ===== FILTER TABS ===== */
    .filter-tabs-wrap {
      padding: 10px 16px 0;
      background: #fff;
    }

    .filter-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 10px;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }

    .filter-tab {
      flex-shrink: 0;
      padding: 6px 16px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-tab:hover { border-color: var(--green); color: var(--text); }
    .filter-tab.active { background: var(--green); border-color: var(--green); color: #fff; }

    /* ===== CATEGORY TABS ===== */
    .category-tabs-wrap {
      padding: 0 16px;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }

    .category-tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }

    .category-tab {
      flex-shrink: 0;
      padding: 8px 14px;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      margin-bottom: -1px;
    }

    .category-tab:hover { color: var(--text); }
    .category-tab.active { color: var(--text); border-bottom-color: var(--green); font-weight: 600; }

    /* ===== STATS BAR ===== */
    .stats-bar {
      display: flex;
      align-items: center;
      padding: 7px 16px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .stats-bar::-webkit-scrollbar { display: none; }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
      padding: 0 12px;
    }
    .stat-item:first-child { padding-left: 0; }
    .stat-item + .stat-item { border-left: 1px solid var(--border); }

    .stat-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-dim);
    }

    .stat-value {
      font-family: var(--font-data);
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    /* ===== ENRICHMENT BANNER ===== */
    .enrich-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: rgba(245,158,11,0.08);
      border-bottom: 1px solid rgba(245,158,11,0.2);
      font-size: 12px;
      color: var(--amber);
      font-family: var(--font-data);
    }
    .enrich-banner.visible { display: flex; }

    .enrich-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--amber);
      flex-shrink: 0;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ===== TABLE HEADER ===== */
    .table-header {
      display: grid;
      grid-template-columns: 36px 1fr 92px 62px 52px;
      align-items: center;
      padding: 6px 16px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
    }

    .th {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }
    .th.sortable { cursor: pointer; user-select: none; }
    .th.sortable:hover { color: var(--text-muted); }
    .th.right { text-align: right; }

    /* ===== AGENT ROWS ===== */
    .agent-row {
      display: grid;
      grid-template-columns: 36px 1fr 92px 62px 52px;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }

    .agent-row:hover { background: var(--bg-2); }
    .agent-row:last-child { border-bottom: none; }

    .rank {
      font-family: var(--font-data);
      font-size: 12px;
      color: var(--text-dim);
    }

    .agent-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--bg-3);
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-data);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .agent-info { min-width: 0; }

    .agent-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-ticker {
      font-family: var(--font-data);
      font-size: 11px;
      color: var(--text-dim);
      display: inline;
    }

    .agent-category {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-metrics {
      font-size: 10px;
      color: var(--text-dim);
      font-family: var(--font-data);
      white-space: nowrap;
    }

    .price-col { text-align: right; }

    .price-val {
      font-family: var(--font-data);
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    .mcap-val {
      font-family: var(--font-data);
      font-size: 11px;
      color: var(--text-muted);
    }

    .change-col { text-align: right; }

    .change-val {
      font-family: var(--font-data);
      font-size: 12px;
      font-weight: 500;
    }
    .change-val.positive { color: var(--green-dark); }
    .change-val.negative { color: var(--red); }
    .change-val.neutral  { color: var(--text-muted); }

    .viq-col { text-align: right; }

    .viq-val {
      font-family: var(--font-data);
      font-size: 13px;
      font-weight: 700;
    }

    /* ===== LOADING ===== */
    .loading-row {
      padding: 48px 16px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }

    .loading-spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== PAGINATION ===== */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: #fff;
    }

    .pagination-info {
      font-size: 12px;
      color: var(--text-dim);
      font-family: var(--font-data);
    }

    .pagination-controls { display: flex; gap: 4px; }

    .page-btn {
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-family: var(--font-data);
    }

    .page-btn:hover:not(:disabled) { border-color: var(--green); color: var(--green-dark); }
    .page-btn.active { background: var(--green); border-color: var(--green); color: #fff; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-dim);
    }
    .empty-state-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
    .empty-state-title { font-size: 15px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: #fff;
      border-top: 1px solid var(--border);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }

    .bottom-filters {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }
    .bottom-filters::-webkit-scrollbar { display: none; }

    .bottom-filter-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--bg-2);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .bottom-filter-btn:hover { border-color: var(--green); }
    .bottom-filter-btn.active { background: var(--green); border-color: var(--green); color: #fff; }

    .bottom-tabs { display: flex; }

    .bottom-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      gap: 3px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s;
    }

    .bottom-tab.active { color: var(--green); }
    .bottom-tab svg { width: 20px; height: 20px; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 24px 16px;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 860px;
      position: relative;
      margin: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.10);
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .modal-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--bg-3);
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-data);
      font-size: 16px;
      color: var(--text-muted);
    }
    .modal-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .modal-title-wrap { flex: 1; }

    .modal-agent-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .modal-agent-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .modal-score-ring {
      position: relative;
      width: 64px;
      height: 64px;
      flex-shrink: 0;
    }
    .modal-score-ring svg { transform: rotate(-90deg); }

    .modal-score-value {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .modal-score-num {
      font-family: var(--font-data);
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
    }

    .modal-score-label {
      font-size: 8px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.15s;
    }
    .modal-close:hover { background: var(--red-bg); border-color: var(--red); color: var(--red); }

    .modal-body {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .report-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .report-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .report-narrative {
      color: #168389;
      font-size: 14px;
      line-height: 1.8;
    }
    .report-narrative p {
      margin-bottom: 12px;
      line-height: 1.8;
    }
    .report-narrative p:last-child {
      margin-bottom: 0;
    }
    .report-section-sub {
      font-size: 16px;
      font-weight: 600;
      color: #168389;
      margin-top: 0;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .report-section-sub.primary { font-size: 18px; }
    .report-section-sub.risk { color: #168389; }
    .report-sub-card {
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-2);
      margin-bottom: 10px;
    }
    .report-sub-card:last-child { margin-bottom: 0; }
    .report-sub-card.risk {
      border-color: rgba(239,68,68,0.25);
      background: rgba(239,68,68,0.04);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    @media (max-width: 600px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }

    .metric-tile {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .metric-tile-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }
    .metric-tile-value {
      font-family: var(--font-data);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .metric-tile-value.teal   { color: var(--teal); }
    .metric-tile-value.purple { color: var(--purple); }
    .metric-tile-value.amber  { color: var(--amber); }
    .metric-tile-value.green  { color: var(--green-dark); }
    .metric-tile-value.red    { color: var(--red); }

    .score-breakdown-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }
    @media (max-width: 600px) { .score-breakdown-grid { grid-template-columns: 1fr; } }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .forecast-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
    }
    .forecast-horizon { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; font-family: var(--font-data); }
    .forecast-probability { font-family: var(--font-data); font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .forecast-range { font-family: var(--font-data); font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
    .forecast-catalyst { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .status-badge.sentient  { background: rgba(8,145,178,0.10); color: var(--teal); border: 1px solid rgba(8,145,178,0.25); }
    .status-badge.prototype { background: rgba(245,158,11,0.10); color: var(--amber); border: 1px solid rgba(245,158,11,0.25); }

    .category-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-3);
      border: 1px solid var(--border);
    }

    .doxx-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 500;
    }
    .doxx-badge.tier-1 { background: var(--green-bg); color: var(--green-dark); border: 1px solid rgba(22,131,137,0.25); }
    .doxx-badge.tier-2 { background: rgba(168,85,247,0.10); color: var(--purple); border: 1px solid rgba(168,85,247,0.25); }
    .doxx-badge.tier-3 { background: var(--bg-3); color: var(--text-muted); border: 1px solid var(--border); }

    .risk-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
    }
    .risk-badge.low     { background: var(--green-bg); color: var(--green-dark); border: 1px solid rgba(22,131,137,0.2); }
    .risk-badge.medium  { background: rgba(245,158,11,0.10); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
    .risk-badge.high    { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .risk-badge.extreme { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

    .dex-chart-wrap {
      width: 100%;
      height: 380px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-3);
    }
    .dex-chart-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    .tier-header {
      grid-column: 1 / -1;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      padding-top: 8px;
    }

    .tier-factor-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .tier-factor-row:last-child { border-bottom: none; }
    .tier-factor-left { display: flex; flex-direction: column; gap: 2px; }
    .tier-factor-name { font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .tier-factor-why { font-size: 11px; color: var(--text-dim); line-height: 1.4; }
    .tier-factor-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 48px; }
    .tier-factor-score { font-family: var(--font-data); font-size: 13px; font-weight: 600; }
    .tier-factor-bar { width: 44px; height: 3px; background: var(--bg-4); border-radius: 2px; overflow: hidden; }
    .tier-factor-bar-fill { height: 100%; border-radius: 2px; }

    .score-ring { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring-value {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-data);
      font-size: 10px;
      font-weight: 600;
    }

    .first-mover-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      background: rgba(168,85,247,0.10);
      border: 1px solid rgba(168,85,247,0.3);
      color: var(--purple);
      font-size: 8px; font-weight: 700;
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    }

    .toast {
      position: fixed;
      bottom: 130px;
      right: 16px;
      background: var(--text);
      color: #fff;
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      z-index: 2000;
      animation: fadeIn 0.2s ease;
      max-width: 280px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== TRENDING STRIP ===== */
    #trending-strip {
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      overflow: hidden;
    }
    #trending-strip-inner {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      align-items: flex-start;
    }
    #trending-strip-inner::-webkit-scrollbar { display: none; }
    .trending-section { flex-shrink: 0; }
    .trending-section-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--text-dim); margin-bottom: 4px;
    }
    .trending-cards { display: flex; gap: 5px; }
    .trending-card {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 9px; background: #fff; border: 1px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer;
      transition: border-color 0.15s; white-space: nowrap;
    }
    .trending-card:hover { border-color: var(--green); }
    .trending-card-name { font-size: 12px; font-weight: 600; color: var(--text); }
    .trending-card-val { font-family: var(--font-data); font-size: 11px; }
    .trending-sep {
      width: 1px; background: var(--border); align-self: stretch;
      margin: 0 10px; flex-shrink: 0;
    }

    /* ===== DETAIL VIEW ===== */
    #detail-view { display: none; }
    .detail-back-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      background: var(--bg-2);
    }
    .detail-back-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px; background: #fff; border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-muted); font-size: 13px;
      font-weight: 500; cursor: pointer; transition: all 0.15s; font-family: var(--font-ui);
    }
    .detail-back-btn:hover { border-color: var(--green); color: var(--text); }
    .detail-breadcrumb { font-size: 12px; color: var(--text-muted); }
    .detail-header {
      padding: 20px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: 14px; flex-wrap: wrap;
    }
    .detail-avatar {
      width: 64px; height: 64px; border-radius: 50%; background: var(--bg-3);
      overflow: hidden; flex-shrink: 0; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-data); font-size: 18px; color: var(--text-muted);
    }
    .detail-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .detail-title-wrap { flex: 1; min-width: 180px; }
    .detail-agent-name { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 2px; }
    .detail-agent-ticker { font-family: var(--font-data); font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
    .detail-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .detail-ext-link {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: var(--radius-pill);
      font-size: 11px; font-weight: 600; text-decoration: none; transition: all 0.15s;
    }
    .detail-ext-link.virtuals {
      background: var(--green-bg); border: 1px solid rgba(22,131,137,0.3); color: var(--green-dark);
    }
    .detail-ext-link.virtuals:hover { background: var(--green); color: #fff; }
    .detail-ext-link.dex {
      background: rgba(8,145,178,0.08); border: 1px solid rgba(8,145,178,0.25); color: var(--teal);
    }
    .detail-ext-link.dex:hover { background: var(--teal); color: #fff; }
    .detail-score-wrap { flex-shrink: 0; text-align: center; }
    .detail-body { padding: 16px; display: flex; flex-direction: column; gap: 20px; }
    @media (min-width: 768px) {
      .detail-body { max-width: 860px; margin: 0 auto; padding: 20px 24px; }
      .detail-header { padding: 20px 24px; }
      .detail-back-bar { padding: 10px 24px; }

    /* ===== WATCHLIST ===== */
    .star-btn {
      background: none; border: none; cursor: pointer; color: var(--text-dim);

    }

    }

    @media (min-width: 1024px) {
      .table-header, .agent-row { grid-template-columns: 44px 1fr 140px 90px 80px; }
    }
  </style>
</head>

<script>
const DETAIL_AGENT_ID = '{{ detail_agent_id or "" }}';

// ===== STATE =====
const state = {
  page: 1,
  pageSize: 25,
  sort: 'market_cap',
  category: '',
  status: '',
  doxxTier: '',
  search: '',
  total: 0,
  totalPages: 0,
  searchTimeout: null,
  currentAgent: null,
  jobPollInterval: null,
  watchlistFilter: false,
};

// ===== UTILITIES =====
function fmtMcap(v) {
  if (!v || isNaN(v)) return '—';
  if (v >= 1e9) return '$' + (v/1e9).toFixed(2) + 'B';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(2) + 'M';
  if (v >= 1e3) return '$' + (v/1e3).toFixed(1) + 'K';
  return '$' + v.toFixed(2);
}

function fmtChange(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  const sign = v >= 0 ? '+' : '';
  return sign + parseFloat(v).toFixed(2) + '%';
}

function fmtNumber(v) {
  if (!v) return '—';
  return parseInt(v).toLocaleString();
}

function fmtCompact(v) {
  if (!v || isNaN(v)) return '—';
  if (v >= 1e6) return (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v/1e3).toFixed(0) + 'K';
  return String(v);
}

function scoreColor(score) {
  if (score >= 75) return '#168389';
  if (score >= 50) return '#A855F7';
  if (score >= 30) return '#F59E0B';
  return '#EF4444';
}

function tierColor(tier) {
  const map = {
    'Top Tier': '#168389',
    'Strong': '#A855F7',
    'Moderate': '#F59E0B',
    'Weak': '#EF4444',
    'Avoid': '#EF4444',
  };
  return map[tier] || '#6B7280';
}

function initials(name) {
  if (!name) return '?';
  return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
}

function scoreRingHTML(score, size=42, sw=4) {
  const r = (size/2) - sw;
  const circ = 2 * Math.PI * r;
  const fill = ((score || 0) / 100) * circ;
  const color = scoreColor(score);
  return `<div class="score-ring">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--bg-4)" stroke-width="${sw}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}"
        stroke-dasharray="${circ}" stroke-dashoffset="${circ - fill}" stroke-linecap="round"/>
    </svg>
    <div class="score-ring-value" style="color:${color}">${Math.round(score||0)}</div>
  </div>`;
}

// ===== STATS =====
async function loadStats() {
  try {
    const res = await fetch('/api/stats');
    const data = await res.json();
    document.getElementById('stat-total').textContent = (data.total_agents||0).toLocaleString();
    document.getElementById('stat-avg-score').textContent = Math.round(data.avg_score||0);
    document.getElementById('stat-sentient').textContent = (data.sentient_count||0).toLocaleString();
    if (data.vol_24h_total) {
      document.getElementById('stat-vol').textContent = fmtMcap(data.vol_24h_total);
    }
  } catch(e) {}
}

// ===== AGENT LIST =====
async function loadAgents() {
  const list = document.getElementById('agent-list');
  list.innerHTML = '<div class="loading-row"><div class="loading-spinner"></div>Loading agents...</div>';

  const params = new URLSearchParams({
    page: state.page,
    page_size: state.pageSize,
    sort: state.sort,
  });
  if (state.category) params.set('category', state.category);
  if (state.status)   params.set('status', state.status);
  if (state.doxxTier) params.set('doxx_tier', state.doxxTier);
  if (state.search)   params.set('search', state.search);

  try {
    const res = await fetch(`/api/agents?${params}`);
    const data = await res.json();

    state.total = data.total || 0;
    state.totalPages = data.total_pages || 1;

    if (!data.agents || data.agents.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-state-icon">🔍</div>
        <div class="empty-state-title">No agents found</div>
        <div>Try adjusting your filters</div>
      </div>`;
      renderPagination();
      return;
    }

    const offset = (state.page - 1) * state.pageSize;
    list.innerHTML = data.agents.map((a, i) => {
      const rank = offset + i + 1;
      const change = parseFloat(a.price_change_24h || 0);
      const changeClass = change >= 0 ? 'positive' : 'negative';
      const scoreNum = Math.round(a.composite_score || 50);
      const scoreClr = scoreColor(scoreNum);
      const categoryLabel = a.agent_type || '';
      const statusLabel = a.status || 'Prototype';
      const vol  = a.volume_24h   ? 'VOL '  + fmtMcap(a.volume_24h)     : '';
      const mc   = a.market_cap   ? 'MCAP ' + fmtMcap(a.market_cap)     : '';
      const hl   = a.holder_count ? 'HL '   + fmtCompact(a.holder_count) : '';
      const metricLine = [vol, mc, hl].filter(Boolean).join('  ');
      const priceStr = a.price ? '$' + parseFloat(a.price).toPrecision(4) : '—';

      const watched = isWatched(a.virtuals_id);
      return `<div class="agent-row" onclick="navigateToAgent('${a.virtuals_id}')">
        <div class="rank">${rank}</div>
        <div class="agent-cell">
          <div class="avatar">
            ${a.image_url
              ? `<img src="${a.image_url}" alt="${a.name}" onerror="this.parentElement.textContent='${initials(a.name)}'"/>`
              : initials(a.name)}
          </div>
          <div class="agent-info">
            <div class="agent-name">${a.name}</div>
            <div class="agent-ticker">${a.ticker || ''}</div>
            ${categoryLabel || statusLabel ? `<div class="agent-category">${categoryLabel}${categoryLabel && statusLabel ? ' · ' : ''}${statusLabel}</div>` : ''}
            ${metricLine ? `<div class="agent-metrics">${metricLine}</div>` : ''}
          </div>
        </div>
        <div class="price-col">
          <div class="price-val">${priceStr}</div>
          <div class="mcap-val">${fmtMcap(a.market_cap)}</div>
        </div>
        <div class="change-col">
          <div class="change-val ${changeClass}">${fmtChange(a.price_change_24h)}</div>
        </div>
        <div class="viq-col">
          <div class="viq-val" style="color:${scoreClr}">${scoreNum}</div>
          <button class="star-btn ${watched ? 'starred' : ''}" data-id="${a.virtuals_id}"
            onclick="event.stopPropagation();toggleWatchlist('${a.virtuals_id}')"
            title="${watched ? 'Remove from watchlist' : 'Add to watchlist'}">${watched ? '★' : '☆'}</button>
        </div>
      </div>`;
    }).join('');

    renderPagination();
  } catch(e) {
    list.innerHTML = `<div class="loading-row" style="color:var(--red)">Error loading agents. <button onclick="loadAgents()" style="margin-left:10px;padding:4px 12px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-size:12px;cursor:pointer">Retry</button></div>`;
    console.error(e);
  }
}

function renderPagination() {
  const bar = document.getElementById('pagination-bar');
  const info = document.getElementById('pagination-info');
  const controls = document.getElementById('pagination-controls');

  if (state.totalPages <= 1) { bar.style.display = 'none'; return; }

  bar.style.display = 'flex';
  const start = (state.page-1)*state.pageSize + 1;
  const end = Math.min(state.page*state.pageSize, state.total);
  info.textContent = `${start}–${end} of ${state.total.toLocaleString()}`;

  const pages = [];
  const p = state.page, tp = state.totalPages;
  pages.push(1);
  if (p > 3) pages.push('…');
  for (let i = Math.max(2,p-1); i <= Math.min(tp-1,p+1); i++) pages.push(i);
  if (p < tp-2) pages.push('…');
  if (tp > 1) pages.push(tp);

  controls.innerHTML = `
    <button class="page-btn" onclick="gotoPage(${p-1})" ${p<=1?'disabled':''}>‹</button>
    ${pages.map(x => x === '…'
      ? `<span style="padding:0 4px;color:var(--text-dim)">…</span>`
      : `<button class="page-btn ${x===p?'active':''}" onclick="gotoPage(${x})">${x}</button>`
    ).join('')}
    <button class="page-btn" onclick="gotoPage(${p+1})" ${p>=tp?'disabled':''}>›</button>`;
}

function gotoPage(p) {
  if (p < 1 || p > state.totalPages) return;
  state.page = p;
  loadAgents();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

async function openModal(virtualsId) {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';

  document.getElementById('modal-agent-name').textContent = 'Loading...';
  document.getElementById('modal-agent-meta').innerHTML = '';
  document.getElementById('modal-avatar').innerHTML = '';
  document.getElementById('modal-score-num').textContent = '—';
  document.getElementById('modal-ring-arc').style.strokeDashoffset = '163.4';
  document.getElementById('modal-body').innerHTML = `
    <div style="text-align:center;padding:60px">
      <div class="loading-spinner" style="margin:0 auto 16px"></div>
      <div style="color:var(--text-dim)">Loading intelligence report...</div>
    </div>`;

  try {
    const res = await fetch(`/api/agent/${virtualsId}`);
    if (!res.ok) throw new Error('Agent not found');
    const agent = await res.json();
    renderModal(agent);
  } catch(e) {
    document.getElementById('modal-body').innerHTML =
      `<div style="text-align:center;padding:48px;color:var(--red)">Failed to load agent data.</div>`;
  }
}

function formatText(text) {
  if (!text) return '';
  return text.split('\n').filter(p => p.trim()).map(p => '<p style="margin-bottom:12px;line-height:1.7;color:#168389">' + p + '</p>').join('');
}

function _factorWhy(key, scores, analysis, agent) {
  const fm = analysis.first_mover || {};
  const team = analysis.team || {};
  const product = analysis.product || {};
  const market = analysis.market || {};
  const community = analysis.community || {};
  const v = scores[key] !== undefined ? Math.round(scores[key]) : 50;

  const map = {
    F1_category_uniqueness: () => fm.category_unique === true
      ? `Novel category — no direct on-chain comparables identified`
      : fm.category_unique === false
        ? `Operates in a crowded vertical with established on-chain rivals`
        : `Uniqueness score ${v}/100 — insufficient data to confirm originality`,
    F2_approach_novelty: () => fm.approach_novel === true
      ? `Approach is architecturally distinct from existing protocol designs`
      : fm.approach_novel === false
        ? `Methodology closely mirrors existing live agents`
        : `Novelty score ${v}/100`,
    F3_cross_chain_originality: () => fm.cross_chain_original === true
      ? `No equivalent exists across Base, Ethereum, or Solana ecosystems`
      : fm.cross_chain_original === false
        ? `Cross-chain equivalents already live on competing networks`
        : `Cross-chain originality ${v}/100`,
    F4_timing_advantage: () => fm.days_ahead_of_competitor
      ? `~${fm.days_ahead_of_competitor}d ahead of nearest competitor — timing moat is ${v >= 65 ? 'strong' : v >= 45 ? 'moderate' : 'thin'}`
      : `Timing advantage score ${v}/100 — competitor launch data unavailable`,
    F5_defensibility: () => fm.analysis
      ? `${fm.analysis.slice(0, 120)}${fm.analysis.length > 120 ? '…' : ''}`
      : `Defensibility / moat score ${v}/100`,
    F6_doxx_tier: () => {
      const tier = team.doxx_tier || agent.doxx_tier || 3;
      const desc = team.doxx_description || ({1:'Full doxx — identity publicly verified',2:'Social presence — pseudonymous with active socials',3:'Anonymous — no verifiable identity'}[tier] || 'Unknown');
      return `${desc}${team.red_flags && team.red_flags.length ? ` ⚠ ${team.red_flags[0]}` : ''}`;
    },
    F7_track_record: () => team.team_summary
      ? `${team.team_summary.slice(0, 130)}${team.team_summary.length > 130 ? '…' : ''}`
      : `Track record score ${v}/100 — limited verifiable history`,
    F8_code_activity: () => {
      const commits = agent.github_commits_30d;
      const stars = agent.github_stars;
      if (commits || stars) return `${commits ? commits + ' commits in last 30d' : 'Commit data unavailable'}${stars ? ' · ' + stars + ' GitHub stars' : ''}`;
      return `Code activity score ${v}/100 — no public repository linked`;
    },
    F9_shipping_cadence: () => product.status
      ? `Product status: ${product.status}${product.description ? ' — ' + product.description.slice(0, 100) : ''}`
      : `Shipping cadence score ${v}/100`,
    F10_product_status: () => product.description
      ? product.description.slice(0, 140)
      : `Product status score ${v}/100 — no shipped deliverables confirmed`,
    F11_partnerships: () => product.technical_moat
      ? `${product.technical_moat.slice(0, 130)}${product.technical_moat.length > 130 ? '…' : ''}${product.red_flags && product.red_flags.length ? ' ⚠ ' + product.red_flags[0] : ''}`
      : `Partnership score ${v}/100`,
    F12_wallet_behavior: () => team.wallet_behavior_score !== undefined
      ? `Wallet behavior score ${Math.round(team.wallet_behavior_score)}/100${v < 40 ? ' — unusual wallet activity detected' : v >= 70 ? ' — healthy distribution, no suspicious sells' : ''}`
      : `Wallet behavior score ${v}/100`,
    F13_tam: () => market.tam_description
      ? market.tam_description.slice(0, 140)
      : `TAM score ${v}/100`,
    F14_real_world_comparables: () => market.real_world_comparable
      ? `Comparable to ${market.real_world_comparable} — comparables score ${Math.round(market.comparables_score || v)}/100`
      : `Real-world comparables score ${v}/100`,
    F15_revenue_model: () => `Revenue model score ${Math.round(market.revenue_model_score || v)}/100${market.saturation_description ? ' — ' + market.saturation_description.slice(0, 80) : ''}`,
    F16_current_revenue: () => `Current revenue score ${Math.round(market.current_revenue_score || v)}/100${v < 35 ? ' — no confirmed revenue stream' : v >= 65 ? ' — active revenue generation confirmed' : ' — early-stage revenue signals'}`,
    F17_mcap_to_tam: () => market.mcap_tam_ratio !== undefined
      ? `MCap/TAM ratio ${market.mcap_tam_ratio.toFixed(4)} — ${market.mcap_tam_ratio < 0.001 ? 'highly undervalued relative to addressable market' : market.mcap_tam_ratio > 0.1 ? 'market cap aggressive vs TAM' : 'reasonable penetration rate'}`
      : `MCap/TAM score ${v}/100`,
    F18_saturation: () => market.saturation_description
      ? market.saturation_description.slice(0, 130)
      : `Market saturation score ${v}/100`,
    F19_holder_distribution: () => {
      const holders = agent.holder_count;
      return holders
        ? `${fmtNumber(holders)} holders — distribution score ${v}/100${v >= 65 ? ', healthy spread' : v < 40 ? ', concentrated ownership risk' : ''}`
        : `Holder distribution score ${v}/100`;
    },
    F20_twitter_engagement: () => {
      const followers = agent.twitter_followers;
      return followers
        ? `${fmtNumber(followers)} Twitter followers — engagement score ${v}/100`
        : `Twitter engagement score ${v}/100 — no linked account`;
    },
    F21_follower_growth: () => community.follower_growth_score !== undefined
      ? `Follower growth score ${Math.round(community.follower_growth_score)}/100${v >= 65 ? ' — accelerating growth trend' : v < 40 ? ' — stagnant or declining' : ' — steady growth'}`
      : `Follower growth score ${v}/100`,
    F22_community_depth: () => community.community_analysis
      ? community.community_analysis.slice(0, 140)
      : `Community depth score ${v}/100`,
    F23_organic_signals: () => community.organic_score !== undefined
      ? `Organic signal score ${Math.round(community.organic_score)}/100${v >= 65 ? ' — engagement appears genuine' : v < 40 ? ' — bot/paid signals detected' : ' — mixed organic/paid signals'}`
      : `Organic vs paid score ${v}/100`,
    F24_smart_money: () => community.smart_money_score !== undefined
      ? `Smart money score ${Math.round(community.smart_money_score)}/100${v >= 65 ? ' — known protocol wallets accumulating' : v < 40 ? ' — no smart money participation detected' : ' — some notable wallet activity'}`
      : `Smart money score ${v}/100`,
  };

  const fn = map[key];
  return fn ? fn() : `Score ${v}/100`;
}

  const tiers = [

      ['F7_track_record', 'Track Record'],
      ['F8_code_activity', 'Code Activity'],
      ['F9_shipping_cadence', 'Shipping Cadence'],
      ['F10_product_status', 'Product Status'],
      ['F11_partnerships', 'Partnerships'],
      ['F12_wallet_behavior', 'Wallet Behavior'],
    ]},
    { label: 'TIER 3 — VALUE POOL / TAM (24%)', keys: [
      ['F13_tam', 'Total Addressable Market'],
      ['F14_real_world_comparables', 'Real-World Comparables'],
      ['F15_revenue_model', 'Revenue Model Clarity'],
      ['F16_current_revenue', 'Current Revenue'],
      ['F17_mcap_to_tam', 'MCap / TAM Ratio'],
      ['F18_saturation', 'Market Saturation'],
    ]},
    { label: 'TIER 4 — COMMUNITY & SOCIAL (18%)', keys: [
      ['F19_holder_distribution', 'Holder Distribution'],
      ['F20_twitter_engagement', 'Twitter Engagement'],
      ['F21_follower_growth', 'Follower Growth'],
      ['F22_community_depth', 'Community Depth'],
      ['F23_organic_signals', 'Organic vs Paid'],
      ['F24_smart_money', 'Smart Money'],
    ]},
  ];

  return tiers.map(tier => `
    <div class="tier-header">${tier.label}</div>
    ${tier.keys.map(([key, label]) => {
      const v = scores[key] !== undefined ? Math.round(scores[key]) : 50;
      const color = scoreColor(v);
      const why = _factorWhy(key, scores, analysis, agent);
      return `<div class="tier-factor-row">
        <div class="tier-factor-left">
          <div class="tier-factor-name">${label}</div>
          <div class="tier-factor-why">${why}</div>
        </div>
        <div class="tier-factor-right">
          <div class="tier-factor-score" style="color:${color}">${v}</div>
          <div class="tier-factor-bar">
            <div class="tier-factor-bar-fill" style="width:${v}%;background:${color}"></div>
          </div>
        </div>
      </div>`;
    }).join('')}
  `).join('');
}

function renderForecast(horizon, data) {
  if (!data) {
    return `<div class="forecast-card">
      <div class="forecast-horizon">${horizon.toUpperCase()} Horizon</div>
      <div class="forecast-probability" style="color:var(--text-dim)">—</div>
      <div class="forecast-catalyst" style="color:var(--text-dim)">No forecast available</div>
    </div>`;
  }
  const prob = data.probability_up || 50;
  const color = prob >= 60 ? '#168389' : prob >= 45 ? '#F59E0B' : '#EF4444';
  const rangeLow = data.range_low || 0;
  const rangeHigh = data.range_high || 0;
  const signLow = rangeLow >= 0 ? '+' : '';
  const signHigh = rangeHigh >= 0 ? '+' : '';

  return `<div class="forecast-card">
    <div class="forecast-horizon">${horizon.toUpperCase()} Horizon</div>
    <div class="forecast-probability" style="color:${color}">${prob}%</div>
    <div style="font-size:10px;color:var(--text-dim);margin-bottom:4px">probability bullish</div>
    <div class="forecast-range">${signLow}${rangeLow}% / ${signHigh}${rangeHigh}%</div>
    <div class="forecast-catalyst">${data.catalyst || ''}</div>
  </div>`;
}

// ===== WATCHLIST =====
function getWatchlist() {
  try { return new Set(JSON.parse(localStorage.getItem('viq_watchlist') || '[]')); }
  catch(e) { return new Set(); }
}
function saveWatchlist(wl) {
  localStorage.setItem('viq_watchlist', JSON.stringify([...wl]));
}
function isWatched(id) { return getWatchlist().has(String(id)); }

function toggleWatchlist(id) {
  const wl = getWatchlist();
  const sid = String(id);
  if (wl.has(sid)) { wl.delete(sid); } else { wl.add(sid); }
  saveWatchlist(wl);
  document.querySelectorAll(`.star-btn[data-id="${sid}"]`).forEach(btn => {
    const now = wl.has(sid);
    btn.textContent = now ? '★' : '☆';
    btn.classList.toggle('starred', now);
    btn.title = now ? 'Remove from watchlist' : 'Add to watchlist';
  });
  updateWatchlistBtn();
}

function updateWatchlistBtn() {
  const wl = getWatchlist();
  const btn = document.getElementById('btn-watchlist');
  if (!btn) return;
  if (wl.size > 0) {
    btn.style.display = 'flex';
    btn.innerHTML = `★ Watchlist (${wl.size})`;
    btn.classList.toggle('active', state.watchlistFilter);
  } else {
    btn.style.display = 'none';
    state.watchlistFilter = false;
  }
}

document.getElementById('btn-watchlist').addEventListener('click', function() {
  state.watchlistFilter = !state.watchlistFilter;
  this.classList.toggle('active', state.watchlistFilter);
  state.page = 1;
  if (state.watchlistFilter) {
    renderWatchlistView();
  } else {
    loadAgents();
  }
});

// ===== BOTTOM TAB EVENTS =====
document.querySelectorAll('.bottom-tab').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.bottom-tab').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    const tabId = this.id; // e.g. "tab-watchlist"
    if (tabId === 'tab-watchlist') {
      state.watchlistFilter = true;
      state.page = 1;
      renderWatchlistView();
    } else {
      if (state.watchlistFilter) {
        state.watchlistFilter = false;
        state.page = 1;
        loadAgents();
      }
    }
  });
});

async function renderWatchlistView() {
  const wl = getWatchlist();
  if (wl.size === 0) {
    document.getElementById('agent-list').innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">☆</div>
      <div class="empty-state-title">No watchlist items</div>
      <div>Tap ☆ on any agent row to add it</div>
    </div>`;
    document.getElementById('pagination-bar').style.display = 'none';
    return;
  }
  const list = document.getElementById('agent-list');
  list.innerHTML = '<div class="loading-row"><div class="loading-spinner"></div>Loading watchlist...</div>';
  try {
    const ids = [...wl];
    const results = await Promise.all(ids.map(id => fetch(`/api/agent/${id}`).then(r => r.ok ? r.json() : null)));
    const agents = results.filter(Boolean);
    if (!agents.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">☆</div><div class="empty-state-title">No agents found</div></div>`;
      return;
    }
    list.innerHTML = agents.map((a, i) => {
      const change = parseFloat(a.price_change_24h || 0);
      const changeClass = change >= 0 ? 'positive' : 'negative';
      const scoreNum = Math.round(a.composite_score || 50);
      const scoreClr = scoreColor(scoreNum);
      const categoryLabel = a.agent_type || '';
      const statusLabel = a.status || 'Prototype';
      const vol  = a.volume_24h   ? 'VOL '  + fmtMcap(a.volume_24h)      : '';
      const mc   = a.market_cap   ? 'MCAP ' + fmtMcap(a.market_cap)      : '';
      const hl   = a.holder_count ? 'HL '   + fmtCompact(a.holder_count) : '';
      const metricLine = [vol, mc, hl].filter(Boolean).join('  ');
      const priceStr = a.price ? '$' + parseFloat(a.price).toPrecision(4) : '—';
      return `<div class="agent-row" onclick="navigateToAgent('${a.virtuals_id}')">
        <div class="rank">${i + 1}</div>
        <div class="agent-cell">
          <div class="avatar">${a.image_url ? `<img src="${a.image_url}" alt="${a.name}" onerror="this.parentElement.textContent='${initials(a.name)}'"/>` : initials(a.name)}</div>
          <div class="agent-info">
            <div class="agent-name">${a.name}</div>
            <div class="agent-ticker">${a.ticker || ''}</div>
            ${categoryLabel || statusLabel ? `<div class="agent-category">${categoryLabel}${categoryLabel && statusLabel ? ' · ' : ''}${statusLabel}</div>` : ''}
            ${metricLine ? `<div class="agent-metrics">${metricLine}</div>` : ''}
          </div>
        </div>
        <div class="price-col"><div class="price-val">${priceStr}</div><div class="mcap-val">${fmtMcap(a.market_cap)}</div></div>
        <div class="change-col"><div class="change-val ${changeClass}">${fmtChange(a.price_change_24h)}</div></div>
        <div class="viq-col">
          <div class="viq-val" style="color:${scoreClr}">${scoreNum}</div>
          <button class="star-btn starred" data-id="${a.virtuals_id}" onclick="event.stopPropagation();toggleWatchlist('${a.virtuals_id}')" title="Remove from watchlist">★</button>
        </div>
      </div>`;
    }).join('');
    document.getElementById('pagination-bar').style.display = 'none';
  } catch(e) {
    list.innerHTML = `<div class="loading-row" style="color:var(--red)">Error loading watchlist.</div>`;
  }
}

// ===== TRENDING STRIP =====
async function loadTrendingStrip() {
  try {
    const res = await fetch('/api/trending-strip');
    if (!res.ok) return;
    const data = await res.json();
    renderTrendingStrip(data);
  } catch(e) {}
}

function renderTrendingStrip(data) {
  const strip = document.getElementById('trending-strip');
  const inner = document.getElementById('trending-strip-inner');
  if (!strip || !inner) return;

  const movers  = data.top_movers   || data.movers        || [];
  const newAgts  = data.new_launches || data.new_agents    || [];
  const changes = data.score_changes || data.score_deltas  || [];

  if (!movers.length && !newAgts.length && !changes.length) return;

  const sections = [];

  if (movers.length) {
    sections.push(`<div class="trending-section">
      <div class="trending-section-label">🔥 Top Movers</div>
      <div class="trending-cards">
        ${movers.slice(0, 5).map(a => `
          <div class="trending-card" onclick="navigateToAgent('${a.virtuals_id}')">
            <span class="trending-card-name">${a.ticker || a.name}</span>
            <span class="trending-card-val ${parseFloat(a.price_change_24h||0)>=0?'positive':'negative'}" style="color:${parseFloat(a.price_change_24h||0)>=0?'var(--green-dark)':'var(--red)'}">${fmtChange(a.price_change_24h)}</span>
          </div>`).join('')}
      </div>
    </div>`);
  }

  if (newAgts.length) {
    if (sections.length) sections.push('<div class="trending-sep"></div>');
    sections.push(`<div class="trending-section">
      <div class="trending-section-label">🆕 New Launches</div>
      <div class="trending-cards">
        ${newAgts.slice(0, 5).map(a => `
          <div class="trending-card" onclick="navigateToAgent('${a.virtuals_id}')">
            <span class="trending-card-name">${a.ticker || a.name}</span>
            <span class="trending-card-val" style="color:var(--teal)">${fmtMcap(a.market_cap) !== '—' ? fmtMcap(a.market_cap) : 'New'}</span>
          </div>`).join('')}
      </div>
    </div>`);
  }

  if (changes.length) {
    if (sections.length) sections.push('<div class="trending-sep"></div>');
    sections.push(`<div class="trending-section">
      <div class="trending-section-label">📈 Score Changes</div>
      <div class="trending-cards">
        ${changes.slice(0, 5).map(a => `
          <div class="trending-card" onclick="navigateToAgent('${a.virtuals_id}')">
            <span class="trending-card-name">${a.ticker || a.name}</span>
            <span class="trending-card-val" style="color:var(--purple)">VIQ ${Math.round(a.composite_score||a.score||50)}</span>
          </div>`).join('')}
      </div>
    </div>`);
  }

  inner.innerHTML = sections.join('');
  strip.style.display = 'block';
}

// ===== SPA NAVIGATION =====
function navigateToAgent(id) {
  window.history.pushState({ agentId: id }, '', `/agent/${id}`);
  showDetailPage(id);
}

function navigateBack() {
  window.history.pushState({}, '', '/');
  hideDetailPage();
  loadAgents();
}

function showDetailPage(id) {
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  loadDetailAgent(id);
}

function hideDetailPage() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  document.getElementById('detail-breadcrumb').textContent = '';
}

async function loadDetailAgent(id) {
  const content = document.getElementById('detail-content');
  content.innerHTML = `<div style="text-align:center;padding:60px">
    <div class="loading-spinner" style="margin:0 auto 16px"></div>
    <div style="color:var(--text-dim);font-size:13px">Loading intelligence report...</div>
  </div>`;
  try {
    const res = await fetch(`/api/agent/${id}`);
    if (!res.ok) throw new Error('Not found');
    const agent = await res.json();
    document.getElementById('detail-breadcrumb').textContent = agent.name || '';
    renderDetailContent(agent);
  } catch(e) {
    content.innerHTML = `<div style="text-align:center;padding:60px;color:var(--red)">
      Failed to load agent.
      <br><button onclick="loadDetailAgent('${id}')" style="margin-top:12px;padding:6px 16px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:13px">Retry</button>
    </div>`;
  }
}

function renderDetailContent(agent) {
  const score = Math.round(agent.composite_score || 50);
  const tier  = agent.tier_classification || 'Moderate';
  const color = scoreColor(score);
  const statusClass = agent.status === 'Sentient' ? 'sentient' : 'prototype';
  const doxxClass   = `tier-${agent.doxx_tier || 3}`;
  const doxxLabel   = {1:'Full Doxx', 2:'Social Presence', 3:'Anonymous'}[agent.doxx_tier] || 'Anonymous';
  const risk        = (agent.analysis_json?.risk?.overall_risk || 'medium').toLowerCase();
  const r = 29;
  const circ = 2 * Math.PI * r;
  const offset = circ - (score / 100) * circ;

  const virtualsUrl = `https://app.virtuals.io/virtuals/${agent.virtuals_id}`;
  const dexUrl = agent.contract_address ? `https://dexscreener.com/base/${agent.contract_address}` : null;

  const watched = isWatched(agent.virtuals_id);

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-header">
      <div class="detail-avatar">
        ${agent.image_url
          ? `<img src="${agent.image_url}" alt="${agent.name}" onerror="this.parentElement.textContent='${initials(agent.name)}'"/>`
          : initials(agent.name)}
      </div>
      <div class="detail-title-wrap">
        <div class="detail-agent-name">${agent.name}</div>
        <div class="detail-agent-ticker">${agent.ticker || ''}</div>
        <div class="detail-meta">
          <span class="status-badge ${statusClass}">${agent.status || 'Prototype'}</span>
          <span class="category-badge">${agent.agent_type || '—'}</span>
          <span class="doxx-badge ${doxxClass}">${doxxLabel}</span>
          <span class="risk-badge ${risk}">${risk} risk</span>
          ${agent.first_mover ? '<div class="first-mover-badge" title="First Mover">1ST</div>' : ''}
          <a href="${virtualsUrl}" target="_blank" rel="noopener" class="detail-ext-link virtuals">↗ Virtuals</a>
          ${dexUrl ? `<a href="${dexUrl}" target="_blank" rel="noopener" class="detail-ext-link dex">📊 DexScreener</a>` : ''}
          <button class="star-btn ${watched ? 'starred' : ''}" data-id="${agent.virtuals_id}"
            onclick="toggleWatchlist('${agent.virtuals_id}')"
            title="${watched ? 'Remove from watchlist' : 'Add to watchlist'}">${watched ? '★' : '☆'}</button>
        </div>
      </div>
      <div class="detail-score-wrap">
        <div style="position:relative;width:72px;height:72px">
          <svg width="72" height="72" viewBox="0 0 72 72" style="transform:rotate(-90deg)">
            <circle cx="36" cy="36" r="${r}" fill="none" stroke="var(--bg-4)" stroke-width="5"/>
            <circle cx="36" cy="36" r="${r}" fill="none" stroke="${color}" stroke-width="5"
              stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}" stroke-linecap="round"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <div style="font-family:var(--font-data);font-size:18px;font-weight:700;color:${color};line-height:1">${score}</div>
            <div style="font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px">VIQ</div>
          </div>
        </div>
        <div style="font-size:11px;font-weight:600;color:${color};text-align:center;margin-top:4px">${tier}</div>
      </div>
    </div>
    <div class="detail-body">
      ${buildAgentReportHTML(agent)}
    </div>
  `;
}

function buildAgentReportHTML(agent) {
  const score = Math.round(agent.composite_score || 50);
  const tier  = agent.tier_classification || 'Moderate';
  const color = scoreColor(score);

  const analysis   = agent.analysis_json || {};
  const overviewJson = agent.overview_json || {};
  const scores     = agent.scores_json   || {};
  const prediction = agent.prediction_json || {};

  const hasAnalysis  = Object.keys(analysis).length > 0 || Object.keys(overviewJson).length > 0 || !!agent.last_analyzed;
  const overview     = { summary: overviewJson.what_it_does || analysis.overview?.what_it_does || analysis.overview?.summary || agent.biography };
  const riskData     = { bear_case: overviewJson.risks_to_monitor || analysis.overview?.risks_to_monitor || analysis.risk?.bear_case, key_risks: analysis.risk?.key_risks || [] };
  const teamData     = { team_summary: overviewJson.who_is_behind_it || analysis.overview?.who_is_behind_it || analysis.team?.team_summary };
  const productData  = { description: overviewJson.market_opportunity || analysis.overview?.market_opportunity || analysis.product?.description };
  const fmData       = analysis.first_mover || {};
  const intelligenceNotes = overviewJson.what_is_notable || analysis.overview?.what_is_notable || analysis.intelligence_notes;

  const factorScores = scores.scores || Object.fromEntries(Object.entries(scores).filter(([k]) => /^F\d+_/.test(k))) || {};
  const tierScores   = scores.tier_scores || scores._tier_scores || {};

  const FACTOR_LABELS = {
    F1_category_uniqueness:'Category Uniqueness', F2_approach_novelty:'Approach Novelty',
    F3_cross_chain_originality:'Cross-Chain Original', F4_timing_advantage:'Timing Advantage',
    F5_defensibility:'Defensibility / Moat', F6_doxx_tier:'Team Visibility',
    F7_track_record:'Track Record', F8_code_activity:'Code Activity',
    F9_shipping_cadence:'Shipping Cadence', F10_product_status:'Product Status',
    F11_partnerships:'Partnerships', F12_wallet_behavior:'Wallet Behavior',
    F13_tam:'Total Addressable Market', F14_real_world_comparables:'Real-World Comparables',
    F15_revenue_model:'Revenue Model', F16_current_revenue:'Current Revenue',
    F17_mcap_to_tam:'MCap / TAM Ratio', F18_saturation:'Market Saturation',
    F19_holder_distribution:'Holder Distribution', F20_twitter_engagement:'Twitter Engagement',
    F21_follower_growth:'Follower Growth', F22_community_depth:'Community Depth',
    F23_organic_signals:'Organic vs Paid', F24_smart_money:'Smart Money',
  };
  const TIER_NAMES = {first_mover:'First Mover', team:'Team & Execution', value:'Value Pool', community:'Community'};

  const sortedFactors = Object.entries(factorScores).sort((a, b) => b[1] - a[1]);
  const topHelped = sortedFactors.slice(0, 3).map(([k, v]) => ({ label: FACTOR_LABELS[k] || k, score: Math.round(v) }));
  const topHurt   = sortedFactors.slice(-3).reverse().map(([k, v]) => ({ label: FACTOR_LABELS[k] || k, score: Math.round(v) }));

  let oneLiner = '';
  if (Object.keys(tierScores).length) {
    const entries = Object.entries(tierScores).sort((a, b) => b[1] - a[1]);
    const best = entries[0], worst = entries[entries.length - 1];
    if (best && worst && best[0] !== worst[0]) {
      oneLiner = `Strong on ${TIER_NAMES[best[0]] || best[0]}, weak on ${TIER_NAMES[worst[0]] || worst[0]}`;
    }
  }

  const lastAnalyzed = agent.updated_at ? (() => {
    const diffMs  = Date.now() - new Date(agent.updated_at + 'Z').getTime();
    const diffMin = Math.round(diffMs / 60000);
    return diffMin < 1 ? 'just now' : diffMin < 60 ? `${diffMin}m ago` : diffMin < 1440 ? `${Math.round(diffMin/60)}h ago` : `${Math.round(diffMin/1440)}d ago`;
  })() : null;

  return `
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div>
        <span style="font-family:var(--font-data);font-size:24px;font-weight:700;color:${color}">${score}</span>
        <span style="font-size:13px;color:${color};margin-left:6px;font-weight:600">${tier}</span>
      </div>
      ${oneLiner ? `<div style="flex:1;font-size:12px;color:var(--text-muted);font-style:italic;min-width:140px">${oneLiner}</div>` : ''}
    </div>

    ${topHelped.length || topHurt.length ? `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${topHelped.length ? `<div style="padding:10px;background:rgba(22,131,137,0.06);border:1px solid rgba(22,131,137,0.2);border-radius:var(--radius-sm)">
        <div style="font-size:10px;color:var(--green-dark);font-weight:700;letter-spacing:0.5px;margin-bottom:6px">STRENGTHS</div>
        ${topHelped.map(f => `<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-bottom:3px"><span>${f.label}</span><span style="color:var(--green);font-family:var(--font-data)">${f.score}</span></div>`).join('')}
      </div>` : ''}
      ${topHurt.length ? `<div style="padding:10px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius-sm)">
        <div style="font-size:10px;color:var(--red);font-weight:700;letter-spacing:0.5px;margin-bottom:6px">RISKS</div>
        ${topHurt.map(f => `<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-bottom:3px"><span>${f.label}</span><span style="color:var(--red);font-family:var(--font-data)">${f.score}</span></div>`).join('')}
      </div>` : ''}
    </div>` : ''}

    ${hasAnalysis ? `
    <div>
      <div class="report-section-title">AI Analyst Overview
        ${lastAnalyzed ? `<span style="font-size:10px;color:var(--text-dim);font-weight:400;margin-left:8px;font-family:var(--font-data)">Last analyzed: ${lastAnalyzed}</span>` : ''}
      </div>
      <div class="report-sub-card"><div class="report-section-sub primary">What It Does</div>${formatText(overview.summary || 'Analysis in progress.')}</div>
      <div class="report-sub-card"><div class="report-section-sub">Who Is Behind It</div>${formatText(teamData.team_summary || 'Analysis in progress.')}</div>
      <div class="report-sub-card"><div class="report-section-sub">What Is Notable</div>${formatText(intelligenceNotes || 'Analysis in progress.')}</div>
      <div class="report-sub-card risk"><div class="report-section-sub risk">Risks to Monitor</div>${formatText(riskData.bear_case || (riskData.key_risks && riskData.key_risks.join('\n')) || 'Analysis in progress.')}</div>
      <div class="report-sub-card"><div class="report-section-sub">Market Opportunity</div>${formatText(productData.description || fmData.analysis || 'Analysis in progress.')}</div>
    </div>
    ` : `
    <div>
      <div class="report-section-title">Overview</div>
      ${formatText(agent.biography || 'No biography available for this agent.')}
      <p style="margin-top:12px;font-size:12px;color:var(--text-dim)">AI analysis in progress — scores update automatically. Check back shortly.</p>
    </div>
    `}

    <div>
      <div class="report-section-title">Key Metrics</div>
      <div class="metrics-grid">
        <div class="metric-tile"><div class="metric-tile-label">Market Cap</div><div class="metric-tile-value teal">${fmtMcap(agent.market_cap)}</div></div>
        <div class="metric-tile"><div class="metric-tile-label">24h Volume</div><div class="metric-tile-value purple">${fmtMcap(agent.volume_24h)}</div></div>
        <div class="metric-tile"><div class="metric-tile-label">Price Change 24h</div><div class="metric-tile-value ${parseFloat(agent.price_change_24h||0)>=0?'green':'red'}">${fmtChange(agent.price_change_24h)}</div></div>
        <div class="metric-tile"><div class="metric-tile-label">Holders</div><div class="metric-tile-value">${fmtNumber(agent.holder_count)}</div></div>
        <div class="metric-tile"><div class="metric-tile-label">Liquidity</div><div class="metric-tile-value">${fmtMcap(agent.liquidity_usd)}</div></div>
        <div class="metric-tile"><div class="metric-tile-label">Buy/Sell Ratio</div><div class="metric-tile-value ${parseFloat(agent.buy_sell_ratio||1)>=1?'green':'red'}">${parseFloat(agent.buy_sell_ratio||1).toFixed(2)}x</div></div>
        <div class="metric-tile"><div class="metric-tile-label">Twitter Followers</div><div class="metric-tile-value">${fmtNumber(agent.twitter_followers)}</div></div>
        <div class="metric-tile"><div class="metric-tile-label">GitHub Stars</div><div class="metric-tile-value">${fmtNumber(agent.github_stars)}</div></div>
      </div>
    </div>

    ${agent.contract_address ? `
    <div>
      <div class="report-section-title">Price Chart</div>
      <div class="dex-chart-wrap">
        <iframe src="https://dexscreener.com/base/${agent.contract_address}?embed=1&theme=light&trades=0&info=0" loading="lazy" allowfullscreen></iframe>
      </div>
    </div>` : ''}

    <div>
      <div class="report-section-title">VIQ Intelligence Report</div>
      <div class="score-breakdown-grid">
        ${renderTierBreakdown(scores, analysis, agent)}
      </div>
    </div>

    <div>
      <div class="report-section-title">AI Forecast</div>
      <div class="forecast-grid">
        ${renderForecast('7d', prediction['7d'])}
        ${renderForecast('30d', prediction['30d'])}
        ${renderForecast('90d', prediction['90d'])}
      </div>
    </div>

    ${agent.linked_twitter || agent.linked_website || agent.linked_telegram ? `
    <div>
      <div class="report-section-title">Links</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${agent.linked_twitter ? `<a href="${agent.linked_twitter}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-size:12px;text-decoration:none">𝕏 Twitter</a>` : ''}
        ${agent.linked_website ? `<a href="${agent.linked_website}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-size:12px;text-decoration:none">🌐 Website</a>` : ''}
        ${agent.linked_telegram ? `<a href="${agent.linked_telegram}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-size:12px;text-decoration:none">✈ Telegram</a>` : ''}
      </div>
    </div>` : ''}
  `;
}

async function triggerAnalysis(virtualsId) {
  try {
    showToast('Analysis queued — refresh in ~30s');
    await fetch(`/api/analyze/${virtualsId}`, { method: 'POST' });
  } catch(e) { showToast('Failed to queue analysis', true); }
}

// ===== MODAL CLOSE =====
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  document.body.style.overflow = '';
  if (state.jobPollInterval) clearInterval(state.jobPollInterval);
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ===== TOAST =====
let toastTimeout;
function showToast(msg, isError=false) {
  let el = document.querySelector('.toast');
  if (el) el.remove();
  el = document.createElement('div');
  el.className = 'toast';
  if (isError) el.style.background = '#EF4444';
  el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.remove(), 5000);
}

// ===== FILTER TAB EVENTS =====
document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    state.sort = this.dataset.sort;

// ===== CATEGORY TAB EVENTS =====

    document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    state.category = this.dataset.category;
    state.page = 1;
    loadAgents();

});

// ===== TABLE HEADER SORT =====
document.querySelectorAll('.th.sortable').forEach(th => {
  th.addEventListener('click', function() {
    state.sort = this.dataset.sort;

    loadAgents();

// ===== SEARCH =====
document.getElementById('search-input').addEventListener('input', function() {
  clearTimeout(state.searchTimeout);
  state.searchTimeout = setTimeout(() => {
    state.search = this.value.trim();

// ===== BOTTOM FILTER BUTTONS =====
document.getElementById('btn-status').addEventListener('click', function() {
  const sel = document.getElementById('filter-status');
  const options = Array.from(sel.options);
  const currentIdx = options.findIndex(o => o.value === state.status);

document.getElementById('btn-doxx').addEventListener('click', function() {
  const sel = document.getElementById('filter-doxx');

  const nextIdx = (currentIdx + 1) % options.length;
  state.doxxTier = options[nextIdx].value;
  this.textContent = options[nextIdx].text;
  this.classList.toggle('active', state.doxxTier !== '');
  state.page = 1;

});

document.getElementById('btn-sort').addEventListener('click', function() {
  const sorts = [
    {value: 'market_cap',       label: 'Sort: MCap'},
    {value: 'composite_score',  label: 'Sort: VIQ'},
    {value: 'price_change_24h', label: 'Sort: 24h %'},
    {value: 'newest',           label: 'Sort: New'},
    {value: 'holders',          label: 'Sort: Holders'},

  state.page = 1;
  loadAgents();
});

// ===== ENRICHMENT POLLING =====
let _enrichPollInterval = null;
let _lastAgentCount = 0;

async function checkEnrichmentStatus() {
  try {
    const res = await fetch('/api/status');
    if (!res.ok) return true;
    const data = await res.json();
    const banner = document.getElementById('enrich-banner');
    const msg = document.getElementById('enrich-msg');

    const done = data.status === 'complete' || data.status === 'idle';
    if (!done) {
      const labels = {
        preloading: 'Loading agents from Virtuals Protocol',
        enriching:  'Enriching market data via DexScreener',
        scoring:    'Calculating VIQ scores',
      };
      const label = labels[data.status] || 'Updating data';
      const count = data.total_agents_in_db || 0;
      msg.textContent = `${label}... ${count.toLocaleString()} agents loaded`;
      banner.classList.add('visible');
      document.getElementById('last-updated-label').style.display = 'none';

      if (count !== _lastAgentCount) {
        _lastAgentCount = count;
        loadStats();
        if (state.page === 1) loadAgents();
      }
    } else {
      banner.classList.remove('visible');
      const updatedEl = document.getElementById('last-updated-label');
      const ts = data.completed_at || data.started_at;
      if (ts) {
        const diffMs = Date.now() - new Date(ts + 'Z').getTime();
        const diffMin = Math.round(diffMs / 60000);
        const label = diffMin < 1 ? 'just now' : diffMin < 60 ? `${diffMin}m ago` : `${Math.round(diffMin/60)}h ago`;
        updatedEl.textContent = `Updated ${label}`;
        updatedEl.style.display = 'block';
      }
    }
    return done;
  } catch(e) {
    return true;
  }
}

async function startEnrichmentPolling() {
  const done = await checkEnrichmentStatus();
  if (done) return;

  _enrichPollInterval = setInterval(async () => {
    const done = await checkEnrichmentStatus();
    if (done) {
      clearInterval(_enrichPollInterval);
      _enrichPollInterval = null;
      loadStats();
    }
  }, 5000);
}

// ===== POPSTATE (browser back/forward) =====
window.addEventListener('popstate', function(e) {
  const path = window.location.pathname;
  if (path.startsWith('/agent/')) {
    const id = path.split('/agent/')[1];
    document.getElementById('main-content').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
    loadDetailAgent(id);
  } else {
    hideDetailPage();
    loadAgents();
  }
});

// ===== BOOT =====
(async function init() {
  await loadStats();

  if (DETAIL_AGENT_ID) {
    // Server-side rendered detail URL (/agent/123)
    document.getElementById('main-content').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
    await loadDetailAgent(DETAIL_AGENT_ID);
  } else {
    await loadAgents();
    loadTrendingStrip();
  }

  startEnrichmentPolling();
  setInterval(loadStats, 5 * 60 * 1000);
  updateWatchlistBtn();
})();
</script>
