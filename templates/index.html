<!DOCTYPE html>
<!-- All data loaded from API. No Jinja2 template variables needed. -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VirtualsIQ — Agent Intelligence Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #00C853;
      --green-hover: #00E676;
      --green-dark:  #007E33;
      --green-bg:    #E8F5E9;
      --white:       #FFFFFF;
      --card:        #F8F9FA;
      --border:      #E0E0E0;
      --text:        #1A1A1A;
      --text-sec:    #555555;
      --text-mute:   #888888;
      --red:         #E53935;
      --orange:      #FF6F00;
      --shadow:      0 2px 8px rgba(0,0,0,0.08);
      --shadow-md:   0 4px 20px rgba(0,0,0,0.12);
      --radius:      12px;
      --radius-sm:   8px;
      --nav-h:       64px;
      --bottom-h:    60px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--white);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── TOP NAV ── */
    .topnav {
      position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .logo {
      font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo span { color: var(--green); }
    .topnav-right { display: flex; align-items: center; gap: 12px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-text { font-size: 12px; color: var(--text-sec); font-weight: 500; }

    /* ── MAIN WRAPPER ── */
    .wrapper {
      padding-top: var(--nav-h);
      padding-bottom: var(--bottom-h);
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 16px 16px 0;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      text-align: center;
    }
    .stat-card .val {
      font-size: 18px; font-weight: 700; color: var(--text);
      line-height: 1.2;
    }
    .stat-card .lbl {
      font-size: 10px; font-weight: 500; color: var(--text-mute);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-top: 3px;
    }
    .stat-card .val.green { color: var(--green-dark); }

    /* ── LOADING BANNER ── */
    #loading-banner {
      margin: 12px 16px 0;
      background: var(--green-bg);
      border: 1px solid #A5D6A7;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 12px; font-weight: 500; color: var(--green-dark);
      display: none;
      align-items: center; gap: 8px;
    }
    #loading-banner.visible { display: flex; }
    .spinner-sm {
      width: 14px; height: 14px;
      border: 2px solid #A5D6A7;
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FILTER TABS ── */
    .filter-tabs {
      display: flex; gap: 4px;
      padding: 14px 16px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--white);
      font-size: 13px; font-weight: 500; color: var(--text-sec);
      cursor: pointer; transition: all 0.15s;
    }
    .tab-btn:hover { border-color: var(--green); color: var(--green-dark); }
    .tab-btn.active {
      background: var(--green); border-color: var(--green);
      color: #fff; font-weight: 600;
    }

    /* ── CATEGORY PILLS ── */
    .cat-pills {
      display: flex; gap: 6px;
      padding: 10px 16px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .cat-pills::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--card);
      font-size: 12px; font-weight: 500; color: var(--text-sec);
      cursor: pointer; transition: all 0.15s;
    }
    .cat-pill:hover { border-color: var(--green); color: var(--green-dark); }
    .cat-pill.active {
      background: var(--green-bg); border-color: var(--green);
      color: var(--green-dark); font-weight: 600;
    }

    /* ── SEARCH ── */
    .search-wrap {
      padding: 10px 16px 0;
    }
    .search-inner {
      position: relative;
    }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-mute); font-size: 15px; pointer-events: none;
    }
    #search-input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--card);
      font-size: 14px; color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    #search-input::placeholder { color: var(--text-mute); }
    #search-input:focus { border-color: var(--green); background: var(--white); }

    /* ── AGENT TABLE ── */
    .agent-section {
      padding: 12px 16px 0;
    }
    .agent-table {
      width: 100%;
      border-collapse: collapse;
    }
    .agent-table thead th {
      padding: 8px 10px;
      text-align: left;
      font-size: 10px; font-weight: 600;
      color: var(--text-mute);
      text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 2px solid var(--border);
      background: var(--card);
    }
    .agent-table thead th:first-child { border-radius: var(--radius-sm) 0 0 0; }
    .agent-table thead th:last-child  { border-radius: 0 var(--radius-sm) 0 0; text-align: right; }
    .agent-table thead th.r { text-align: right; }
    .agent-row {
      cursor: pointer;
      transition: background 0.12s;
      border-bottom: 1px solid var(--border);
    }
    .agent-row:hover { background: var(--green-bg); }
    .agent-row td {
      padding: 11px 10px;
      font-size: 13px;
      vertical-align: middle;
    }
    .agent-row td.r { text-align: right; }
    .rank-cell { color: var(--text-mute); font-size: 12px; font-weight: 600; width: 36px; }
    .avatar-cell { width: 44px; }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--green-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: var(--green-dark);
      overflow: hidden; flex-shrink: 0;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .name-cell .agent-name { font-weight: 600; font-size: 13px; color: var(--text); }
    .name-cell .agent-ticker {
      font-size: 11px; color: var(--text-mute); font-weight: 500;
      margin-top: 1px;
    }
    .change-pos { color: var(--green-dark); font-weight: 600; }
    .change-neg { color: var(--red); font-weight: 600; }
    .viq-badge {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 3px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 700;
      min-width: 42px;
    }
    .viq-high   { background: #E8F5E9; color: #1B5E20; }
    .viq-medium { background: #FFF8E1; color: #E65100; }
    .viq-low    { background: #FFEBEE; color: #B71C1C; }

    /* ── LOAD MORE ── */
    .load-more-wrap {
      padding: 14px 16px 0;
      display: flex; justify-content: center;
    }
    #load-more-btn {
      padding: 10px 28px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px; font-weight: 600; color: var(--text-sec);
      cursor: pointer; transition: all 0.15s;
    }
    #load-more-btn:hover { border-color: var(--green); color: var(--green-dark); background: var(--green-bg); }
    #load-more-btn:disabled { opacity: 0.45; cursor: default; }

    /* ── EMPTY / ERROR ── */
    .empty-state {
      text-align: center; padding: 48px 16px;
      color: var(--text-mute); font-size: 14px;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 10px; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--bottom-h);
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-around;
      z-index: 100;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; cursor: pointer;
      color: var(--text-mute); font-size: 10px; font-weight: 500;
      transition: color 0.15s;
    }
    .nav-item.active { color: var(--green-dark); }
    .nav-item svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 200;
      display: none; align-items: flex-end; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: 100%; max-width: 900px;
      max-height: 88vh;
      background: var(--white);
      border-radius: var(--radius) var(--radius) 0 0;
      overflow-y: auto;
      padding: 0 0 24px;
      box-shadow: var(--shadow-md);
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 12px auto 16px;
    }
    .modal-header {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 0 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .modal-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--green-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800; color: var(--green-dark);
      overflow: hidden; flex-shrink: 0;
    }
    .modal-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .modal-title-wrap { flex: 1; }
    .modal-name { font-size: 20px; font-weight: 700; color: var(--text); }
    .modal-ticker { font-size: 13px; color: var(--text-mute); font-weight: 500; }
    .modal-close {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 50%; width: 32px; height: 32px;
      cursor: pointer; font-size: 16px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-sec); transition: background 0.15s;
    }
    .modal-close:hover { background: var(--border); }

    /* VIQ score big badge in modal */
    .viq-score-big {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: var(--radius-sm);
      font-size: 22px; font-weight: 800;
      margin: 16px 20px 0;
    }
    .viq-score-big.high   { background: #E8F5E9; color: #1B5E20; }
    .viq-score-big.medium { background: #FFF8E1; color: #E65100; }
    .viq-score-big.low    { background: #FFEBEE; color: #B71C1C; }
    .viq-label { font-size: 12px; font-weight: 600; opacity: 0.7; }

    /* metrics grid */
    .metrics-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px; padding: 14px 20px 0;
    }
    .metric-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px;
    }
    .metric-card .m-val { font-size: 16px; font-weight: 700; color: var(--text); }
    .metric-card .m-lbl { font-size: 10px; color: var(--text-mute); font-weight: 500; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.4px; }

    /* bio */
    .modal-bio {
      padding: 14px 20px 0;
      font-size: 13px; color: var(--text-sec); line-height: 1.65;
    }
    .modal-section-title {
      font-size: 11px; font-weight: 700; color: var(--text-mute);
      text-transform: uppercase; letter-spacing: 0.5px;
      padding: 14px 20px 6px;
    }

    /* social links */
    .socials-row {
      display: flex; gap: 8px; flex-wrap: wrap;
      padding: 0 20px;
    }
    .social-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 16px;
      border: 1px solid var(--border); background: var(--card);
      font-size: 12px; font-weight: 500; color: var(--text-sec);
      text-decoration: none; transition: all 0.15s;
    }
    .social-link:hover { border-color: var(--green); color: var(--green-dark); background: var(--green-bg); }

    /* spinner overlay for modal loading */
    .modal-loading {
      display: flex; align-items: center; justify-content: center;
      padding: 48px 20px;
    }
    .spinner-lg {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .metrics-grid { grid-template-columns: 1fr 1fr; }
      .agent-table thead th.hide-sm,
      .agent-table tbody td.hide-sm { display: none; }
    }
  </style>
</head>

{% raw %}
<script>
  // ── STATE ──────────────────────────────────────────────────────────────────
  let currentFeed     = 'hot';
  let currentCategory = '';
  let currentSearch   = '';
  let currentPage     = 1;
  let totalPages      = 1;
  let isLoading       = false;
  let searchTimer     = null;
  const PAGE_SIZE     = 25;

  // ── FORMAT HELPERS ─────────────────────────────────────────────────────────
  function fmtMcap(v) {
    if (v == null || isNaN(v)) return '—';
    if (v >= 1e9) return `$${(v/1e9).toFixed(2)}B`;
    if (v >= 1e6) return `$${(v/1e6).toFixed(2)}M`;
    if (v >= 1e3) return `$${(v/1e3).toFixed(1)}K`;
    return `$${v.toFixed(2)}`;
  }
  function fmtVol(v)    { return fmtMcap(v); }
  function fmtChange(v) {
    if (v == null || isNaN(v)) return '<span style="color:var(--text-mute)">—</span>';
    const s = v.toFixed(2);
    return v >= 0
      ? `<span class="change-pos">+${s}%</span>`
      : `<span class="change-neg">${s}%</span>`;
  }
  function fmtScore(v) {
    if (v == null || isNaN(v)) return { cls: 'viq-low', txt: '—' };
    const n = Number(v);
    if (n >= 70) return { cls: 'viq-high',   txt: n.toFixed(0) };
    if (n >= 40) return { cls: 'viq-medium', txt: n.toFixed(0) };
    return          { cls: 'viq-low',    txt: n.toFixed(0) };
  }
  function scoreClass(v) {
    if (v == null || isNaN(v)) return 'low';
    if (v >= 70) return 'high';
    if (v >= 40) return 'medium';
    return 'low';
  }
  function initials(name) {
    if (!name) return '?';
    return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  }
  function avatarEl(agent, size) {
    const cls  = size === 'lg' ? 'modal-avatar' : 'avatar';
    const img  = agent.image_url || agent.image || '';
    const init = initials(agent.name || agent.agent_name || '');
    if (img) return `<div class="${cls}"><img src="${img}" alt="${init}" onerror="this.parentNode.innerHTML='${init}'"></div>`;
    return `<div class="${cls}">${init}</div>`;
  }

  // ── STATUS POLLING ─────────────────────────────────────────────────────────
  async function checkStatus() {
    try {
      const r = await fetch('/api/status');
      if (!r.ok) return;
      const d = await r.json();
      const phase = d.phase || d.state || 'ready';
      const dot   = document.getElementById('status-dot');
      const txt   = document.getElementById('status-text');
      if (phase === 'complete' || phase === 'ready') {
        dot.style.background = 'var(--green)';
        txt.textContent = 'Live';
      } else {
        dot.style.background = 'var(--orange)';
        txt.textContent = phase.replace('_', ' ');
        setTimeout(checkStatus, 5000);
      }
    } catch (_) {}
  }

  // ── STATS ──────────────────────────────────────────────────────────────────
  async function loadStats() {
    try {
      const r = await fetch('/api/stats');
      if (!r.ok) return;
      const d = await r.json();
      document.getElementById('stat-agents').textContent   = (d.total_agents   ?? d.total ?? '—').toLocaleString();
      document.getElementById('stat-mcap').textContent     = fmtMcap(d.total_market_cap ?? d.total_mcap);
      document.getElementById('stat-vol').textContent      = fmtVol(d.total_volume_24h  ?? d.volume_24h);
      document.getElementById('stat-trending').textContent = (d.trending_count ?? d.sentient_count ?? '—').toLocaleString();
    } catch (_) {}
  }

  // ── LOAD BANNER ────────────────────────────────────────────────────────────
  function setBanner(visible, text) {
    const el = document.getElementById('loading-banner');
    const tx = document.getElementById('loading-text');
    el.classList.toggle('visible', visible);
    if (text) tx.textContent = text;
  }

  // ── LOAD AGENTS ───────────────────────────────────────────────────────────
  async function loadAgents(reset = true) {
    if (isLoading) return;
    isLoading = true;

    if (reset) {
      currentPage = 1;
      document.getElementById('agent-tbody').innerHTML =
        `<tr><td colspan="7"><div class="modal-loading"><div class="spinner-lg"></div></div></td></tr>`;
      document.getElementById('load-more-btn').style.display = 'none';
    }

    setBanner(true, `Loading agents… page ${currentPage}`);

    try {
      let data, agents = [], total = 0;

      // Trending feeds go through /api/trending/{feed}
      if (currentFeed !== 'all' && !currentSearch && !currentCategory) {
        const feed = currentFeed;
        const r = await fetch(`/api/trending/${feed}?limit=${PAGE_SIZE}`);
        if (r.ok) {
          data   = await r.json();
          agents = data.agents || data.results || data || [];
          total  = agents.length;
        }
      }

      // Fallback / search / category → /api/agents
      if (!agents.length || currentSearch || currentCategory) {
        const params = new URLSearchParams({
          page:      currentPage,
          page_size: PAGE_SIZE,
        });
        if (currentCategory) params.set('category', currentCategory);
        if (currentSearch)   params.set('search',   currentSearch);

        // Map tab to sort
        const sortMap = { hot: 'market_cap', new: 'newest', 'top-scored': 'composite_score', 'smart-money': 'holders', 'first-movers': 'market_cap' };
        const sort = sortMap[currentFeed] || 'market_cap';
        params.set('sort', sort);

        const r = await fetch(`/api/agents?${params}`);
        if (!r.ok) throw new Error('API error');
        data   = await r.json();
        agents = data.agents || data.results || [];
        total  = data.total  || agents.length;
        totalPages = Math.ceil(total / PAGE_SIZE);
      }

      setBanner(false);
      renderAgents(agents, reset);

      const btn = document.getElementById('load-more-btn');
      btn.style.display = (currentPage < totalPages) ? 'block' : 'none';
    } catch (e) {
      setBanner(false);
      if (reset) {
        document.getElementById('agent-tbody').innerHTML =
          `<tr><td colspan="7"><div class="empty-state"><div class="icon">⚠️</div>Failed to load agents. Try again shortly.</div></td></tr>`;
      }
    } finally {
      isLoading = false;
    }
  }

  function renderAgents(agents, reset) {
    const tbody = document.getElementById('agent-tbody');
    if (reset) tbody.innerHTML = '';

    if (!agents.length && reset) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="icon">🔍</div>No agents found.</div></td></tr>`;
      return;
    }

    const offset = reset ? 0 : tbody.querySelectorAll('tr').length;

    agents.forEach((a, i) => {
      const rank  = offset + i + 1;
      const id    = a.virtuals_id || a.id || a._id || '';
      const name  = a.name || a.agent_name || 'Unknown';
      const ticker= a.ticker || a.symbol || '';
      const mcap  = a.market_cap ?? a.mcap ?? null;
      const vol   = a.volume_24h ?? a.vol24h ?? null;
      const chg   = a.price_change_24h ?? a.change_24h ?? null;
      const score = a.composite_score ?? a.viq_score ?? a.score ?? null;
      const sc    = fmtScore(score);

      const tr = document.createElement('tr');
      tr.className = 'agent-row';
      tr.dataset.id = id;
      tr.innerHTML = `
        <td class="rank-cell">${rank}</td>
        <td class="avatar-cell">${avatarEl(a, 'sm')}</td>
        <td class="name-cell">
          <div class="agent-name">${name}</div>
          <div class="agent-ticker">${ticker ? '$'+ticker : ''}</div>
        </td>
        <td class="r hide-sm">${fmtVol(vol)}</td>
        <td class="r">${fmtMcap(mcap)}</td>
        <td class="r">${fmtChange(chg)}</td>
        <td class="r"><span class="viq-badge ${sc.cls}">${sc.txt}</span></td>
      `;
      tr.addEventListener('click', () => openModal(id, a));
      tbody.appendChild(tr);
    });
  }

  // ── MODAL ──────────────────────────────────────────────────────────────────
  async function openModal(id, preview) {
    const backdrop = document.getElementById('modal-backdrop');
    const content  = document.getElementById('modal-content');
    backdrop.classList.add('open');
    document.body.style.overflow = 'hidden';

    // Show skeleton with preview data
    if (preview) renderModal(preview, true);
    else content.innerHTML = `<div class="modal-loading"><div class="spinner-lg"></div></div>`;

    if (!id) return;
    try {
      const r = await fetch(`/api/agent/${id}`);
      if (!r.ok) return;
      const d = await r.json();
      renderModal(d.agent || d, false);
    } catch (_) {}
  }

  function renderModal(a, isPreview) {
    const content = document.getElementById('modal-content');
    const name   = a.name || a.agent_name || 'Unknown';
    const ticker = a.ticker || a.symbol || '';
    const mcap   = a.market_cap ?? a.mcap ?? null;
    const vol    = a.volume_24h ?? a.vol24h ?? null;
    const price  = a.price ?? a.current_price ?? null;
    const chg    = a.price_change_24h ?? a.change_24h ?? null;
    const holders= a.holders ?? null;
    const score  = a.composite_score ?? a.viq_score ?? a.score ?? null;
    const bio    = a.description || a.bio || a.biography || '';
    const scNum  = score != null ? Number(score) : null;
    const scClass= scoreClass(scNum);
    const scTxt  = scNum != null ? scNum.toFixed(0) : '—';

    // Social links
    const socials = [];
    if (a.twitter || a.twitter_url)   socials.push({ label: '𝕏 Twitter',  href: a.twitter   || a.twitter_url });
    if (a.telegram || a.telegram_url) socials.push({ label: '✈ Telegram', href: a.telegram  || a.telegram_url });
    if (a.discord || a.discord_url)   socials.push({ label: '💬 Discord',  href: a.discord   || a.discord_url });
    if (a.website || a.website_url)   socials.push({ label: '🌐 Website',  href: a.website   || a.website_url });
    if (a.github || a.github_url)     socials.push({ label: '🐙 GitHub',   href: a.github    || a.github_url });

    const socialsHtml = socials.length
      ? socials.map(s => `<a class="social-link" href="${s.href}" target="_blank" rel="noopener">${s.label}</a>`).join('')
      : '<span style="color:var(--text-mute);font-size:13px">No social links</span>';

    const priceStr = price != null ? `$${Number(price).toFixed(6)}` : '—';
    const holdersStr = holders != null ? Number(holders).toLocaleString() : '—';

    content.innerHTML = `
      <div class="modal-header">
        ${avatarEl(a, 'lg')}
        <div class="modal-title-wrap">
          <div class="modal-name">${name}</div>
          <div class="modal-ticker">${ticker ? '$'+ticker : '—'}</div>
        </div>
        <button class="modal-close" id="modal-close-btn" aria-label="Close">✕</button>
      </div>

      <div class="viq-score-big ${scClass}">
        <span>${scTxt}</span>
        <span class="viq-label">VIQ Score${isPreview ? ' (preview)' : ''}</span>
      </div>

      <div class="metrics-grid">
        <div class="metric-card">
          <div class="m-val">${fmtMcap(mcap)}</div>
          <div class="m-lbl">Market Cap</div>
        </div>
        <div class="metric-card">
          <div class="m-val">${fmtVol(vol)}</div>
          <div class="m-lbl">24h Volume</div>
        </div>
        <div class="metric-card">
          <div class="m-val">${priceStr}</div>
          <div class="m-lbl">Price</div>
        </div>
        <div class="metric-card">
          <div class="m-val">${fmtChange(chg)}</div>
          <div class="m-lbl">24h Change</div>
        </div>
        <div class="metric-card">
          <div class="m-val">${holdersStr}</div>
          <div class="m-lbl">Holders</div>
        </div>
        <div class="metric-card">
          <div class="m-val">${a.status || a.stage || '—'}</div>
          <div class="m-lbl">Status</div>
        </div>
      </div>

      ${bio ? `<div class="modal-section-title">About</div><div class="modal-bio">${bio}</div>` : ''}

      <div class="modal-section-title">Socials</div>
      <div class="socials-row">${socialsHtml}</div>
    `;

    document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ── EVENT WIRING ───────────────────────────────────────────────────────────
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
  });

  // Tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFeed = btn.dataset.feed;
      loadAgents(true);
    });
  });

  // Category pills
  document.querySelectorAll('.cat-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentCategory = pill.dataset.cat;
      loadAgents(true);
    });
  });

  // Search with 400ms debounce
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      currentSearch = e.target.value.trim();
      loadAgents(true);
    }, 400);
  });

  // Load more
  document.getElementById('load-more-btn').addEventListener('click', () => {
    currentPage++;
    loadAgents(false);
  });

  // Bottom nav (cosmetic — pages not implemented, just style toggle)
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
    });
  });

  // ── INIT ───────────────────────────────────────────────────────────────────
  loadStats();
  checkStatus();
  loadAgents(true);
</script>
{% endraw %}
</body>
</html>
