<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VirtualsIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #FFFFFF;
      --bg-2:       #F8F9FA;
      --bg-3:       #F1F3F5;
      --bg-4:       #E9ECEF;
      --border:     #E5E7EB;
      --border-2:   #D1D5DB;
      --text:       #111827;
      --text-muted: #6B7280;
      --text-dim:   #9CA3AF;

      --green:      #22C55E;
      --green-bg:   rgba(34,197,94,0.10);
      --green-dark: #16A34A;
      --red:        #EF4444;
      --red-bg:     rgba(239,68,68,0.10);
      --amber:      #F59E0B;
      --teal:       #0891B2;
      --purple:     #A855F7;

      --radius:     8px;
      --radius-sm:  6px;
      --radius-pill:100px;
      --font-ui:    'Inter', sans-serif;
      --font-data:  'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: 116px;
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-2); }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }

    /* ===== HEADER ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #22C55E, #14B8A6);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-data);
      font-weight: 500;
      font-size: 11px;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo-text {
      font-weight: 700;
      font-size: 17px;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      padding: 8px 12px 8px 34px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus { border-color: var(--green); background: #fff; }
    .search-input::placeholder { color: var(--text-dim); }

    /* ===== FILTER TABS ===== */
    .filter-tabs-wrap {
      padding: 10px 16px 0;
      background: #fff;
    }

    .filter-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 10px;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }

    .filter-tab {
      flex-shrink: 0;
      padding: 6px 16px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-tab:hover { border-color: var(--green); color: var(--text); }
    .filter-tab.active { background: var(--green); border-color: var(--green); color: #fff; }

    /* ===== CATEGORY TABS ===== */
    .category-tabs-wrap {
      padding: 0 16px;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }

    .category-tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }

    .category-tab {
      flex-shrink: 0;
      padding: 8px 14px;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      margin-bottom: -1px;
    }

    .category-tab:hover { color: var(--text); }
    .category-tab.active { color: var(--text); border-bottom-color: var(--green); font-weight: 600; }

    /* ===== STATS BAR ===== */
    .stats-bar {
      display: flex;
      align-items: center;
      padding: 7px 16px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .stats-bar::-webkit-scrollbar { display: none; }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
      padding: 0 12px;
    }
    .stat-item:first-child { padding-left: 0; }
    .stat-item + .stat-item { border-left: 1px solid var(--border); }

    .stat-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-dim);
    }

    .stat-value {
      font-family: var(--font-data);
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    /* ===== ENRICHMENT BANNER ===== */
    .enrich-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: rgba(245,158,11,0.08);
      border-bottom: 1px solid rgba(245,158,11,0.2);
      font-size: 12px;
      color: var(--amber);
      font-family: var(--font-data);
    }
    .enrich-banner.visible { display: flex; }

    .enrich-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--amber);
      flex-shrink: 0;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ===== TABLE HEADER ===== */
    .table-header {
      display: grid;
      grid-template-columns: 36px 1fr 100px 68px 58px;
      align-items: center;
      padding: 6px 16px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
    }

    .th {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .th.sortable { cursor: pointer; user-select: none; }
    .th.sortable:hover { color: var(--text-muted); }
    .th.right { text-align: right; }

    /* ===== AGENT ROWS ===== */
    .agent-row {
      display: grid;
      grid-template-columns: 36px 1fr 100px 68px 58px;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }

    .agent-row:hover { background: var(--bg-2); }
    .agent-row:last-child { border-bottom: none; }

    .rank {
      font-family: var(--font-data);
      font-size: 12px;
      color: var(--text-dim);
    }

    .agent-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--bg-3);
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-data);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .agent-info { min-width: 0; }

    .agent-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-ticker {
      font-family: var(--font-data);
      font-size: 11px;
      color: var(--text-dim);
      display: inline;
    }

    .agent-category {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-metrics {
      font-size: 10px;
      color: var(--text-dim);
      font-family: var(--font-data);
      white-space: nowrap;
    }

    .agent-links {
      display: flex;
      gap: 4px;
      margin-top: 2px;
    }

    .agent-ext-link {
      display: inline-flex;
      align-items: center;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      font-family: var(--font-data);
      font-weight: 500;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      background: var(--bg-2);
      transition: all 0.12s;
    }
    .agent-ext-link:hover { border-color: var(--green); color: var(--green-dark); background: var(--green-bg); }

    .price-col { text-align: right; }

    .price-val {
      font-family: var(--font-data);
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    .mcap-val {
      font-family: var(--font-data);
      font-size: 11px;
      color: var(--text-muted);
    }

    .change-col { text-align: right; }

    .change-val {
      font-family: var(--font-data);
      font-size: 12px;
      font-weight: 500;
    }
    .change-val.positive { color: var(--green-dark); }
    .change-val.negative { color: var(--red); }
    .change-val.neutral  { color: var(--text-muted); }

    .viq-col { text-align: right; }

    .viq-val {
      font-family: var(--font-data);
      font-size: 13px;
      font-weight: 700;
    }

    /* ===== LOADING ===== */
    .loading-row {
      padding: 48px 16px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }

    .loading-spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== PAGINATION ===== */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: #fff;
    }

    .pagination-info {
      font-size: 12px;
      color: var(--text-dim);
      font-family: var(--font-data);
    }

    .pagination-controls { display: flex; gap: 4px; }

    .page-btn {
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-family: var(--font-data);
    }

    .page-btn:hover:not(:disabled) { border-color: var(--green); color: var(--green-dark); }
    .page-btn.active { background: var(--green); border-color: var(--green); color: #fff; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-dim);
    }
    .empty-state-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
    .empty-state-title { font-size: 15px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: #fff;
      border-top: 1px solid var(--border);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }

    .bottom-filters {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }
    .bottom-filters::-webkit-scrollbar { display: none; }

    .bottom-filter-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--bg-2);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .bottom-filter-btn:hover { border-color: var(--green); }
    .bottom-filter-btn.active { background: var(--green); border-color: var(--green); color: #fff; }

    .bottom-tabs { display: flex; }

    .bottom-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      gap: 3px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s;
    }

    .bottom-tab.active { color: var(--green); }
    .bottom-tab svg { width: 20px; height: 20px; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 24px 16px;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 860px;
      position: relative;
      margin: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.10);
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .modal-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--bg-3);
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-data);
      font-size: 16px;
      color: var(--text-muted);
    }
    .modal-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .modal-title-wrap { flex: 1; }

    .modal-agent-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .modal-agent-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .modal-score-ring {
      position: relative;
      width: 64px;
      height: 64px;
      flex-shrink: 0;
    }
    .modal-score-ring svg { transform: rotate(-90deg); }

    .modal-score-value {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .modal-score-num {
      font-family: var(--font-data);
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
    }

    .modal-score-label {
      font-size: 8px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.15s;
    }
    .modal-close:hover { background: var(--red-bg); border-color: var(--red); color: var(--red); }

    .modal-body {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .report-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .report-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .report-narrative {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    @media (max-width: 600px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }

    .metric-tile {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .metric-tile-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }
    .metric-tile-value {
      font-family: var(--font-data);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .metric-tile-value.teal   { color: var(--teal); }
    .metric-tile-value.purple { color: var(--purple); }
    .metric-tile-value.amber  { color: var(--amber); }
    .metric-tile-value.green  { color: var(--green-dark); }
    .metric-tile-value.red    { color: var(--red); }

    .score-breakdown-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }
    @media (max-width: 600px) { .score-breakdown-grid { grid-template-columns: 1fr; } }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .forecast-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
    }
    .forecast-horizon { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; font-family: var(--font-data); }
    .forecast-probability { font-family: var(--font-data); font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .forecast-range { font-family: var(--font-data); font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
    .forecast-catalyst { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .status-badge.sentient  { background: rgba(8,145,178,0.10); color: var(--teal); border: 1px solid rgba(8,145,178,0.25); }
    .status-badge.prototype { background: rgba(245,158,11,0.10); color: var(--amber); border: 1px solid rgba(245,158,11,0.25); }

    .category-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-3);
      border: 1px solid var(--border);
    }

    .doxx-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 500;
    }
    .doxx-badge.tier-1 { background: var(--green-bg); color: var(--green-dark); border: 1px solid rgba(34,197,94,0.25); }
    .doxx-badge.tier-2 { background: rgba(168,85,247,0.10); color: var(--purple); border: 1px solid rgba(168,85,247,0.25); }
    .doxx-badge.tier-3 { background: var(--bg-3); color: var(--text-muted); border: 1px solid var(--border); }

    .risk-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
    }
    .risk-badge.low     { background: var(--green-bg); color: var(--green-dark); border: 1px solid rgba(34,197,94,0.2); }
    .risk-badge.medium  { background: rgba(245,158,11,0.10); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
    .risk-badge.high    { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .risk-badge.extreme { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

    .dex-chart-wrap {
      width: 100%;
      height: 380px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-3);
    }
    .dex-chart-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    .tier-header {
      grid-column: 1 / -1;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      padding-top: 8px;
    }

    .tier-factor-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .tier-factor-row:last-child { border-bottom: none; }
    .tier-factor-left { display: flex; flex-direction: column; gap: 2px; }
    .tier-factor-name { font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .tier-factor-why { font-size: 11px; color: var(--text-dim); line-height: 1.4; }
    .tier-factor-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 48px; }
    .tier-factor-score { font-family: var(--font-data); font-size: 13px; font-weight: 600; }
    .tier-factor-bar { width: 44px; height: 3px; background: var(--bg-4); border-radius: 2px; overflow: hidden; }
    .tier-factor-bar-fill { height: 100%; border-radius: 2px; }

    .score-ring { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring-value {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-data);
      font-size: 10px;
      font-weight: 600;
    }

    .first-mover-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      background: rgba(168,85,247,0.10);
      border: 1px solid rgba(168,85,247,0.3);
      color: var(--purple);
      font-size: 8px; font-weight: 700;
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    }

    .toast {
      position: fixed;
      bottom: 130px;
      right: 16px;
      background: var(--text);
      color: #fff;
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      z-index: 2000;
      animation: fadeIn 0.2s ease;
      max-width: 280px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== DESKTOP ===== */
    @media (min-width: 768px) {
      body { padding-bottom: 0; }
      .bottom-nav { display: none; }
      .header { padding: 12px 24px; }
      .filter-tabs-wrap { padding: 12px 24px 0; }
      .category-tabs-wrap { padding: 0 24px; }
      .stats-bar { padding: 7px 24px; }
      .enrich-banner { padding: 6px 24px; }
      .table-header { padding: 7px 24px; grid-template-columns: 44px 1fr 130px 84px 74px; }
      .agent-row { padding: 12px 24px; grid-template-columns: 44px 1fr 130px 84px 74px; }
      .pagination { padding: 12px 24px; }
    }

    @media (min-width: 1024px) {
      .table-header, .agent-row { grid-template-columns: 44px 1fr 150px 96px 84px; }
    }
  </style>
</head>
<body>
<header class="header">

<div class="metric-cards" id="metric-cards">

    <div class="modal-sheet" id="modal-sheet">
        <div class="modal-handle"></div>

            <div class="modal-avatar" id="modal-avatar"></div>

            <div class="modal-score-ring" id="modal-score-ring">
                <svg viewBox="0 0 72 72"><circle class="track" cx="36" cy="36" r="30"/><circle class="arc" id="modal-ring-arc" cx="36" cy="36" r="30" stroke-dasharray="188.5" stroke-dashoffset="188.5"/></svg>

{% raw %}
<script>
let currentPage=1,currentCategory='',currentSort='market_cap',currentSearch='',currentFeed='trending',totalPages=1,enrichInterval=null,cachedStats=null;
const FEED_MAP={trending:'hot','top-scored':'top-scored','new':'new','smart-money':'smart-money','first-movers':'first-movers'};
const CAT_KEYWORDS={DeFi:['defi','swap','lend','yield','liquidity','amm','vault','stake','borrow','finance','dex','pool','bridge'],Gaming:['game','play','quest','battle','arena','nft game','rpg','metaverse','world','land'],Social:['social','chat','community','dao','governance','vote','forum','message','friend','connect'],Trading:['trade','signal','bot','alpha','snipe','copy','arbitrage','hedge','leverage','margin'],Infra:['infra','protocol','sdk','api','oracle','node','chain','layer','bridge','index','data','analytics'],Info:['info','news','research','learn','education','wiki','guide','report','insight','intelligence']};
function inferCategory(a){var t=a.agent_type;if(t&&t!=='Unknown')return t;var n=(a.name||'').toLowerCase()+' '+(a.biography||'').toLowerCase()+' '+(a.ticker||'').toLowerCase();for(var cat in CAT_KEYWORDS){for(var i=0;i<CAT_KEYWORDS[cat].length;i++){if(n.indexOf(CAT_KEYWORDS[cat][i])>=0)return cat}}return''}
function fmtMcap(v){if(!v&&v!==0)return'\u2014';if(v>=1e9)return'$'+(v/1e9).toFixed(2)+'B';if(v>=1e6)return'$'+(v/1e6).toFixed(1)+'M';if(v>=1e3)return'$'+(v/1e3).toFixed(1)+'K';return'$'+Number(v).toFixed(2)}
function fmtChange(v){if(v===null||v===undefined)return'\u2014';var p=Number(v);return(p>=0?'+':'')+p.toFixed(2)+'%'}
function fmtVol(v){if(!v&&v!==0)return'\u2014';if(v>=1e9)return'$'+(v/1e9).toFixed(1)+'B';if(v>=1e6)return'$'+(v/1e6).toFixed(1)+'M';if(v>=1e3)return'$'+(v/1e3).toFixed(0)+'K';return'$'+Number(v).toFixed(0)}
function fmtHolders(v){if(!v&&v!==0)return'\u2014';if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'K';return Number(v).toLocaleString()}
function fmtNumber(v){if(!v&&v!==0)return'\u2014';return Number(v).toLocaleString()}
function scoreColor(s){if(!s&&s!==0)return'#64748b';if(s>=80)return'#05df72';if(s>=60)return'#69c9cf';if(s>=40)return'#fbbf24';if(s>=20)return'#fb923c';return'#fb2c36'}
function changeClass(v){if(v===null||v===undefined)return'neutral';return Number(v)>=0?'up':'down'}
function initials(n){if(!n)return'?';return n.split(/[\s_-]+/).slice(0,2).map(function(w){return w[0]}).join('').toUpperCase()}
function badgeClass(c){return['DeFi','Gaming','Social','Trading','Infra','Info'].indexOf(c)>=0?'badge-'+c:'badge-default'}
function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function genSparkBars(id,color,vals){
    var c=document.getElementById(id);if(!c)return;
    if(!vals||!vals.length){vals=[];for(var i=0;i<8;i++)vals.push(20+Math.random()*60)}
    var mx=Math.max.apply(null,vals)||1;
    var w=90,h=40,bars=vals.length,bw=Math.min(8,Math.floor(w/(bars+1)));
    var gap=(w-bars*bw)/(bars+1);
    var svg='<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg">';
    for(var j=0;j<vals.length;j++){
        var x=gap+j*(bw+gap);var pct=vals[j]/mx;
        var barH=Math.max(2,pct*h*0.85);var y=h-barH;
        var op=j===vals.length-1?0.9:0.4;
        svg+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+barH+'" rx="2" fill="'+color+'" opacity="'+op+'"/>';
    }
    svg+='</svg>';c.innerHTML=svg;
}

async function loadStats(){
    try{
        var r=await fetch('/api/stats');cachedStats=await r.json();var s=cachedStats;
        var vol=s.total_volume_24h||0;var mcap=s.total_market_cap||0;
        var avg=s.average_score||s.avg_score||0;var total=s.total_agents||0;
        document.getElementById('mc-vol').textContent=fmtVol(vol);
        document.getElementById('mc-mcap').textContent=fmtMcap(mcap);
        document.getElementById('mc-viq').textContent=Math.round(avg);
        document.getElementById('mc-agents').textContent=fmtNumber(total);
        document.getElementById('mc-vol-sub').textContent='cumulative all agents';
        document.getElementById('mc-mcap-sub').textContent='across '+total+' agents';
        document.getElementById('mc-viq-sub').textContent='of '+total+' scored';
        document.getElementById('mc-agents-sub').textContent='on Virtuals Protocol';
        /* Build sparklines from top agents data */
        try{
            var ar=await fetch('/api/agents?page=1&page_size=8&sort=market_cap');
            var ad=await ar.json();var agents=ad.agents||[];
            var volBars=[],mcBars=[],viqBars=[],hBars=[];
            for(var i=0;i<agents.length;i++){
                volBars.push(agents[i].volume_24h||0);
                mcBars.push(agents[i].market_cap||0);
                viqBars.push(agents[i].composite_score||0);
                hBars.push(agents[i].holder_count||0);
            }
            genSparkBars('spark-vol','#05df72',volBars);
            genSparkBars('spark-mcap','#69c9cf',mcBars);
            genSparkBars('spark-viq','#a855f7',viqBars);
            genSparkBars('spark-agents','#fbbf24',hBars);
        }catch(e){
            genSparkBars('spark-vol','#05df72');genSparkBars('spark-mcap','#69c9cf');
            genSparkBars('spark-viq','#a855f7');genSparkBars('spark-agents','#fbbf24');
        }
    }catch(e){console.error('Stats error:',e)}
}

  // For category views, fetch all agents in that category (up to 500)
  const effectivePageSize = state.category ? 500 : state.pageSize;

  const params = new URLSearchParams({
    page: state.page,
    page_size: effectivePageSize,
    sort: state.sort,
  });
  if (state.category) params.set('category', state.category);
  if (state.status)   params.set('status', state.status);
  if (state.doxxTier) params.set('doxx_tier', state.doxxTier);
  if (state.search)   params.set('search', state.search);

function renderPagination(){
    var c=document.getElementById('pagination');if(totalPages<=1){c.innerHTML='';return}
    var h='<button class="page-btn" onclick="gotoPage('+(currentPage-1)+')" '+(currentPage<=1?'disabled':'')+'><i class="fas fa-chevron-left"></i></button>';
    var s=Math.max(1,currentPage-2),e=Math.min(totalPages,currentPage+2);
    for(var p=s;p<=e;p++)h+='<button class="page-btn '+(p===currentPage?'active':'')+'" onclick="gotoPage('+p+')">'+p+'</button>';
    h+='<button class="page-btn" onclick="gotoPage('+(currentPage+1)+')" '+(currentPage>=totalPages?'disabled':'')+'><i class="fas fa-chevron-right"></i></button>';
    c.innerHTML=h;
}
function gotoPage(p){if(p<1||p>totalPages)return;currentPage=p;loadAgents();window.scrollTo({top:0,behavior:'smooth'})}

async function openModal(vid){
    var o=document.getElementById('modal-overlay');o.classList.add('open');document.body.style.overflow='hidden';
    document.getElementById('modal-agent-name').textContent='Loading...';
    document.getElementById('modal-agent-meta').textContent='';document.getElementById('modal-avatar').innerHTML='';
    document.getElementById('modal-score-num').textContent='\u2014';
    document.getElementById('modal-ring-arc').style.strokeDashoffset='188.5';
    document.getElementById('modal-body').innerHTML='<div class="spinner"></div>';
    try{var r=await fetch('/api/agent/'+vid);var a=await r.json();renderModal(a)}
    catch(e){document.getElementById('modal-body').innerHTML='<div style="text-align:center;padding:30px;color:var(--red)">Failed to load</div>'}
}

function renderModal(a){
    var imgUrl=a.image_url||a.image;var el=document.getElementById('modal-avatar');
    if(imgUrl){el.innerHTML='<img src="'+imgUrl+'" onerror="this.parentNode.textContent=\''+initials(a.name)+'\'" />'}else{el.textContent=initials(a.name)}
    document.getElementById('modal-agent-name').textContent=a.name||'\u2014';
    var meta=[a.ticker||a.symbol,inferCategory(a),a.status].filter(Boolean);
    document.getElementById('modal-agent-meta').textContent=meta.join(' \u00b7 ');
    var score=a.composite_score||0;var sn=document.getElementById('modal-score-num');
    sn.textContent=Math.round(score);sn.style.color=scoreColor(score);
    var arc=document.getElementById('modal-ring-arc');arc.style.stroke=scoreColor(score);
    setTimeout(function(){arc.style.strokeDashoffset=188.5-(score/100)*188.5},50);
    var h='';
    /* Key Metrics */
    h+='<div class="detail-section"><div class="detail-section-title"><i class="fas fa-chart-bar"></i> Key Metrics</div><div class="detail-grid">'
        +'<div class="detail-item"><div class="detail-item-label">Market Cap</div><div class="detail-item-value">'+fmtMcap(a.market_cap)+'</div></div>'
        +'<div class="detail-item"><div class="detail-item-label">24h Change</div><div class="detail-item-value" style="color:'+(Number(a.price_change_24h)>=0?'var(--green)':'var(--red)')+'">'+fmtChange(a.price_change_24h)+'</div></div>'
        +'<div class="detail-item"><div class="detail-item-label">Holders</div><div class="detail-item-value">'+fmtNumber(a.holder_count||a.holders)+'</div></div>'
        +'<div class="detail-item"><div class="detail-item-label">24h Volume</div><div class="detail-item-value">'+fmtVol(a.volume_24h)+'</div></div>'
        +'</div></div>';
    /* Score bars */
    if(a.scores_json&&typeof a.scores_json==='object'&&Object.keys(a.scores_json).length){
        var sb=a.scores_json;h+='<div class="detail-section"><div class="detail-section-title"><i class="fas fa-star"></i> Score Breakdown</div>';
        var ks=Object.keys(sb);
        for(var ki=0;ki<ks.length;ki++){var k=ks[ki];var v=sb[k];var val=typeof v==='object'?(v.score||v.value||0):(v||0);
            var pct=Math.min(100,Math.max(0,val));var lb=k.replace(/_/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase()});
            h+='<div class="score-factor"><div class="score-factor-name">'+lb+'</div><div class="score-factor-bar"><div class="score-factor-fill" style="width:'+pct+'%;background:'+scoreColor(pct)+'"></div></div><div class="score-factor-val">'+Math.round(pct)+'</div></div>'}
        h+='</div>';
    }

    const offset = (state.page - 1) * effectivePageSize;
    list.innerHTML = data.agents.map((a, i) => {
      const rank = offset + i + 1;
      const change = parseFloat(a.price_change_24h || 0);
      const changeClass = change >= 0 ? 'positive' : 'negative';
      const scoreNum = Math.round(a.composite_score || 50);
      const scoreClr = scoreColor(scoreNum);
      const categoryLabel = a.agent_type || '';
      const statusLabel = a.status || 'Prototype';
      const vol  = a.volume_24h   ? 'VOL '  + fmtMcap(a.volume_24h)      : '';
      const hl   = a.holder_count ? 'HL '   + fmtCompact(a.holder_count)  : '';
      const metricLine = [vol, hl].filter(Boolean).join('  ');
      const priceStr = a.price_usd ? '$' + parseFloat(a.price_usd).toPrecision(4) : '—';

      const virtualsLink = a.virtuals_id
        ? `<a class="agent-ext-link" href="https://app.virtuals.io/virtuals/${a.virtuals_id}" target="_blank" rel="noopener" onclick="event.stopPropagation()">VRT</a>`
        : '';
      const dexLink = a.contract_address
        ? `<a class="agent-ext-link" href="https://dexscreener.com/base/${a.contract_address}" target="_blank" rel="noopener" onclick="event.stopPropagation()">DEX</a>`
        : '';

      return `<div class="agent-row" onclick="openModal('${a.virtuals_id}')">
        <div class="rank">${rank}</div>
        <div class="agent-cell">
          <div class="avatar">
            ${a.image_url
              ? `<img src="${a.image_url}" alt="${a.name}" onerror="this.parentElement.textContent='${initials(a.name)}'"/>`
              : initials(a.name)}
          </div>
          <div class="agent-info">
            <div class="agent-name">${a.name}</div>
            <div class="agent-ticker">${a.ticker || ''}</div>
            ${categoryLabel || statusLabel ? `<div class="agent-category">${categoryLabel}${categoryLabel && statusLabel ? ' · ' : ''}${statusLabel}</div>` : ''}
            ${metricLine ? `<div class="agent-metrics">${metricLine}</div>` : ''}
            ${virtualsLink || dexLink ? `<div class="agent-links">${virtualsLink}${dexLink}</div>` : ''}
          </div>
        </div>
        <div class="price-col">
          <div class="price-val">${priceStr}</div>
          <div class="mcap-val">${fmtMcap(a.market_cap)}</div>
        </div>
        <div class="change-col">
          <div class="change-val ${changeClass}">${fmtChange(a.price_change_24h)}</div>
        </div>
        <div class="viq-col">
          <div class="viq-val" style="color:${scoreClr}">${scoreNum}</div>
        </div>
      </div>`;
    }).join('');

    renderPagination();
  } catch(e) {
    list.innerHTML = `<div class="loading-row" style="color:var(--red)">Error loading agents. Please refresh.</div>`;
    console.error(e);
  }
}

function buildAIReport(a){
    var name=a.name||'This agent';var cat=inferCategory(a)||'AI';
    var mcap=a.market_cap||0;var holders=a.holder_count||a.holders||0;
    var score=a.composite_score||0;var vol=a.volume_24h||0;var change=a.price_change_24h;
    var aiText=a.analysis_json&&a.analysis_json.summary?a.analysis_json.summary:(a.ai_summary||a.analysis_summary||'');
    var h='<div class="detail-section"><div class="detail-section-title"><i class="fas fa-robot"></i> AI Intelligence Report</div>';
    /* 1. Overview */
    h+='<div class="ai-section"><h4><i class="fas fa-eye"></i> Project Overview</h4><p>';
    if(aiText){h+=escHtml(aiText)}
    else{h+=name+' is a '+cat+' agent on the Virtuals Protocol ecosystem';if(mcap)h+=' with a market cap of '+fmtMcap(mcap);h+='. The project has '+fmtHolders(holders)+' holders';if(vol)h+=' and generated '+fmtVol(vol)+' in 24h trading volume';h+='.'}
    h+='</p></div>';
    /* 2. Technical Breakdown */
    h+='<div class="ai-section"><h4><i class="fas fa-microchip"></i> Technical Breakdown</h4><p>';
    h+=name+' operates as a '+cat+' agent built on the Virtuals Protocol, leveraging the BASE L2 chain for low-cost, high-throughput transactions. ';
    if(a.contract_address)h+='The agent token is deployed on-chain with verifiable smart contract interactions. ';
    if(holders>10000)h+='Strong on-chain distribution with '+fmtHolders(holders)+' unique holders indicates broad community adoption and reduced concentration risk. ';
    else if(holders>1000)h+='Moderate holder distribution at '+fmtHolders(holders)+' addresses. Growing community but still consolidating. ';
    else h+='Early-stage holder distribution with '+fmtHolders(holders)+' addresses. Token concentration may present risk. ';
    if(vol&&mcap){var ratio=vol/mcap;h+='Volume-to-mcap ratio at '+(ratio*100).toFixed(1)+'%, '+(ratio>0.1?'signaling active trading and strong liquidity.':'indicating moderate trading activity relative to valuation.')}
    if(a.liquidity_usd)h+=' On-chain liquidity stands at '+fmtVol(a.liquidity_usd)+'.';
    h+='</p></div>';
    /* 3. VIQ Score Explanation */
    h+='<div class="ai-section"><h4><i class="fas fa-chart-pie"></i> VIQ Score Explanation</h4><p>';
    var rating=score>=80?'exceptional':score>=60?'strong':score>=40?'moderate':score>=20?'below average':'low';
    h+='VIQ Score of '+Math.round(score)+'/100 ('+rating+'). The score is calculated using a 24-factor weighted model across 4 tiers: Market Fundamentals (30%), On-Chain Health (28%), Community & Traction (24%), and Risk Assessment (18%). ';
    if(a.scores_json&&typeof a.scores_json==='object'){var sb=a.scores_json;var ks=Object.keys(sb);
        if(ks.length){var strongest=null,weakest=null,sMax=-1,sMin=101;
            for(var i=0;i<ks.length;i++){var v=sb[ks[i]];var val=typeof v==='object'?(v.score||v.value||0):(v||0);if(val>sMax){sMax=val;strongest=ks[i]}if(val<sMin){sMin=val;weakest=ks[i]}}
            if(strongest)h+='Strongest factor: '+strongest.replace(/_/g,' ')+' ('+Math.round(sMax)+'). ';
            if(weakest&&weakest!==strongest)h+='Area for improvement: '+weakest.replace(/_/g,' ')+' ('+Math.round(sMin)+').';}}
    h+='</p></div>';
    /* 4. TAM, Predictions & Risks */
    h+='<div class="ai-section"><h4><i class="fas fa-globe"></i> TAM, Predictions &amp; Execution Risks</h4><p>';
    h+='The '+cat+' agent sector within the Virtuals ecosystem is part of the broader AI-crypto convergence market, estimated at $10-50B TAM by 2027. ';
    if(mcap>100e6)h+='At '+fmtMcap(mcap)+' market cap, this project has achieved significant scale. Upside depends on ecosystem expansion and cross-chain deployment. ';
    else if(mcap>10e6)h+='Current '+fmtMcap(mcap)+' valuation leaves significant room for growth if the project executes on its roadmap. ';
    else h+='At '+fmtMcap(mcap)+', this is an early-stage opportunity with high upside potential but elevated risk. ';
    h+='Key execution risks: smart contract vulnerabilities, regulatory uncertainty around AI-generated financial agents, dependency on Virtuals Protocol infrastructure, and market-wide crypto drawdowns. ';
    if(change!==null&&change!==undefined){if(Number(change)<-10)h+='Recent '+fmtChange(change)+' price action signals near-term selling pressure that may present entry opportunities.';else if(Number(change)>10)h+='Strong '+fmtChange(change)+' momentum suggests growing interest, though caution is warranted at elevated levels.'}
    h+='</p></div></div>';
    return h;
}

async function checkEnrichmentStatus(){

        tab.classList.add('active');currentFeed=tab.dataset.feed;currentPage=1;loadAgents()});

async function openModal(virtualsId) {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';

  document.getElementById('modal-agent-name').textContent = 'Loading...';
  document.getElementById('modal-agent-meta').innerHTML = '';
  document.getElementById('modal-avatar').innerHTML = '';
  document.getElementById('modal-score-num').textContent = '—';
  document.getElementById('modal-ring-arc').style.strokeDashoffset = '163.4';
  document.getElementById('modal-body').innerHTML = `

      <div class="loading-spinner" style="margin:0 auto 16px"></div>
      <div style="color:var(--text-dim)">Loading intelligence report...</div>

function _factorWhy(key, scores, analysis, agent) {
  const fm = analysis.first_mover || {};
  const team = analysis.team || {};
  const product = analysis.product || {};
  const market = analysis.market || {};
  const community = analysis.community || {};
  const v = scores[key] !== undefined ? Math.round(scores[key]) : 50;

  const map = {
    F1_category_uniqueness: () => fm.category_unique === true
      ? `Novel category — no direct on-chain comparables identified`
      : fm.category_unique === false
        ? `Operates in a crowded vertical with established on-chain rivals`
        : `Uniqueness score ${v}/100 — insufficient data to confirm originality`,
    F2_approach_novelty: () => fm.approach_novel === true
      ? `Approach is architecturally distinct from existing protocol designs`
      : fm.approach_novel === false
        ? `Methodology closely mirrors existing live agents`
        : `Novelty score ${v}/100`,
    F3_cross_chain_originality: () => fm.cross_chain_original === true
      ? `No equivalent exists across Base, Ethereum, or Solana ecosystems`
      : fm.cross_chain_original === false
        ? `Cross-chain equivalents already live on competing networks`
        : `Cross-chain originality ${v}/100`,
    F4_timing_advantage: () => fm.days_ahead_of_competitor
      ? `~${fm.days_ahead_of_competitor}d ahead of nearest competitor — timing moat is ${v >= 65 ? 'strong' : v >= 45 ? 'moderate' : 'thin'}`
      : `Timing advantage score ${v}/100 — competitor launch data unavailable`,
    F5_defensibility: () => fm.analysis
      ? `${fm.analysis.slice(0, 120)}${fm.analysis.length > 120 ? '…' : ''}`
      : `Defensibility / moat score ${v}/100`,
    F6_doxx_tier: () => {
      const tier = team.doxx_tier || agent.doxx_tier || 3;
      const desc = team.doxx_description || ({1:'Full doxx — identity publicly verified',2:'Social presence — pseudonymous with active socials',3:'Anonymous — no verifiable identity'}[tier] || 'Unknown');
      return `${desc}${team.red_flags && team.red_flags.length ? ` ⚠ ${team.red_flags[0]}` : ''}`;
    },
    F7_track_record: () => team.team_summary
      ? `${team.team_summary.slice(0, 130)}${team.team_summary.length > 130 ? '…' : ''}`
      : `Track record score ${v}/100 — limited verifiable history`,
    F8_code_activity: () => {
      const commits = agent.github_commits_30d;
      const stars = agent.github_stars;
      if (commits || stars) return `${commits ? commits + ' commits in last 30d' : 'Commit data unavailable'}${stars ? ' · ' + stars + ' GitHub stars' : ''}`;
      return `Code activity score ${v}/100 — no public repository linked`;
    },
    F9_shipping_cadence: () => product.status
      ? `Product status: ${product.status}${product.description ? ' — ' + product.description.slice(0, 100) : ''}`
      : `Shipping cadence score ${v}/100`,
    F10_product_status: () => product.description
      ? product.description.slice(0, 140)
      : `Product status score ${v}/100 — no shipped deliverables confirmed`,
    F11_partnerships: () => product.technical_moat
      ? `${product.technical_moat.slice(0, 130)}${product.technical_moat.length > 130 ? '…' : ''}${product.red_flags && product.red_flags.length ? ' ⚠ ' + product.red_flags[0] : ''}`
      : `Partnership score ${v}/100`,
    F12_wallet_behavior: () => team.wallet_behavior_score !== undefined
      ? `Wallet behavior score ${Math.round(team.wallet_behavior_score)}/100${v < 40 ? ' — unusual wallet activity detected' : v >= 70 ? ' — healthy distribution, no suspicious sells' : ''}`
      : `Wallet behavior score ${v}/100`,
    F13_tam: () => market.tam_description
      ? market.tam_description.slice(0, 140)
      : `TAM score ${v}/100`,
    F14_real_world_comparables: () => market.real_world_comparable
      ? `Comparable to ${market.real_world_comparable} — comparables score ${Math.round(market.comparables_score || v)}/100`
      : `Real-world comparables score ${v}/100`,
    F15_revenue_model: () => `Revenue model score ${Math.round(market.revenue_model_score || v)}/100${market.saturation_description ? ' — ' + market.saturation_description.slice(0, 80) : ''}`,
    F16_current_revenue: () => `Current revenue score ${Math.round(market.current_revenue_score || v)}/100${v < 35 ? ' — no confirmed revenue stream' : v >= 65 ? ' — active revenue generation confirmed' : ' — early-stage revenue signals'}`,
    F17_mcap_to_tam: () => market.mcap_tam_ratio !== undefined
      ? `MCap/TAM ratio ${market.mcap_tam_ratio.toFixed(4)} — ${market.mcap_tam_ratio < 0.001 ? 'highly undervalued relative to addressable market' : market.mcap_tam_ratio > 0.1 ? 'market cap aggressive vs TAM' : 'reasonable penetration rate'}`
      : `MCap/TAM score ${v}/100`,
    F18_saturation: () => market.saturation_description
      ? market.saturation_description.slice(0, 130)
      : `Market saturation score ${v}/100`,
    F19_holder_distribution: () => {
      const holders = agent.holder_count;
      return holders
        ? `${fmtNumber(holders)} holders — distribution score ${v}/100${v >= 65 ? ', healthy spread' : v < 40 ? ', concentrated ownership risk' : ''}`
        : `Holder distribution score ${v}/100`;
    },
    F20_twitter_engagement: () => {
      const followers = agent.twitter_followers;
      return followers
        ? `${fmtNumber(followers)} Twitter followers — engagement score ${v}/100`
        : `Twitter engagement score ${v}/100 — no linked account`;
    },
    F21_follower_growth: () => community.follower_growth_score !== undefined
      ? `Follower growth score ${Math.round(community.follower_growth_score)}/100${v >= 65 ? ' — accelerating growth trend' : v < 40 ? ' — stagnant or declining' : ' — steady growth'}`
      : `Follower growth score ${v}/100`,
    F22_community_depth: () => community.community_analysis
      ? community.community_analysis.slice(0, 140)
      : `Community depth score ${v}/100`,
    F23_organic_signals: () => community.organic_score !== undefined
      ? `Organic signal score ${Math.round(community.organic_score)}/100${v >= 65 ? ' — engagement appears genuine' : v < 40 ? ' — bot/paid signals detected' : ' — mixed organic/paid signals'}`
      : `Organic vs paid score ${v}/100`,
    F24_smart_money: () => community.smart_money_score !== undefined
      ? `Smart money score ${Math.round(community.smart_money_score)}/100${v >= 65 ? ' — known protocol wallets accumulating' : v < 40 ? ' — no smart money participation detected' : ' — some notable wallet activity'}`
      : `Smart money score ${v}/100`,
  };

  const fn = map[key];
  return fn ? fn() : `Score ${v}/100`;
}

function renderTierBreakdown(scores, analysis, agent) {
  const tiers = [
    { label: 'First Mover (30%)', keys: [
      ['F1_category_uniqueness', 'Category Uniqueness'],
      ['F2_approach_novelty', 'Approach Novelty'],
      ['F3_cross_chain_originality', 'Cross-Chain Original'],
      ['F4_timing_advantage', 'Timing Advantage'],
      ['F5_defensibility', 'Defensibility / Moat'],
    ]},
    { label: 'Team & Execution (28%)', keys: [
      ['F6_doxx_tier', 'Team Visibility'],
      ['F7_track_record', 'Track Record'],
      ['F8_code_activity', 'Code Activity'],
      ['F9_shipping_cadence', 'Shipping Cadence'],
      ['F10_product_status', 'Product Status'],
      ['F11_partnerships', 'Partnerships'],
      ['F12_wallet_behavior', 'Wallet Behavior'],
    ]},
    { label: 'Value Pool / TAM (24%)', keys: [
      ['F13_tam', 'Total Addressable Market'],
      ['F14_real_world_comparables', 'Real-World Comparables'],
      ['F15_revenue_model', 'Revenue Model Clarity'],
      ['F16_current_revenue', 'Current Revenue'],
      ['F17_mcap_to_tam', 'MCap / TAM Ratio'],
      ['F18_saturation', 'Market Saturation'],
    ]},
    { label: 'Community & Social (18%)', keys: [
      ['F19_holder_distribution', 'Holder Distribution'],
      ['F20_twitter_engagement', 'Twitter Engagement'],
      ['F21_follower_growth', 'Follower Growth'],
      ['F22_community_depth', 'Community Depth'],
      ['F23_organic_signals', 'Organic vs Paid'],
      ['F24_smart_money', 'Smart Money'],
    ]},
  ];

  return tiers.map(tier => `
    <div class="tier-header">${tier.label}</div>
    ${tier.keys.map(([key, label]) => {
      const v = scores[key] !== undefined ? Math.round(scores[key]) : 50;
      const color = scoreColor(v);
      const why = _factorWhy(key, scores, analysis, agent);
      return `<div class="tier-factor-row">
        <div class="tier-factor-left">
          <div class="tier-factor-name">${label}</div>
          <div class="tier-factor-why">${why}</div>
        </div>
        <div class="tier-factor-right">
          <div class="tier-factor-score" style="color:${color}">${v}</div>
          <div class="tier-factor-bar">
            <div class="tier-factor-bar-fill" style="width:${v}%;background:${color}"></div>
          </div>
        </div>
      </div>`;
    }).join('')}
  `).join('');
}

function renderForecast(horizon, data) {
  if (!data) {
    return `<div class="forecast-card">
      <div class="forecast-horizon">${horizon.toUpperCase()} Horizon</div>
      <div class="forecast-probability" style="color:var(--text-dim)">—</div>
      <div class="forecast-catalyst" style="color:var(--text-dim)">No forecast available</div>
    </div>`;
  }
  const prob = data.probability_up || 50;
  const color = prob >= 60 ? '#16A34A' : prob >= 45 ? '#F59E0B' : '#EF4444';
  const rangeLow = data.range_low || 0;
  const rangeHigh = data.range_high || 0;
  const signLow = rangeLow >= 0 ? '+' : '';
  const signHigh = rangeHigh >= 0 ? '+' : '';

  return `<div class="forecast-card">
    <div class="forecast-horizon">${horizon.toUpperCase()} Horizon</div>
    <div class="forecast-probability" style="color:${color}">${prob}%</div>
    <div style="font-size:10px;color:var(--text-dim);margin-bottom:4px">probability bullish</div>
    <div class="forecast-range">${signLow}${rangeLow}% / ${signHigh}${rangeHigh}%</div>
    <div class="forecast-catalyst">${data.catalyst || ''}</div>
  </div>`;
}

// ===== MODAL CLOSE =====
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  document.body.style.overflow = '';
  if (state.jobPollInterval) clearInterval(state.jobPollInterval);
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ===== TOAST =====
let toastTimeout;
function showToast(msg, isError=false) {
  let el = document.querySelector('.toast');
  if (el) el.remove();
  el = document.createElement('div');
  el.className = 'toast';
  if (isError) el.style.background = '#EF4444';
  el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.remove(), 5000);
}

// ===== FILTER TAB EVENTS =====
document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    state.sort = this.dataset.sort;
    state.page = 1;
    loadAgents();
  });
});

// ===== CATEGORY TAB EVENTS =====
document.querySelectorAll('.category-tab').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    state.category = this.dataset.category;
    // "All" tab resets sort to market_cap
    if (!state.category) state.sort = 'market_cap';
    state.page = 1;
    loadAgents();
  });
});

// ===== TABLE HEADER SORT =====
document.querySelectorAll('.th.sortable').forEach(th => {
  th.addEventListener('click', function() {
    state.sort = this.dataset.sort;
    state.page = 1;
    loadAgents();
  });
});

// ===== SEARCH =====
document.getElementById('search-input').addEventListener('input', function() {
  clearTimeout(state.searchTimeout);
  state.searchTimeout = setTimeout(() => {
    state.search = this.value.trim();
    state.page = 1;
    loadAgents();
  }, 350);
});

// ===== BOTTOM FILTER BUTTONS =====
document.getElementById('btn-status').addEventListener('click', function() {
  const sel = document.getElementById('filter-status');
  const options = Array.from(sel.options);
  const currentIdx = options.findIndex(o => o.value === state.status);
  const nextIdx = (currentIdx + 1) % options.length;
  state.status = options[nextIdx].value;
  this.textContent = options[nextIdx].text;
  this.classList.toggle('active', state.status !== '');
  state.page = 1;
  loadAgents();
});

document.getElementById('btn-doxx').addEventListener('click', function() {
  const sel = document.getElementById('filter-doxx');
  const options = Array.from(sel.options);
  const currentIdx = options.findIndex(o => o.value === state.doxxTier);
  const nextIdx = (currentIdx + 1) % options.length;
  state.doxxTier = options[nextIdx].value;
  this.textContent = options[nextIdx].text;
  this.classList.toggle('active', state.doxxTier !== '');
  state.page = 1;
  loadAgents();
});

document.getElementById('btn-sort').addEventListener('click', function() {
  const sorts = [
    {value: 'market_cap',       label: 'Sort: MCap'},
    {value: 'composite_score',  label: 'Sort: VIQ'},
    {value: 'price_change_24h', label: 'Sort: 24h %'},
    {value: 'newest',           label: 'Sort: New'},
    {value: 'holders',          label: 'Sort: Holders'},
  ];
  const currentIdx = sorts.findIndex(s => s.value === state.sort);
  const nextIdx = (currentIdx + 1) % sorts.length;
  state.sort = sorts[nextIdx].value;
  this.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M11 18h2"/></svg> ${sorts[nextIdx].label}`;
  state.page = 1;
  loadAgents();
});

// ===== ENRICHMENT POLLING =====
let _enrichPollInterval = null;
let _lastAgentCount = 0;

async function checkEnrichmentStatus() {
  try {
    const res = await fetch('/api/status');
    if (!res.ok) return true;
    const data = await res.json();
    const banner = document.getElementById('enrich-banner');
    const msg = document.getElementById('enrich-msg');

    const done = data.status === 'complete' || data.status === 'idle';
    if (!done) {
      const labels = {
        preloading: 'Loading agents from Virtuals Protocol',
        enriching:  'Enriching market data via DexScreener',
        scoring:    'Calculating VIQ scores',
      };
      const label = labels[data.status] || 'Updating data';
      const count = data.total_agents_in_db || 0;
      msg.textContent = `${label}... ${count.toLocaleString()} agents loaded`;
      banner.classList.add('visible');

      if (count !== _lastAgentCount) {
        _lastAgentCount = count;
        loadStats();
        if (state.page === 1) loadAgents();
      }
    } else {
      banner.classList.remove('visible');
    }
    return done;
  } catch(e) {
    return true;
  }
}

async function startEnrichmentPolling() {
  const done = await checkEnrichmentStatus();
  if (done) return;

  _enrichPollInterval = setInterval(async () => {
    const done = await checkEnrichmentStatus();
    if (done) {
      clearInterval(_enrichPollInterval);
      _enrichPollInterval = null;
      loadStats();
    }
  }, 5000);
}

// ===== BOOT =====
(async function init() {
  await loadStats();
  await loadAgents();
  startEnrichmentPolling();
  setInterval(loadStats, 5 * 60 * 1000);
})();
</script>
